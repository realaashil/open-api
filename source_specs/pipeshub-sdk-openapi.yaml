            type: number
        chunkIndex:
          type: integer
          nullable: true
        sheetName:
          type: string
          nullable: true
        sheetNum:
          type: integer
          nullable: true
        webUrl:
          type: string
          nullable: true
        previewRenderable:
          type: boolean
          nullable: true
        hideWeburl:
          type: boolean
          nullable: true
        categories:
          type: array
          nullable: true
          items:
            type: string
        departments:
          type: array
          nullable: true
          items:
            type: string
        topics:
          type: array
          nullable: true
          items:
            type: string
        languages:
          type: array
          nullable: true
          items:
            type: string
        subcategoryLevel1:
          type: string
          nullable: true
        subcategoryLevel2:
          type: string
          nullable: true
        subcategoryLevel3:
          type: string
          nullable: true
        score:
