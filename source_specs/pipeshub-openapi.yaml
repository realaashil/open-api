          description: Provider key (e.g. `openai`, `anthropic`)
        modelFriendlyName:
          type: string
          description: Human-readable display name
        chatMode:
          type: string
          description: Chat mode used for this turn (e.g. `quick`, `internal_search`)
    AppliedFilterNode:
      type: object
      additionalProperties: false
      description: A single filter node selected by the user (used for display/persistence of active filters)
      properties:
        id:
          type: string
          description: Unique identifier of the filter node
        name:
          type: string
          description: Display name of the filter node
        nodeType:
          type: string
          description: Type of the node (e.g. app, kb)
        connector:
          type: string
          description: Connector identifier associated with this node
    AddMessageRequest:
      type: object
      description: Request body for adding a message to an existing conversation
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          description: The follow-up question or message content
          example: Can you elaborate on the revenue trends?
        filters:
          $ref: "#/components/schemas/Filters"
        appliedFilters:
          $ref: "#/components/schemas/AppliedFilters"
        modelKey:
          type: string
          description: Override the model for this specific message
        modelName:
          type: string
          description: Display name of the model
        modelFriendlyName:
          type: string
          description: Friendly display name of the model
        chatMode:
          type: string
          description: Chat mode for this message
        timezone:
          type: string
          minLength: 1
          description: |
            IANA timezone identifier from the client (top-level field).
            Used to provide time-aware context to the AI.
          example: America/New_York
        currentTime:
          type: string
          format: date-time
          description: |
            ISO 8601 / RFC 3339 datetime from the client (top-level field; UTC `Z` or numeric offset).
          example: 2026-04-12T16:00:00+05:30
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Optional list of tool identifiers the agent may invoke for this
            follow-up message. Semantics are identical to the create-conversation
            tools field.
          example:
            - jira.create_issue
            - confluence.search_content
    AssistantMessageStreamSSEEvent:
      type: object
      description: |
        Server-Sent Event envelope for non-agent assistant follow-up message
        streams (`internal_search` / `web_search` chat modes) on an existing
        conversation. `data` is a JSON-encoded string whose shape depends on
        `event`.

        Same event vocabulary as the conversation-creation stream — only the
        `connected` and `complete` payloads differ because the conversation
        already exists when this route is called.

        Three events are emitted by the API layer with stable, server-defined
        shapes:

        - `connected` — `{ "message": string }`. Fired once on connection.
          No `conversationId` or `title` is included because the caller
          already passed the conversation ID in the URL.
        - `complete` — `{ "conversation": Conversation, "recordsUsed": number,
          "meta": { "requestId": string, "timestamp": string,
          "duration": number, "recordsUsed": number } }`. Fired once after
          the AI backend finishes. `recordsUsed` is the count of citations
          attached to the new assistant message.
        - `error` — `{ "error": string, "details"?: string }`. Fired when the
          stream fails; the conversation row is marked FAILED before close.

        The remaining events are forwarded from the Python query service.
        Their payloads are AI-backend defined and may evolve:

        - `status` — progress message describing the current pipeline stage
          (for example `started`, `transforming`, `searching`, `processing`,
          `checking_tools`, `generating_answer`). `transforming` is common on
          this route because follow-up turns always have prior history to
          rewrite the query against.
        - `answer_chunk` — incremental token batch with running `accumulated`
          text and any new `citations`.
        - `tool_calls` — the assistant requested one or more tool calls.
          Carries the assistant message that triggered the tool round.
        - `tool_call` — emitted once per individual tool invocation as it
          starts. Payload includes `tool_name`, `tool_args`, and `call_id`.
        - `tool_success` — a tool finished successfully. Payload includes
          `tool_name`, `summary`, `call_id`, and any `record_info`.
        - `tool_error` — a tool invocation failed. Payload includes
          `tool_name`, `error`, and `call_id`.
        - `restreaming` — the LLM is being restarted with new context, for
          example before a citation-verification pass.

        Clients should ignore unknown event names rather than treating them
        as errors.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - answer_chunk
            - tool_calls
            - tool_call
            - tool_success
            - tool_error
            - restreaming
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.
    CitationReference:
      type: object
      description: Reference to a source document cited in a response
      properties:
        citationId:
          type: string
          format: objectId
          description: ID of the citation record
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
          description: How relevant this citation is to the query (0-1)
        excerpt:
          type: string
          description: Relevant excerpt from the source document
        context:
          type: string
          description: Additional context around the citation
    RegenerateRequest:
      type: object
      additionalProperties: false
      description: |
        Request body for regenerating an AI response. All fields are optional;
        when omitted the model and context originally used for the message are
        reused. Provide `modelKey` (and the matching display fields) to switch
        models, or `filters` to narrow the knowledge sources considered during
        regeneration.
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        modelKey:
          type: string
          minLength: 1
          description: |
            Identifier of the AI model configuration to use for regeneration.
            Typically a UUID returned by the model-management endpoints. When
            omitted, the model used for the original message is reused.
          example: 05438a37-68f2-4641-a8dc-6c47e63278ca
        modelName:
          type: string
          minLength: 1
          description: Provider model name (e.g. the underlying LLM identifier).
          example: gpt-5.4-mini
        modelFriendlyName:
          type: string
          minLength: 1
          description: Friendly display name of the selected model.
          example: mini
        chatMode:
          type: string
          minLength: 1
          description: |
            Chat mode used for regeneration (for example `internal_search`,
            `web_search`, or an agent mode such as `agent:auto`).
          example: internal_search
        timezone:
          type: string
          minLength: 1
          description: |
            IANA timezone identifier from the client. Used to provide
            time-aware context to the AI during regeneration.
          example: Asia/Calcutta
        currentTime:
          type: string
          format: date-time
          description: |
            ISO 8601 / RFC 3339 datetime from the client (UTC `Z` or numeric
            offset). Used to anchor any relative time references in the query.
          example: 2026-05-11T15:43:21+05:30
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Optional list of tool identifiers (fully-qualified action names
            such as `jira.create_issue`) the agent may invoke when
            regenerating. Applicable only in agent chat modes.
          example:
            - jira.create_issue
            - confluence.search_content
    SSEEvent:
      type: object
      description: |
        Server-Sent Event envelope for streaming chat responses.

        `data` is a JSON-encoded string whose shape depends on `event`.
        Three events are emitted by the API layer and have stable shapes
        documented on the streaming routes:

        - `connected` — fired once on connection. Carries the newly created
          `conversationId` and `title` so the client can link the stream to
          a row before any tokens arrive.
        - `complete` — fired once after the AI backend finishes. Carries the
          full persisted `conversation` and a `meta` block with `requestId`,
          `timestamp` and `duration`.
        - `error` — fired when the stream fails. Carries an `error` message
          and optional `details`. The conversation row is marked FAILED
          before the stream closes.

        All other events are forwarded verbatim from the AI backend; their
        payloads are AI-backend defined and may evolve. Currently observed
        names include `status`, `answer_chunk`, `tool_call`, `tool_calls`,
        `tool_result`, `tool_success`, `tool_error`,
        `tool_execution_complete`, `restreaming`, and `metadata`.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - answer_chunk
            - tool_call
            - tool_calls
            - tool_result
            - tool_success
            - tool_error
            - tool_execution_complete
            - restreaming
            - metadata
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.
    SemanticSearchRequest:
      type: object
      description: |
        Request body for performing semantic search across the enterprise knowledge base.

        **How Semantic Search Works:**

        1. Query is converted to vector embeddings
        2. Similar content is found using vector similarity
        3. Results are ranked by relevance score
        4. Matching chunks with metadata are returned

        **Filtering:**

        Use filters to narrow search scope to specific apps or knowledge bases.
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          description: |
            Natural language search query. The system understands
            semantic meaning, not just keywords.
          example: employee onboarding procedures
        filters:
          $ref: "#/components/schemas/Filters"
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Maximum number of results to return
        modelKey:
          type: string
          description: AI model to use for embeddings
        modelName:
          type: string
          description: Display name of the model
        modelFriendlyName:
          type: string
          description: Friendly display name of the model
        chatMode:
          type: string
          description: Processing mode configuration
    SemanticSearchExecuteResponse:
      type: object
      additionalProperties: false
      description: |
        Immediate POST `/search` response: persisted search id plus the raw retrieval payload.
        SDK-oriented modeling: named fields only at this level; dynamic-key maps inside `searchResponse` use
        `additionalProperties` with a `$ref` (e.g. `virtual_to_record_map`) rather than boolean `additionalProperties: true`,
        so generated clients retain typed values where possible.
      required:
        - searchId
        - searchResponse
      properties:
        searchId:
          type: string
          format: objectId
        searchResponse:
          $ref: "#/components/schemas/SemanticSearchAiResponse"
    SemanticSearchHistoryResponse:
      type: object
      additionalProperties: false
      description: |
        Envelope returned by `GET /search`. The handler runs `find()` plus
        `countDocuments()` in parallel and assembles `{ searchHistory,
        pagination, filters, meta }` (es_controller.ts:3925-3973).
      required:
        - searchHistory
        - pagination
        - filters
        - meta
      properties:
        searchHistory:
          type: array
          items:
            $ref: "#/components/schemas/SemanticSearchHistoryItem"
        pagination:
          $ref: "#/components/schemas/SemanticSearchHistoryPagination"
        filters:
          $ref: "#/components/schemas/SemanticSearchHistoryFilters"
        meta:
          $ref: "#/components/schemas/SemanticSearchHistoryMeta"
    PersistedSemanticSearchEnvelope:
      type: array
      description: |
        GET `/search/{searchId}` calls `Model.find()` (not `findOne()`) and sends
        the result as-is, so the wire format is an array of zero or one
        persisted search docs. A non-existent id returns `200 []`, **not** `404`.
      items:
        $ref: "#/components/schemas/PersistedSemanticSearch"
    ModelType:
      type: string
      enum:
        - llm
        - embedding
        - ocr
        - slm
        - reasoning
        - multiModal
        - imageGeneration
        - tts
        - stt
      description: Type of AI model
    AuthProviders:
      type: object
      additionalProperties: false
