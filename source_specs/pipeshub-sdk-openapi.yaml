              $ref: '#/components/schemas/SemanticSearchHistorySortField'
            sortOrder:
              $ref: '#/components/schemas/SemanticSearchHistorySortField'
        dateFilters:
          type: object
          additionalProperties: false
          required:
          - dateRange
          properties:
            dateRange:
              $ref: '#/components/schemas/SemanticSearchHistoryDateRange'
        messageFilters:
          type: object
          additionalProperties: false
          required:
          - messageType
          properties:
            messageType:
              $ref: '#/components/schemas/SemanticSearchHistoryFilterToggle'
        sortingMessages:
          type: object
          additionalProperties: false
          required:
          - sortBy
          - sortOrder
          properties:
            sortBy:
              $ref: '#/components/schemas/SemanticSearchHistorySortField'
            sortOrder:
              $ref: '#/components/schemas/SemanticSearchHistorySortField'
    SemanticSearchHistoryFilters:
      type: object
      additionalProperties: false
      required:
      - applied
      - available
      properties:
        applied:
          $ref: '#/components/schemas/SemanticSearchHistoryFiltersApplied'
        available:
          $ref: '#/components/schemas/SemanticSearchHistoryFiltersAvailable'
    SemanticSearchHistoryMeta:
      type: object
      additionalProperties: false
      description: |
        `requestId` comes from `req.context?.requestId` and is omitted from
        the JSON when upstream middleware did not set it.
      required:
      - timestamp
      - duration
      properties:
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
        duration:
          type: integer
    SemanticSearchHistoryResponse:
      type: object
      additionalProperties: false
      description: |
        Envelope returned by `GET /search`. The handler runs `find()` plus
        `countDocuments()` in parallel and assembles `{ searchHistory,
        pagination, filters, meta }` (es_controller.ts:3925-3973).
      required:
      - searchHistory
      - pagination
      - filters
      - meta
      properties:
        searchHistory:
          type: array
          items:
            $ref: '#/components/schemas/SemanticSearchHistoryItem'
        pagination:
          $ref: '#/components/schemas/SemanticSearchHistoryPagination'
        filters:
          $ref: '#/components/schemas/SemanticSearchHistoryFilters'
        meta:
          $ref: '#/components/schemas/SemanticSearchHistoryMeta'
    AgentKnowledgeFiltersParsed:
      type: object
      additionalProperties: false
      description: |
        Indexed scope for a knowledge connector: record-group ids (collections /
        KB roots) and individual record ids. First-party create/update flows set
        `recordGroups` and `records`. On GET, `filtersParsed` is this shape
        parsed from the stored `filters` JSON string.
      properties:
        recordGroups:
          type: array
          items:
            type: string
          description: Record-group ids (e.g. knowledge-base roots) in scope.
        records:
          type: array
          items:
            type: string
          description: Individual record ids in scope.
    AgentToolset:
      type: object
      additionalProperties: false
      description: |
        Toolset instance linked to an agent, as projected by the graph store on
        `GET /agents/{agentKey}` and `GET /agents`. Multiple instances of the
        same integration type are distinguished by `instanceId` and optional
        `instanceName`.
      properties:
        _key:
          type: string
          description: Toolset instance node key in the backing graph store.
        name:
          allOf:
          - $ref: '#/components/schemas/AgentCreateToolsetName'
          description: Integration / toolset type key.
        displayName:
          type: string
          description: Human-readable toolset product label (for example `Jira` or `Slack`).
        type:
          type: string
        instanceId:
          type: string
          description: Admin-created toolset instance id
        instanceName:
          type: string
          description: Human-readable instance label (e.g. sidebar instance name)
        selectedTools:
          type: array
          nullable: true
          description: |
            Tool names explicitly selected for this toolset instance, when the
            instance was created with a subset selection. `null`/absent when the
            instance exposes all of the toolset's tools.
          items:
            type: string
        tools:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              _key:
                type: string
                description: Tool node key in the backing graph store.
              name:
                type: string
              fullName:
                type: string
              toolsetName:
                type: string
                description: Toolset type key the tool belongs to.
              description:
                type: string
              deprecated:
                type: boolean
                readOnly: true
                description: |
                  Server-stamped on `GET /agents/{agentKey}`: `true` when the
                  tool's `fullName` is no longer in the runtime tool registry
                  (its `@tool` was removed). Read-only; ignored on create/update
                  bodies. Not stamped on the `GET /agents` list projection.
    AgentKnowledge:
      type: object
      additionalProperties: false
      description: |
        Knowledge connector / indexed scope linked to an agent, as projected by
        the graph store on `GET /agents/{agentKey}` and `GET /agents`.
      properties:
        _key:
          type: string
        connectorId:
          type: string
        name:
          type: string
        type:
          type: string
        displayName:
          type: string
        filters:
          description: |
            Knowledge scope filter as stored on the graph edge. The Node `getAgent`
            handler proxies this field unchanged from the AI service (only `agent.id`
            is stripped). May be a JSON string (typical graph storage) or an object.
            Prefer `filtersParsed` on GET for a guaranteed parsed object with the
            same keys as the object branch below.
          oneOf:
          - $ref: '#/components/schemas/AgentKnowledgeFiltersParsed'
          - type: string
            description: JSON-encoded filter object (graph storage format).
        filtersParsed:
          readOnly: true
          description: |
            Server-derived read-only object parsed from the stored
            `filters` JSON by the graph provider on GET (Neo4j / Arango).
            Empty object when `filters` is missing or invalid JSON.
          allOf:
          - $ref: '#/components/schemas/AgentKnowledgeFiltersParsed'
    Agent:
      type: object
      additionalProperties: false
      description: |
        Detailed agent projection returned by agent detail-style endpoints such
        as `GET /agents/{agentKey}`.
      properties:
        _id:
          type: string
          description: Full document id in the backing graph store.
          example: agentInstances/e6f848ca-e2ab-4594-9925-e1136629f474
        _key:
          type: string
          description: Stable agent key used in route params.
          example: e6f848ca-e2ab-4594-9925-e1136629f474
        _rev:
          type: string
          description: Backend document revision token.
          example: _lkNlcOm---
        name:
          type: string
          description: Display name of the agent
          example: Customer Support Assistant
        description:
          type: string
          description: What this agent is designed to do
        systemPrompt:
          type: string
          description: System instructions that define agent behavior
        createdBy:
          type: string
          description: MongoDB user ID of the agent creator
        startMessage:
          type: string
          description: Initial greeting shown when a conversation with this agent starts
        instructions:
          type: string
          nullable: true
          description: Additional agent execution instructions
        models:
          type: array
          description: |
            Configured model entries for this agent.
          example:
          - modelType: llm
            provider: azureOpenAI
            modelName: gpt-5.4-mini
            modelKey: f3a4b5b6-5b6c-4e85-9097-3202cfe696fc
            isMultimodal: true
            isReasoning: true
            isDefault: true
            modelFriendlyName: GPT 5.4 mini
          items:
            oneOf:
            - type: string
            - type: object
              additionalProperties: false
              properties:
                modelKey:
                  type: string
                modelName:
                  type: string
                provider:
                  type: string
                isReasoning:
                  type: boolean
                isMultimodal:
                  type: boolean
                isDefault:
                  type: boolean
                modelType:
                  type: string
                  description: |
                    Model category. Must be `llm` for agent model entries (same
                    value as `ModelType` for LLMs; string only — enum is not used here).
                  example: llm
                modelFriendlyName:
                  type: string
        toolsets:
          type: array
          description: |
            Toolset instances linked to the agent (GET /agents/{agentKey} graph projection).
            Multiple instances of the same integration type are distinguished by `instanceId`
            and optional `instanceName`.
          items:
            $ref: '#/components/schemas/AgentToolset'
        knowledge:
          type: array
          description: Knowledge connectors and indexed scopes linked to the agent
          items:
            $ref: '#/components/schemas/AgentKnowledge'
        shareWithOrg:
          type: boolean
          description: Whether the agent is shared with the whole organization
        webSearch:
          type: object
          additionalProperties: false
          nullable: true
          description: Web search provider attached to this agent. Null when none is configured.
          properties:
            provider:
              type: string
              description: Provider identifier (e.g. "tavily", "serper", "exa", "duckduckgo")
            providerKey:
              type: string
            providerLabel:
              type: string
          required:
          - provider
          example:
            provider: serper
        tags:
          type: array
          items:
            type: string
          description: Free-form agent tags.
        createdAtTimestamp:
          type: integer
          format: int64
          description: Unix epoch timestamp in milliseconds when the agent was created.
        updatedAtTimestamp:
          type: integer
          format: int64
          description: Unix epoch timestamp in milliseconds when the agent was last updated.
        updatedBy:
          type: string
          nullable: true
          description: User id of the last updater, if present.
        isActive:
          type: boolean
          description: Whether the agent is active.
        isDeleted:
          type: boolean
          description: Whether the agent has been soft-deleted.
        isServiceAccount:
          type: boolean
          description: Whether this agent is a service-account agent.
        access_type:
          type: string
          description: How the user can access this agent.
          example: INDIVIDUAL
        user_role:
          type: string
          description: Effective role of the current user on this agent.
          example: OWNER
        can_view:
          type: boolean
          description: Effective permission to view the agent.
        can_share:
          type: boolean
          description: Effective permission to share the agent.
        can_edit:
          type: boolean
          description: Effective permission to edit the agent.
        can_delete:
          type: boolean
          description: Effective permission to delete the agent.
      required:
      - _id
      - _key
      - createdAtTimestamp
      - createdBy
      - isActive
      - isDeleted
      - isServiceAccount
      - models
      - name
      - tags
      - updatedAtTimestamp
      - shareWithOrg
      - knowledge
      - toolsets
      - can_view
      - can_share
      - can_edit
      - can_delete
      - user_role
      - access_type
    AgentListItem:
      type: object
      additionalProperties: false
      description: |
        Agent projection returned by `GET /agents`.

        This is the list-view envelope item emitted by the Python backend and
        forwarded by the Node gateway. It is not the full detail projection
        used by `GET /agents/{agentKey}`.
      properties:
        _id:
          type: string
          description: Full document id in the backing graph store.
          example: agentInstances/e6f848ca-e2ab-4594-9925-e1136629f474
        _key:
          type: string
          description: Stable agent key used in route params.
          example: e6f848ca-e2ab-4594-9925-e1136629f474
        _rev:
          type: string
          description: Backend document revision token.
          example: _lkNlcOm---
        createdAtTimestamp:
          type: integer
          format: int64
          description: Unix epoch timestamp in milliseconds when the agent was created.
        createdBy:
          type: string
          description: MongoDB user ID of the agent creator
        description:
          type: string
          nullable: true
          description: Short human-readable description of the agent.
        instructions:
          type: string
          nullable: true
          description: Additional execution instructions stored on the agent.
        isActive:
          type: boolean
          description: Whether the agent is active.
        isDeleted:
          type: boolean
          description: Whether the agent has been soft-deleted.
        isServiceAccount:
          type: boolean
          description: Whether this agent is a service-account agent.
        models:
          type: array
          description: |
            Model entries configured on the agent.

            For `GET /agents`, the backend returns the stored normalized string
            representation, typically `modelKey_modelName`.
          items:
            type: string
        name:
          type: string
          description: Display name of the agent.
        startMessage:
          type: string
          nullable: true
          description: Greeting shown at conversation start.
        systemPrompt:
          type: string
          nullable: true
          description: System prompt stored on the agent.
        tags:
          type: array
          items:
            type: string
          description: Free-form agent tags.
        updatedAtTimestamp:
          type: integer
          format: int64
          description: Unix epoch timestamp in milliseconds when the agent was last updated.
        updatedBy:
          type: string
          nullable: true
          description: User id of the last updater, if present.
        webSearch:
          type: object
          additionalProperties: false
          nullable: true
          description: |
            Web-search provider attachment for this agent, or `null` when none is attached.

            For `GET /agents`, the response formatter always emits `provider`.
            It may also emit `providerKey` and `providerLabel` when those values
            were present on the stored attachment. It does not emit `iconPath`
            on this response path.
          properties:
            provider:
              type: string
            providerKey:
              type: string
            providerLabel:
              type: string
        shareWithOrg:
          type: boolean
          description: Whether the agent is shared with the organization.
        toolsets:
          type: array
          description: |
            Toolset instances linked to the agent. Same projection as
            `GET /agents/{agentKey}`; the backend builds it from the graph edges
            for each agent on the returned page.
          items:
            $ref: '#/components/schemas/AgentToolset'
        knowledge:
          type: array
          description: |
            Knowledge connectors and indexed scopes linked to the agent. Same
            projection as `GET /agents/{agentKey}`; the backend builds it from
            the graph edges for each agent on the returned page.
          items:
            $ref: '#/components/schemas/AgentKnowledge'
        can_view:
          type: boolean
          description: Effective permission to view the agent.
        can_share:
          type: boolean
          description: Effective permission to share the agent.
        can_edit:
          type: boolean
          description: Effective permission to edit the agent.
        can_delete:
          type: boolean
          description: Effective permission to delete the agent.
        user_role:
          type: string
          description: Effective role of the current user on this agent.
          example: OWNER
        access_type:
          type: string
          description: How the user can access this agent.
          example: INDIVIDUAL
      required:
      - _id
      - _key
      - createdAtTimestamp
      - createdBy
      - isActive
      - isDeleted
      - isServiceAccount
      - models
      - name
      - tags
      - updatedAtTimestamp
      - shareWithOrg
      - toolsets
      - knowledge
      - can_view
      - can_share
      - can_edit
      - can_delete
      - user_role
      - access_type
    AgentListPagination:
      type: object
      additionalProperties: false
      description: Pagination block returned by `GET /agents`.
      required:
      - currentPage
      - limit
      - totalItems
      - totalPages
      - hasNext
      - hasPrev
      properties:
        currentPage:
          type: integer
          description: Current 1-based page number.
          example: 1
        limit:
          type: integer
          description: Page size actually applied by the backend.
          example: 20
        totalItems:
          type: integer
          description: Total number of matching agents across all pages.
          example: 2
        totalPages:
          type: integer
          description: Total number of pages for the current query.
          example: 1
        hasNext:
          type: boolean
          description: Whether a later page exists.
          example: false
        hasPrev:
          type: boolean
          description: Whether an earlier page exists.
          example: false
    AgentListResponse:
      type: object
      additionalProperties: false
      description: |
        Paginated response returned by `GET /agents`.

        The Node gateway forwards the Python backend response on success. If
        the backend returns a non-200 response, the gateway still returns HTTP
        200 with `success: true`, an empty `agents` array, and a zeroed
        pagination block derived from the requested `page` / `limit`.
      required:
      - success
      - agents
      - pagination
      properties:
        success:
          type: boolean
          example: true
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentListItem'
        pagination:
          $ref: '#/components/schemas/AgentListPagination'
    GetAgentResponse:
      type: object
      additionalProperties: false
      description: |
        Success envelope returned by `GET /agents/{agentKey}`.

        The Node gateway forwards the backend response as an envelope with a
        top-level status/message and the detailed agent projection nested under
        `agent`.
      required:
      - status
      - message
      - agent
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Agent retrieved successfully
        agent:
          $ref: '#/components/schemas/Agent'
    AgentCreateModelEntry:
      description: |
        Accepted model entry for `POST /agents/create`.
        The gateway accepts either a non-empty string model entry or an object entry
        with a required `modelKey`.

        The `models` array must include at least one object entry with `isReasoning: true`.
        String-only entries are schema-valid but are rejected at the gateway with HTTP 400.
      oneOf:
      - type: string
        minLength: 1
      - type: object
        additionalProperties: false
        required:
        - modelKey
        properties:
          modelKey:
            type: string
            minLength: 1
          modelName:
            type: string
          provider:
            type: string
          isReasoning:
            type: boolean
    AgentCreateToolRef:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
        fullName:
          type: string
        description:
          type: string
          maxLength: 10000
    AgentCreateToolsetName:
      type: string
      description: Registered toolset name (lowercase) accepted by the create-agent gateway.
      enum:
      - calendar
      - clickup
      - confluence
      - drive
      - github
      - gmail
      - jira
      - lumos
      - mariadb
      - onedrive
      - outlook
      - redshift
      - salesforce
      - sharepoint
      - slack
      - teams
      - zoom
    AgentCreateToolset:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          $ref: '#/components/schemas/AgentCreateToolsetName'
        displayName:
          type: string
          maxLength: 200
        type:
          type: string
          maxLength: 100
        instanceId:
          type: string
          maxLength: 256
        instanceName:
          type: string
          maxLength: 200
        tools:
          type: array
          items:
            $ref: '#/components/schemas/AgentCreateToolRef'
    AgentCreateKnowledge:
      type: object
      additionalProperties: false
      required:
      - connectorId
      properties:
        connectorId:
          type: string
        filters:
          oneOf:
          - $ref: '#/components/schemas/AgentKnowledgeFiltersParsed'
          - type: string
          - type: array
            items: {}
    AgentCreateWebSearch:
      description: |
        Accepted web-search attachment for `POST /agents/create`.
        The gateway accepts either a provider string or an object with at least
        a `provider` field.
      anyOf:
      - type: string
      - type: object
        additionalProperties: false
        properties:
          provider:
            type: string
          providerKey:
            type: string
            maxLength: 256
          providerLabel:
            type: string
            maxLength: 200
          iconPath:
            type: string
            maxLength: 500
        required:
        - provider
      - type: 'null'
    AgentCreateRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - models
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Agent display name
          example: Product Support Agent
        description:
          type: string
          maxLength: 100000
          description: What the agent does
        startMessage:
          type: string
          maxLength: 100000
          description: Initial greeting shown when conversation starts
        systemPrompt:
          type: string
          maxLength: 100000
          description: System instructions for the agent
        instructions:
          type: string
          maxLength: 100000
          description: Additional agent execution instructions
        models:
          type: array
          minItems: 1
          description: |
            Agent model configuration entries. The gateway requires at least one
            object entry with `isReasoning: true`. String-only arrays are schema-valid
            but rejected at runtime with HTTP 400.
          items:
            $ref: '#/components/schemas/AgentCreateModelEntry'
        tags:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 100
        shareWithOrg:
          type: boolean
          default: false
          description: Share agent with the organization
        isServiceAccount:
          type: boolean
          default: false
          description: Create the agent as a service-account agent
        toolsets:
          type: array
          maxItems: 100
          description: Toolsets attached to the agent (instance-aware)
          items:
            $ref: '#/components/schemas/AgentCreateToolset'
        knowledge:
          type: array
          maxItems: 100
          description: Knowledge sources connected to the agent
          items:
            $ref: '#/components/schemas/AgentCreateKnowledge'
        webSearch:
          $ref: '#/components/schemas/AgentCreateWebSearch'
    AgentCreateWarning:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        error:
          type: string
    AgentCreateResponseTool:
      type: object
      additionalProperties: false
      required:
      - name
      - fullName
      - key
      properties:
        name:
          type: string
        fullName:
          type: string
        key:
          type: string
    AgentCreateResponseToolset:
      type: object
      additionalProperties: false
      required:
      - name
      - displayName
      - key
      - tools
      properties:
        name:
          $ref: '#/components/schemas/AgentCreateToolsetName'
        displayName:
          type: string
          description: Human-readable toolset product label (for example `Jira` or `Slack`).
        key:
          type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/AgentCreateResponseTool'
    AgentCreateResponseKnowledge:
      type: object
      additionalProperties: false
      required:
      - connectorId
      - key
      - filters
      properties:
        connectorId:
          type: string
        key:
          type: string
        filters:
          oneOf:
          - type: object
            additionalProperties: true
          - type: string
          - type: array
            items: {}
    AgentCreateResponseAgent:
      type: object
      additionalProperties: false
      required:
      - _key
      - name
      - description
      - startMessage
      - systemPrompt
      - instructions
      - models
      - tags
      - webSearch
      - isActive
      - isServiceAccount
      - createdBy
      - updatedBy
      - createdAtTimestamp
      - updatedAtTimestamp
      - isDeleted
      - toolsets
      - knowledge
      properties:
        _key:
          type: string
        name:
          type: string
        description:
          type: string
        startMessage:
          type: string
        systemPrompt:
          type: string
        instructions:
          type: string
          nullable: true
        models:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        webSearch:
          anyOf:
          - type: object
            additionalProperties: false
            properties:
              provider:
                type: string
              providerKey:
                type: string
              providerLabel:
                type: string
          - type: 'null'
        isActive:
          type: boolean
        isServiceAccount:
          type: boolean
        createdBy:
          type: string
        updatedBy:
          type: string
          nullable: true
        createdAtTimestamp:
          type: integer
        updatedAtTimestamp:
          type: integer
        isDeleted:
          type: boolean
        toolsets:
          type: array
          items:
            $ref: '#/components/schemas/AgentCreateResponseToolset'
        knowledge:
          type: array
          items:
            $ref: '#/components/schemas/AgentCreateResponseKnowledge'
    AgentCreateResponse:
      type: object
      additionalProperties: false
      required:
      - status
      - message
      - agent
      properties:
        status:
          type: string
          enum:
          - success
          - partial_success
        message:
          type: string
        agent:
          $ref: '#/components/schemas/AgentCreateResponseAgent'
        warnings:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/AgentCreateWarning'
          - type: 'null'
    AgentUpdateRequest:
      type: object
      additionalProperties: false
      description: |
        Partial update payload for `PUT /agents/{agentKey}`.

        Every field is optional — only the fields present in the request body
        are updated. When `models` is included, the gateway Zod middleware
        (mirroring the Python backend) requires at least one model entry and
        at least one object entry with `isReasoning: true`.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Agent display name
          example: Renamed Agent
        description:
          type: string
          maxLength: 100000
          description: What the agent does
        startMessage:
          type: string
          maxLength: 100000
          description: Initial greeting shown when conversation starts
        systemPrompt:
          type: string
          maxLength: 100000
          description: System instructions for the agent
        instructions:
          type: string
          maxLength: 100000
          description: Additional agent execution instructions
        models:
          type: array
          minItems: 1
          description: |
            Agent model configuration entries. When present, the Zod middleware
            requires at least one object entry with `isReasoning: true`.
            String-only arrays are schema-valid but rejected at runtime with HTTP 400.
          items:
            $ref: '#/components/schemas/AgentCreateModelEntry'
        tags:
          type: array
          maxItems: 50
          items:
            type: string
