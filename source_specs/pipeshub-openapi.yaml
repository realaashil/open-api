openapi: 3.0.0
servers:
  - url: "{instance_url}/api/v1"
    description: Base API URL
    variables:
      instance_url:
        default: https://app.pipeshub.com
        description: Base server URL (without /api/v1)
  - url: "{instance_url}"
    description: Root URL (used for MCP endpoints mounted at /mcp)
    variables:
      instance_url:
        default: https://app.pipeshub.com
        description: Base server URL

info:
  title: PipesHub API
  description: |
    Unified API documentation for PipesHub services.

    PipesHub is an enterprise-grade platform providing:
    - User authentication and management
    - Document storage and version control
    - Knowledge base management
    - Enterprise search and conversational AI
    - Third-party integrations via connectors
    - System configuration management
    - Crawling job scheduling
    - Email services

    ## Authentication
    Most endpoints require JWT Bearer token authentication. Some internal endpoints use scoped tokens for service-to-service communication.

    **OAuth 2.0 Bearer tokens** from `POST /oauth2/token` use the same `Authorization: Bearer` header. For **`client_credentials`**, machine tokens may encode `userId === client_id` in the JWT; the **Node API gateway** resolves the OAuth **app creator**, sets the authenticated user accordingly, and forwards **`x-oauth-user-id`** to Python services on proxied calls. Do not send **`x-oauth-user-id`** yourself—the gateway removes untrusted values on ingress. See the **OAuth Provider** tag for full behavior.

    ## Base URLs
    All endpoints use the `/api/v1` prefix unless otherwise noted.
  version: 1.0.0
  contact:
    name: API Support
    email: support@pipeshub.com

paths:
  /userAccount/initAuth:
    post:
      tags:
        - User Account
      summary: Initialize authentication session
      description: |
        Start a server-side authentication session and discover which sign-in methods are
        configured for the organization. This is the first step in the multi-step login flow.

        **Request body (optional)**

        - You may omit the body, send an empty JSON object `{}`, or send `{ "email": "..." }`.
        - `email` in the body is optional and kept for legacy reasons; omitting it does not prevent
          initialization. The web client typically calls this endpoint without a body and sends
          `email` on `/authenticate` instead.
        - When provided, `email` is stored on the session for correlation with subsequent steps.

        **Flow:**

        1. Call this endpoint (optional JSON body as above).
        2. Receive a session token in the `x-session-token` response header.
        3. Send that token on subsequent `/authenticate` requests (`x-session-token` header).
        4. Use `allowedMethods` and `authProviders` from the response to render the login UI.

        **Session token**

        - Returned as header `x-session-token`.
        - Required for `/authenticate` (and related steps) until it expires.

        **Multi-factor authentication**

        If the organization has MFA, complete multiple authentication steps; each step may
        return the next step's allowed methods.
      operationId: initAuth
      security: []
      requestBody:
        description: |
          Optional. Omit entirely or send `{}`. You may include `email` for legacy compatibility (pre-fills the session); invalid `email` format is rejected when the field is present.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitAuthRequest"
        required: false
      responses:
        "200":
          description: Authentication session initialized successfully
          headers:
            x-session-token:
              schema:
                type: string
              description: Session token for subsequent authentication requests. Store this securely.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitAuthResponse"
        "400":
          description: Invalid request (e.g. malformed `email` when that property is sent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /userAccount/authenticate:
    post:
      tags:
        - User Account
      summary: Authenticate user with credentials
      description: |
        Authenticate a user using the specified method and credentials.
        Requires a valid session token from `/initAuth`.

        **Credential Formats by Method:**

        - `password`: `{ "credentials": { "password": "your-password" } }`
        - `otp`: `{ "credentials": { "otp": "123456" } }` (6-digit code, valid for 10 minutes)
        - `google`: `{ "credentials": "google-id-token-string" }`
        - `microsoft`: `{ "credentials": { "accessToken": "...", "idToken": "..." } }`
        - `azureAd`: `{ "credentials": { "accessToken": "...", "idToken": "..." } }`
        - `oauth`: `{ "credentials": { "accessToken": "...", "idToken": "..." } }`
        - `samlSso`: Handled via redirect flow (use `/saml/signIn` instead)

        **Multi-Step Response:**

        If organization uses MFA, successful authentication returns:
        - `status: "success"` with `nextStep` and `allowedMethods` for next step

        **Fully Authenticated Response:**

        After completing all steps:
        - `message: "Fully authenticated"` with `accessToken` (1hr) and `refreshToken` (7d)

        **Security:**

        - Account locks after 5 consecutive failed attempts
        - CAPTCHA may be required if enabled (pass `cf-turnstile-response`)
      operationId: authenticate
      security: []
      parameters:
        - name: x-session-token
          in: header
          required: true
          description: Session token received from `/initAuth` endpoint
          schema:
            type: string
      requestBody:
        description: Request payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticateRequest"
        required: true
      responses:
        "200":
          description: Authentication step successful or fully authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticateResponse"
        "400":
          description: Invalid request, method not allowed, invalid credential format or Account blocked due to too many failed attempts (5 attempts max)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials (wrong password, expired OTP, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session expired or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: OTP has expired (valid for 10 minutes)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /userAccount/password/reset/token:
    post:
      tags:
        - User Account
      summary: Reset password with email token
      description: |
        Reset password using a token received via email from the forgot password flow.

        **Password Requirements:**

        - Minimum 8 characters
        - At least 1 uppercase letter
        - At least 1 lowercase letter
        - At least 1 number
        - At least 1 special character (#?!@$%^&*-)

        **Security Notes:**

        - Token is single-use and expires after a set time
        - Response body contains a confirmation string in `data`
      operationId: resetPasswordWithToken
      security:
        - scopedToken: []
      requestBody:
        description: Request payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenPasswordResetRequest"
        required: true
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataStringResponse"
        "400":
          description: Invalid request or password doesn't meet requirements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing, invalid or expired password reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /userAccount/password/reset:
    post:
      tags:
        - User Account
      summary: Reset password
      description: |
        Reset the password for the currently authenticated user.

        **Overview:**

        Allows a logged-in user to change their password by providing the current password and a new password.
      operationId: resetPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                cf-turnstile-response:
                  type: string
                  description: Cloudflare Turnstile CAPTCHA token (required when Turnstile is configured server-side)
      responses:
        "200":
          description: Password reset successfully - returns new access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedPasswordResetResponse"
        "400":
          description: |
            Bad request. Possible causes:
            - `currentPassword` or `newPassword` missing from request body
            - Current and new password are the same (plain-text comparison)
            - New password does not meet strength requirements (min 8 chars, uppercase, lowercase, number, special character)
            - Old and new password are the same (hash comparison against stored password)
            - Account is blocked due to too many incorrect login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            Unauthorized. Possible causes:
            - Invalid or expired access token
            - Current password is incorrect
            - Invalid CAPTCHA verification (when Turnstile is configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found. Possible causes:
            - Auth container not found
            - User credentials not found (no password set for account)
            - User not found in IAM service
            - Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orgAuthConfig/authMethods:
    get:
      tags:
        - Organization Auth Config
      summary: Get organization authentication methods
      description: |
        Retrieve the configured authentication methods for the organization.

        **Response Structure:**

        Returns an array of authentication steps, each containing:
        - `order`: Step number (1-3)
        - `allowedMethods`: Array of methods allowed for that step

        **Example Response:**

        ```json
        {
          "authMethods": [
            { "order": 1, "allowedMethods": [{ "type": "password" }, { "type": "google" }] },
            { "order": 2, "allowedMethods": [{ "type": "otp" }] }
          ]
        }
        ```

        **Admin Access Required:** Only organization admins can view auth configuration.
      operationId: getAuthMethods
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authentication methods retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"
        "400":
          description: |
            Bad request. Possible causes:
            - User is not an organization admin
            - User not authenticated (token decoded but `req.user` is null)
            - Organization ID missing from token payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - invalid or expired access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found. Possible causes:
            - Auth container not found
            - Account not found (userId or orgId missing)
            - Admin check failed in IAM service
            - Organization auth configuration not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orgAuthConfig/updateAuthMethod:
    post:
      tags:
        - Organization Auth Config
      summary: Update organization authentication methods
      description: |
        Update the authentication methods configuration for an organization.
        This allows admins to configure single or multi-factor authentication.

        **Validation Rules:**
        - Minimum 1 step, maximum 3 steps
        - Each step must have a unique order (1, 2, or 3)
        - No duplicate methods within the same step
        - No method can appear in multiple steps
        - Each step must have at least one allowed method

        **Available Methods:**
        - `password`: Email/password authentication
        - `otp`: One-time password via email
        - `google`: Google OAuth 2.0
        - `microsoft`: Microsoft OAuth 2.0
        - `azureAd`: Azure Active Directory
        - `samlSso`: SAML 2.0 Single Sign-On
        - `oauth`: Generic OAuth 2.0 provider

        **Example - Single Factor (Password or Google):**

        ```json
        {
          "authMethod": [
            { "order": 1, "allowedMethods": [{ "type": "password" }, { "type": "google" }] }
          ]
        }
        ```

        **Example - Two Factor (Password + OTP):**

        ```json
        {
          "authMethod": [
            { "order": 1, "allowedMethods": [{ "type": "password" }] },
            { "order": 2, "allowedMethods": [{ "type": "otp" }] }
          ]
        }
        ```

        **Admin Access Required:** Only organization admins can update auth configuration.
      operationId: updateAuthMethod
      security:
        - bearerAuth: []
      requestBody:
        description: Request payload
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - authMethod
              properties:
                authMethod:
                  type: array
                  description: Authentication steps to set for the organization (1-3 steps)
                  minItems: 1
                  maxItems: 3
                  items:
                    $ref: "#/components/schemas/AuthStep"
      responses:
        "200":
          description: Authentication methods updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAuthMethodResponse"
        "400":
          description: |
            Bad request. Possible causes:
            - User is not an organization admin
            - `authMethod` field missing from request body
            - Validation failure (duplicate steps, duplicate methods, out-of-range order, empty methods array)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            Unauthorized. Possible causes:
            - Invalid or expired access token
            - User not authenticated (token decoded but `req.user` is null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found. Possible causes:
            - Auth container not found
            - Account not found (userId or orgId missing)
            - Admin check failed in IAM service
            - Organization auth configuration not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orgAuthConfig:
    post:
      tags:
        - Organization Auth Config
      summary: Set up auth configuration
      description: |
        Set up or initialize the organization's authentication configuration.
      operationId: setUpAuthConfig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Organization setup details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgAuthConfigCreateRequest"
      responses:
        "200":
          description: Auth configuration already exists for this deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgAuthConfigSetupResponse"
        "201":
          description: Auth configuration created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgAuthConfigSetupResponse"
        "400":
          description: |
            Bad request. Possible causes:
            - User is not an organization admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - invalid or expired access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: |
            Not found. Possible causes:
            - Auth container not found
            - Account not found (userId or orgId missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /org:
    get:
      tags:
        - Organizations
      summary: Get current organization
      description: |
        Retrieve details about the authenticated user's organization.<br><br>
        <b>Overview:</b><br>
        This endpoint returns complete information about the current user's organization, including profile data, settings, and configuration. Use this for organization profile pages and settings.<br><br>
        <b>Response Includes:</b><br>
        <ul>
        <li>Organization profile (name, email, address)</li>
        <li>Account type and billing status</li>
        <li>Feature flags and limits</li>
        <li>Branding settings (logo, colors)</li>
        <li>Creation and modification timestamps</li>
        </ul>
        <b>Use Cases:</b><br>
        <ul>
        <li>Organization profile pages</li>
        <li>Settings and configuration screens</li>
        <li>Billing and subscription displays</li>
        <li>White-label branding retrieval</li>
        </ul>
        <b>Note:</b><br>
        All authenticated users can access this endpoint to view their organization's details.
      operationId: getCurrentOrganization
      security:
        - bearerAuth: []
        - oauth2:
            - org:read
      responses:
        "200":
          description: Organization details retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized - Valid bearer token required
        "404":
          description: Organization not found - User's organization does not exist
  /knowledgeBase/knowledge-hub/nodes:
    get:
      tags:
        - Knowledge Hub
      summary: Get knowledge hub root nodes
      description: |
        Returns root-level nodes (connector apps and Collection apps) or, when
        filters or search are applied, a flat list of matching nodes across the
        entire knowledge hub tree.

        **Overview**

        The Knowledge Hub provides a unified view across all knowledge sources:
        - **Collection** — locally uploaded knowledge bases (`origin: COLLECTION`)
        - **Connector app** — external connector instances such as Google Drive,
          Slack, Confluence, Jira (`origin: CONNECTOR`)

        Use this endpoint to build file-browser UIs and sidebar navigation trees.

        **Browsing vs. searching**

        When no filters or search query are provided, only top-level app nodes
        are returned. Adding `nodeTypes`, `q`, or other filter params triggers a
        search across the full tree, returning matching nodes regardless of depth.

        For children of a specific node, use
        `GET /knowledgeBase/knowledge-hub/nodes/{parentType}/{parentId}`.

        **Pagination and sorting**

        Results are always paginated. Default sort is `updatedAt` descending.
        The `pagination` object in the response contains `hasNext` / `hasPrev`
        flags suitable for infinite-scroll or page-based navigation.

        **Expanding the response**

        Use the `include` parameter to request additional sections:
        - `availableFilters` — adds `filters.available` with all filter options
        - `counts` — adds a `counts` summary broken down by node type
        - `breadcrumbs` — adds the breadcrumb trail (empty at root level)
        - `permissions` — adds the caller's permission flags

        **Access control**

        Requires a valid bearer token. For OAuth tokens the `kb:read` scope
        must be present; regular JWT bearer tokens pass through without scope
        enforcement.
      operationId: getKnowledgeHubRootNodes
      security:
        - bearerAuth: []
        - oauth2:
            - kb:read
      parameters:
        - name: onlyContainers
          in: query
          required: false
          description: |
            When `true`, only nodes that have children are returned (useful for
            building sidebar / tree navigation). Leaf nodes are excluded.
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          required: false
          description: |
            Page number (1-indexed). Combined with `limit` to paginate results.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of items to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: sortBy
          in: query
          required: false
          description: |
            Field to sort results by. Omitted → default `updatedAt`.
            Unknown value → silently falls back to `name`.
          schema:
            type: string
            enum:
              - name
              - createdAt
              - updatedAt
              - size
              - type
            default: updatedAt
        - name: sortOrder
          in: query
          required: false
          description: |
            Sort direction. Omitted → default `desc`.
            Unknown value → silently falls back to `asc`.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: q
          in: query
          required: false
          description: |
            Full-text search query. Must be between 2 and 500 characters
            (inclusive). When provided, the endpoint searches across the entire
            node tree regardless of the current browse level.
          schema:
            type: string
            minLength: 2
            maxLength: 500
          example: quarterly report
        - name: nodeTypes
          in: query
          required: false
          description: |
            Comma-separated list of node types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `folder`, `app`, `recordGroup`, `record`
          schema:
            type: string
          example: app,recordGroup
        - name: recordTypes
          in: query
          required: false
          description: |
            Comma-separated list of record types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `FILE`, `DRIVE`, `WEBPAGE`, `DATABASE`, `DATASOURCE`,
            `MESSAGE`, `MAIL`, `GROUP_MAIL`, `TICKET`, `COMMENT`,
            `INLINE_COMMENT`, `CONFLUENCE_PAGE`, `CONFLUENCE_BLOGPOST`,
            `SHAREPOINT_PAGE`, `SHAREPOINT_LIST`, `SHAREPOINT_LIST_ITEM`,
            `SHAREPOINT_DOCUMENT_LIBRARY`, `LINK`, `PROJECT`, `PULL_REQUEST`,
            `MEETING`, `PRODUCT`, `DEAL`, `CASE`, `TASK`, `ARTIFACT`,
            `CODE_FILE`, `SQL_TABLE`, `SQL_VIEW`, `OTHERS`
          schema:
            type: string
          example: FILE,CONFLUENCE_PAGE
        - name: origins
          in: query
          required: false
          description: |
            Comma-separated list of origin types to include. Invalid values are
            silently ignored. Maximum 100 items.

            Valid values: `COLLECTION`, `CONNECTOR`
          schema:
            type: string
          example: CONNECTOR
        - name: connectorIds
          in: query
          required: false
          description: |
            Comma-separated list of connector instance IDs (UUIDs) to filter by.
            Maximum 100 items. No enum validation — any string is accepted, but
            non-existent IDs simply yield zero results.
          schema:
            type: string
          example: f3a4b5b6-5b6c-4e85-9097-3202cfe696fc
        - name: indexingStatus
          in: query
          required: false
          description: |
            Comma-separated list of indexing statuses to include. Invalid values
            are silently ignored. Maximum 100 items.

            Valid values: `NOT_STARTED`, `PAUSED`, `IN_PROGRESS`, `COMPLETED`,
            `FAILED`, `FILE_TYPE_NOT_SUPPORTED`, `AUTO_INDEX_OFF`, `EMPTY`,
            `ENABLE_MULTIMODAL_MODELS`, `QUEUED`
          schema:
            type: string
          example: COMPLETED,FAILED
        - name: createdAt
          in: query
          required: false
          description: |
            Created-date range filter. Format: `gte:<epochMs>,lte:<epochMs>`.
            Both bounds are optional (you may send just `gte:...` or just
            `lte:...`). Timestamps must be in the range 0 to 9999999999999 and
            `gte` must be less than or equal to `lte` when both are present.
          schema:
            type: string
          example: gte:1700000000000,lte:1710000000000
        - name: updatedAt
          in: query
          required: false
          description: |
            Updated-date range filter. Same format and constraints as `createdAt`.
          schema:
            type: string
          example: gte:1700000000000,lte:1710000000000
        - name: size
          in: query
          required: false
          description: |
            File-size range filter in bytes. Format: `gte:<bytes>,lte:<bytes>`.
            Both bounds are optional. Values must be non-negative and at most
            1099511627776 (1 TB). `gte` must be less than or equal to `lte`
            when both are present.
          schema:
            type: string
          example: gte:0,lte:10485760
        - name: include
          in: query
          required: false
          description: |
            Comma-separated list of additional response sections to include.
            Invalid values are silently ignored. Maximum 100 items.

            Valid values: `breadcrumbs`, `counts`, `availableFilters`, `permissions`
          schema:
            type: string
          example: availableFilters,counts
      responses:
        "200":
          description: |
            Paginated list of root hub nodes (connector apps and Collections).
            HTTP 200 returns `success: true` and `error: null`. Field-level detail
            and required keys are defined on `KnowledgeHubNodesResponse`.

            Use `include` for optional sections: `availableFilters`, `counts`,
            `permissions` — each stays JSON `null` when not asked for.
            `breadcrumbs` stays `null` at this route (no parent in the path),
            even if `include` lists `breadcrumbs`; use the child route for trails.
            `id`, `currentNode`, and `parentNode` are `null` here.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeHubNodesResponse"
              examples:
                root_apps:
                  summary: Root-level apps with availableFilters included
                  value:
                    success: true
                    error: null
                    id: null
                    currentNode: null
                    parentNode: null
                    items:
