                            archivedAt:
                              type: string
                              format: date-time
                              description: Timestamp when the conversation was archived
                  pagination:
                    type: object
                    additionalProperties: false
                    properties:
                      page:
                        type: integer
                        description: Current page number
                      limit:
                        type: integer
                        description: Items per page
                      totalCount:
                        type: integer
                        description: Total archived conversations matching the filter
                      totalPages:
                        type: integer
                        description: Total pages at the current limit
                      hasNextPage:
                        type: boolean
                        description: Whether a next page exists
                      hasPrevPage:
                        type: boolean
                        description: Whether a previous page exists
                  filters:
                    type: object
                    additionalProperties: false
                    description: Filters applied to this request and filters available for clients to use
                    properties:
                      applied:
                        type: object
                        additionalProperties: false
                        properties:
                          filters:
                            type: array
                            description: Names of filters that were applied
                            items:
                              type: string
                          values:
                            type: object
                            additionalProperties: true
                            description: Map of applied filter name to its current value
                      available:
