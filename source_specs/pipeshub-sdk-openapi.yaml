      type: object
      additionalProperties: false
      description: Response from `POST /teams` (Python create team).
      required:
      - status
      - message
      - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Team created successfully
        data:
          $ref: '#/components/schemas/TeamDetail'
    TeamUpdateRequest:
      type: object
      additionalProperties: false
      description: Partial update for `PUT /teams/{teamId}`. Validated by `updateTeamSchema` (Zod).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Team display name
        description:
          type: string
          maxLength: 500
          description: Team description
        addUserRoles:
          type: array
          items:
            $ref: '#/components/schemas/TeamMemberRoleEntry'
          description: Members to add, each with Mongo userId and role
        removeUserIds:
          type: array
          items:
            type: string
            pattern: ^[a-fA-F0-9]{24}$
          description: Mongo user IDs of members to remove
        updateUserRoles:
          type: array
          items:
            $ref: '#/components/schemas/TeamMemberRoleEntry'
          description: Member role updates, each with Mongo userId and role
    TeamMutationResponse:
      type: object
      additionalProperties: false
      description: |
        Success envelope with updated team (`status`, `message`, `team`).
        Returned by update/add/remove/permissions mutations from Python.
      required:
      - status
      - message
      - team
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        team:
          $ref: '#/components/schemas/TeamDetail'
    TeamDeleteResponse:
      type: object
      additionalProperties: false
      required:
      - status
      - message
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Team deleted successfully
    TeamUsersListResponse:
      type: object
      additionalProperties: false
      description: Response from `GET /teams/{teamId}/users`.
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        team:
          $ref: '#/components/schemas/TeamDetail'
        pagination:
          $ref: '#/components/schemas/TeamUsersPagination'
    DateRangeFilter:
      type: object
      description: Date range filter with optional inclusive bounds (epoch ms).
      properties:
        gte:
          type: integer
          nullable: true
          description: Greater-than-or-equal bound (epoch ms).
        lte:
          type: integer
          nullable: true
          description: Less-than-or-equal bound (epoch ms).
    SizeRangeFilter:
      type: object
      description: Size range filter with optional inclusive bounds (bytes).
      properties:
        gte:
          type: integer
          nullable: true
          description: Greater-than-or-equal bound (bytes).
        lte:
          type: integer
          nullable: true
          description: Less-than-or-equal bound (bytes).
    FilterOption:
      type: object
      description: A single filter option for knowledge hub filters.
      required:
      - id
      - label
      properties:
        id:
          type: string
          description: Filter ID value to send in requests.
        label:
          type: string
          description: Display label for the filter.
        type:
          type: string
          nullable: true
          description: Additional type information (currently unused, may be null).
        connectorType:
          type: string
          nullable: true
          description: Connector type/name. Set only for entries in the `connectors` list.
    KnowledgeHubNode:
      type: object
      description: |
        One element of `items`. The live API keeps keys stable and sets
        inapplicable values to JSON `null` (not omitted).
      required:
      - id
      - name
      - nodeType
      - parentId
      - origin
      - connector
      - recordType
      - recordGroupType
      - indexingStatus
      - reason
      - createdAt
      - updatedAt
      - sizeInBytes
      - mimeType
      - extension
      - webUrl
      - hasChildren
      - previewRenderable
      - permission
      - sharingStatus
      - isInternal
      properties:
        id:
          type: string
          description: Unique identifier for the node.
        name:
          type: string
          description: Display name of the node.
        nodeType:
          type: string
          enum:
          - app
          - recordGroup
          - folder
          - record
          description: Type of the node (app, recordGroup, folder, or record).
        parentId:
          type: string
          nullable: true
          description: Parent node ID, or `null` at the root browse level.
        origin:
          type: string
          enum:
          - COLLECTION
          - CONNECTOR
          description: Origin type.
        connector:
          type: string
          nullable: true
          description: Connector display name / key when applicable; otherwise `null`.
        recordType:
          type: string
          nullable: true
          description: Record type when `nodeType` is `record`; otherwise `null`.
        recordGroupType:
          type: string
          nullable: true
          description: Record group type when `nodeType` is `recordGroup`; otherwise `null`.
        indexingStatus:
          type: string
          nullable: true
          description: Indexing status when `nodeType` is `record`; otherwise `null`.
        reason:
          type: string
          nullable: true
          description: Failure or status reason when set; otherwise `null`.
        isInternal:
          type: boolean
          description: True for internal/system nodes that do not originate from a source.
        createdAt:
          type: integer
          description: Creation timestamp (epoch ms).
        updatedAt:
          type: integer
          description: Update timestamp (epoch ms).
        sizeInBytes:
          type: integer
          nullable: true
          description: File size in bytes for file records; otherwise `null`.
        mimeType:
          type: string
          nullable: true
        extension:
          type: string
          nullable: true
        webUrl:
          type: string
          nullable: true
        hasChildren:
          type: boolean
          description: Whether the node has children (sidebar / tree).
        previewRenderable:
          type: boolean
          nullable: true
        permission:
          type: object
          nullable: true
          description: Per-item permission when `include=permissions` is requested; otherwise `null`.
          required:
          - role
          - canEdit
          - canDelete
          properties:
            role:
              type: string
            canEdit:
              type: boolean
            canDelete:
              type: boolean
        sharingStatus:
          type: string
          nullable: true
          description: |
            Sharing status (e.g. `private`, `shared`, `team`, `workspace`) when
            applicable; otherwise `null`.
    KnowledgeHubNodesResponse:
      type: object
      description: |
        Response body for the Knowledge Hub nodes API. The deployed service
        serialises optional values as JSON `null` and always includes the keys
        listed in `required` (Swagger / clients will see stable shapes, not
        omitted properties).
      required:
      - success
      - error
      - id
      - currentNode
      - parentNode
      - items
      - pagination
      - filters
      - breadcrumbs
      - counts
      - permissions
      properties:
        success:
          type: boolean
          enum:
          - true
          description: Always `true` on HTTP 200. Failures use 4xx/5xx error envelopes, not this body shape.
        error:
          type: string
          nullable: true
          description: Always `null` on HTTP 200.
        id:
          type: string
          nullable: true
          description: Current parent node ID when browsing children; `null` at root.
        currentNode:
          type: object
          nullable: true
          description: Node being browsed when `parentId` is in the path; `null` at root.
          required:
          - id
          - name
          - nodeType
          properties:
            id:
              type: string
            name:
              type: string
            nodeType:
              type: string
              description: One of `app`, `recordGroup`, `folder`, `record`.
            subType:
              type: string
              nullable: true
              description: Connector name or record type when applicable; otherwise `null`.
        parentNode:
          type: object
          nullable: true
          description: Parent of `currentNode` when present; `null` when not applicable.
          required:
          - id
          - name
          - nodeType
          properties:
            id:
              type: string
            name:
              type: string
            nodeType:
              type: string
              description: One of `app`, `recordGroup`, `folder`, `record`.
            subType:
              type: string
              nullable: true
        items:
          type: array
          description: Page of nodes for the current browse or search.
          items:
            $ref: '#/components/schemas/KnowledgeHubNode'
        pagination:
          type: object
          required:
          - page
          - limit
          - totalItems
          - totalPages
          - hasNext
          - hasPrev
          properties:
            page:
              type: integer
              description: Current page (1-indexed).
            limit:
              type: integer
              description: Page size.
            totalItems:
              type: integer
            totalPages:
              type: integer
            hasNext:
              type: boolean
            hasPrev:
              type: boolean
        filters:
          type: object
          required:
          - applied
          - available
          properties:
            applied:
              type: object
              description: Echo of applied filters; unused slots are JSON `null`.
              required:
              - q
              - nodeTypes
              - recordTypes
              - origins
              - connectorIds
              - indexingStatus
              - createdAt
              - updatedAt
              - size
              - sortBy
              - sortOrder
              properties:
                q:
                  type: string
                  nullable: true
                nodeTypes:
                  type: array
                  nullable: true
                  items:
                    type: string
                recordTypes:
                  type: array
                  nullable: true
                  items:
                    type: string
                origins:
                  type: array
                  nullable: true
                  items:
                    type: string
                connectorIds:
                  type: array
                  nullable: true
                  items:
                    type: string
                indexingStatus:
                  type: array
                  nullable: true
                  items:
                    type: string
                createdAt:
                  nullable: true
                  allOf:
                  - $ref: '#/components/schemas/DateRangeFilter'
                updatedAt:
                  nullable: true
                  allOf:
                  - $ref: '#/components/schemas/DateRangeFilter'
                size:
                  nullable: true
                  allOf:
                  - $ref: '#/components/schemas/SizeRangeFilter'
                sortBy:
                  type: string
                  description: Effective sort field after server normalisation.
                sortOrder:
                  type: string
                  description: Effective sort order after server normalisation.
            available:
              type: object
              nullable: true
              description: Populated when `include=availableFilters`; otherwise `null`.
              required:
              - nodeTypes
              - recordTypes
              - origins
              - connectors
              - indexingStatus
              - sortBy
              - sortOrder
              properties:
                nodeTypes:
                  type: array
                  items:
                    $ref: '#/components/schemas/FilterOption'
                recordTypes:
                  type: array
                  items:
                    $ref: '#/components/schemas/FilterOption'
                origins:
                  type: array
                  items:
                    $ref: '#/components/schemas/FilterOption'
                connectors:
                  type: array
                  items:
                    $ref: '#/components/schemas/FilterOption'
                indexingStatus:
                  type: array
                  items:
                    $ref: '#/components/schemas/FilterOption'
                sortBy:
                  type: array
                  items:
                    $ref: '#/components/schemas/FilterOption'
                sortOrder:
                  type: array
                  items:
                    $ref: '#/components/schemas/FilterOption'
        breadcrumbs:
          type: array
          nullable: true
          description: Present when `include=breadcrumbs`; otherwise `null`.
          items:
            type: object
            required:
            - id
            - name
            - nodeType
            properties:
              id:
                type: string
              name:
                type: string
              nodeType:
                type: string
                description: One of `app`, `recordGroup`, `folder`, `record`.
              subType:
                type: string
                nullable: true
        counts:
          type: object
          nullable: true
          description: Present when `include=counts`; otherwise `null`.
          required:
          - items
          - total
          properties:
            items:
              type: array
              items:
                type: object
                required:
                - label
                - count
                properties:
                  label:
                    type: string
                  count:
                    type: integer
            total:
              type: integer
        permissions:
          type: object
          nullable: true
          description: Present when `include=permissions`; otherwise `null`.
          required:
          - role
          - canUpload
          - canCreateFolders
          - canEdit
          - canDelete
          - canManagePermissions
          properties:
            role:
              type: string
            canUpload:
              type: boolean
            canCreateFolders:
              type: boolean
            canEdit:
              type: boolean
            canDelete:
              type: boolean
            canManagePermissions:
              type: boolean
    Filters:
      type: object
      additionalProperties: false
      description: |
        App connector instance ids and knowledge-base / record-group ids that narrow retrieval
        for a turn. For **org assistant** chat streams, send explicit `apps` / `kb` lists.
        For **agent** chat streams, send explicit id lists, or **omit** `filters` (and `tools`)
        to let the service use the agent’s stored knowledge and tool configuration. Sending
        `{ "apps": [], "kb": [] }` on an agent stream means **no** knowledge sources for that
        turn (it is not “full org default”).
      properties:
        apps:
          type: array
          items:
            type: string
          description: |
            Connector instance ids to scope retrieval for this turn. Each element
            must be a UUID (connector instance id, record-group id, etc.) or the
            org knowledge-base collection sentinel `knowledgeBase_<orgId>`
            (pattern `knowledgeBase_[a-zA-Z0-9_-]+`). Gateway validation matches
            Zod `appOrKbIdSchema`.
        kb:
          type: array
          items:
            type: string
          description: |
            Knowledge-base / record-group ids to scope retrieval for this turn.
            Each element uses the same accepted formats as `apps`: a UUID or
            `knowledgeBase_<orgId>` (pattern `knowledgeBase_[a-zA-Z0-9_-]+`).
    AppliedFilterNode:
      type: object
      additionalProperties: false
      description: A single filter node selected by the user (used for display/persistence of active filters)
      properties:
        id:
          type: string
          description: Unique identifier of the filter node
        name:
          type: string
          description: Display name of the filter node
        nodeType:
          type: string
          description: Type of the node (e.g. app, recordGroup, folder, record)
        connector:
          type: string
          description: Connector identifier associated with this node
    AppliedFilters:
      type: object
      additionalProperties: false
      description: |
        Rich filter state selected by the user, used for display and persistence only.
        This mirrors the active selection shown in the UI and is distinct from the
        machine-readable `filters` field used for retrieval scoping.
      properties:
        apps:
          type: array
          items:
            $ref: '#/components/schemas/AppliedFilterNode'
          description: Applied app/connector filter nodes
        kb:
          type: array
          items:
            $ref: '#/components/schemas/AppliedFilterNode'
          description: Applied knowledge-base filter nodes
    ChatAttachmentRef:
      type: object
      additionalProperties: false
      description: |
        Reference to an attachment produced by `POST /conversations/attachments/upload`
        (or the equivalent agent route). Include in create/stream/message bodies
        so the turn is sent with uploaded files.
      required:
      - recordId
      properties:
        recordId:
          type: string
          minLength: 1
          description: Attachment record id returned from the upload endpoint.
        recordName:
          type: string
          minLength: 1
          description: Original display name of the file when known.
        mimeType:
          type: string
          minLength: 1
          description: MIME type of the uploaded file.
        extension:
          type: string
          minLength: 1
          description: File extension (e.g. `pdf`).
        virtualRecordId:
          type: string
          minLength: 1
          description: Optional synthetic record id used by the graph layer.
    ChatAttachmentUploadRef:
      type: object
      additionalProperties: false
      description: |
        Concrete attachment metadata returned by `POST /conversations/attachments/upload`
        (or the equivalent agent route).
      required:
      - recordId
      - recordName
      - mimeType
      - extension
      - virtualRecordId
      properties:
        recordId:
          type: string
          minLength: 1
          description: Server-assigned attachment record id.
        recordName:
          type: string
          minLength: 1
          description: Original filename stored for the attachment.
        mimeType:
          type: string
          minLength: 1
          description: MIME type of the uploaded file.
        extension:
          type: string
          minLength: 1
          description: File extension derived by the backend.
        virtualRecordId:
          type: string
          minLength: 1
          description: Synthetic record id used by the graph layer.
        ocrMode:
          type: string
          minLength: 1
          description: Optional backend-reported processing mode for the attachment.
    ChatAttachmentUploadResponse:
      type: object
      additionalProperties: false
      description: |
        Success envelope returned by `POST /conversations/attachments/upload`
        and `POST /agents/{agentKey}/conversations/attachments/upload`.
      required:
      - conversationId
      - attachments
      properties:
        conversationId:
          type: string
          nullable: true
          description: |
            Existing conversation id echoed from the request when the upload is tied to a thread; otherwise `null`.
        attachments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatAttachmentUploadRef'
    CreateConversationRequest:
      type: object
      description: |
        Request body for creating a new AI conversation.

        **Query Processing:**

        The query is processed through PipesHub's AI pipeline which:

        - Performs semantic search across indexed knowledge bases
        - Retrieves relevant context from matching documents
        - Generates a response with citations to source materials
        - Suggests follow-up questions based on the conversation
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 100000
          description: |
            The user's question or prompt to start the conversation.
            Supports natural language queries of any complexity.
          example: What are the key findings from our Q4 financial report?
        recordIds:
          type: array
          items:
            type: string
            format: objectId
          description: |
            Limit the AI's knowledge scope to specific records/documents.
            When provided, only these records will be searched for context.
          example:
          - 507f1f77bcf86cd799439011
          - 507f1f77bcf86cd799439012
        filters:
          $ref: '#/components/schemas/Filters'
        appliedFilters:
          $ref: '#/components/schemas/AppliedFilters'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ChatAttachmentRef'
          description: |
            Uploaded chat attachments to associate with this conversation turn (see
            `POST /conversations/attachments/upload`).
        modelKey:
          type: string
          description: |
            Identifier for the AI model configuration to use.
            Available models depend on organization settings.
          example: gpt-4-turbo
        modelName:
          type: string
          description: Display name of the AI model
          example: GPT-4 Turbo
        modelFriendlyName:
          type: string
          description: Friendly display name of the selected model
          example: GPT-4 Turbo
        chatMode:
          type: string
          enum:
          - web_search
          - internal_search
          description: |
            Chat mode affecting response behavior.
          example: internal_search
        timezone:
          type: string
          minLength: 1
          description: |
            IANA timezone identifier from the client (top-level field).
            Used to provide time-aware context to the AI.
          example: America/New_York
        currentTime:
          type: string
          format: date-time
          description: |
            ISO 8601 / RFC 3339 datetime from the client (top-level field; UTC `Z` or numeric offset).
          example: '2026-04-12T16:00:00+05:30'
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Optional list of tool identifiers (fully-qualified action names such as
            "jira.create_issue") that the AI agent is permitted to invoke for this
            request. When omitted the agent may use any configured tool. Applicable
            only when chatMode is an agent mode (e.g. "agent:auto").
          example:
          - jira.create_issue
          - confluence.search_content
    AgentStreamCreateConversationRequest:
      type: object
      additionalProperties: false
      description: |
        Request body for `POST /agents/{agentKey}/conversations/stream`. Only
        `query` is required; all other fields are optional overrides or routing
        hints. Unknown fields are stripped during validation.
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 100000
          description: |
            User prompt for the first turn. Saved as the initial `user_query`
            message and sent to the agent backend.
        recordIds:
          type: array
          items:
            type: string
            format: objectId
          description: |
            Optional record ids to include as context for this turn. Each id
            must be a 24-character MongoDB ObjectId.
        filters:
          allOf:
          - $ref: '#/components/schemas/Filters'
          description: |
            Optional retrieval scope (`apps` / `kb`) for this turn. Each id must
            be a UUID or a `knowledgeBase_<orgId>` collection id. Omit for
            agent defaults; send `{ "apps": [], "kb": [] }` to force no
            knowledge sources for this turn.
        appliedFilters:
          allOf:
          - $ref: '#/components/schemas/AppliedFilters'
          description: |
            UI filter state persisted on the saved user message. Not used for
            retrieval and not forwarded to the upstream agent backend.
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ChatAttachmentRef'
          description: |
            Uploaded attachments to ground this turn. Each entry references a
            record id returned from the agent attachment upload endpoint.
        chatMode:
          type: string
          enum:
          - auto
          - quick
          - verification
          - deep
          description: |
            Chat mode hint forwarded to the agent backend.
            - `auto` lets the agent pick its default strategy.
            - `quick` favors low-latency answers over depth.
            - `verification` runs additional grounding/verification passes.
            - `deep` performs deeper retrieval and reasoning.
        modelKey:
          type: string
          minLength: 1
          description: |
            AI model configuration id for this turn. Omit to use the agent's
            default model.
        modelName:
          type: string
          minLength: 1
          description: Provider model name (the underlying LLM identifier).
        modelFriendlyName:
          type: string
          minLength: 1
          description: Friendly UI label for the selected model.
        timezone:
          type: string
          minLength: 1
          description: |
            Client IANA timezone, such as `America/New_York`. Helps the agent
            resolve relative date references in the prompt.
        currentTime:
          type: string
          format: date-time
          description: |
            Client time in ISO 8601 / RFC 3339 format (UTC `Z` or numeric
            offset). Sent alongside `timezone` for time-aware answers.
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Allowed tool ids for this turn, such as `jira.create_issue`. Omit
            to let the agent use its default toolset; send `[]` to disable
            tools for this turn.
      example:
        query: what are some latest tech news?
        modelKey: 5c1832f4-fa19-4167-b913-307fad3a6551
        modelName: gpt-5.4-mini
        modelFriendlyName: GPT 5.4 mini
        chatMode: auto
        timezone: Asia/Kolkata
        currentTime: '2026-05-19T12:58:01+05:30'
        tools: []
        filters:
          apps:
          - 2605c882-61d4-4aa2-b480-a68c957c151d
          - ed6d6cc4-70bd-4838-9aeb-488e910c833a
          - aeab9ddc-fb9b-47c8-ad98-bd4744e19555
          kb:
          - 8747da12-4724-4a95-ac92-827b88d79647
        appliedFilters:
          apps:
          - id: 2605c882-61d4-4aa2-b480-a68c957c151d
            name: US Headlines, abcnews
            nodeType: app
            connector: RSS
          - id: ed6d6cc4-70bd-4838-9aeb-488e910c833a
            name: ABC News RSS
            nodeType: app
            connector: RSS
          - id: aeab9ddc-fb9b-47c8-ad98-bd4744e19555
            name: Hacker news rss
            nodeType: app
            connector: RSS
          kb:
          - id: 8747da12-4724-4a95-ac92-827b88d79647
            name: Siddhant Ota's Private
            nodeType: recordGroup
            connector: KB
    RegenerateRequest:
      type: object
      additionalProperties: false
      description: |
        Request body for regenerating an AI response. All fields are optional;
        when omitted the model selection and execution context from the
        original message are reused.

        Supported fields:
        - `filters` — optional `{ apps?, kb? }` filter object
        - `chatMode` — optional non-empty chat mode string
        - `modelKey`, `modelName`, `modelFriendlyName` —
          optional non-empty model override fields
        - `timezone` — optional non-empty client timezone string
        - `currentTime` — optional ISO 8601 / RFC 3339 datetime string with
          UTC `Z` or a numeric offset
        - `tools` — optional array of non-empty tool identifiers
      properties:
        filters:
          $ref: '#/components/schemas/Filters'
        modelKey:
          type: string
          minLength: 1
          description: |
            Identifier of the AI model configuration to use for regeneration.
            Typically a UUID returned by the model-management endpoints. When
            omitted, the model used for the original message is reused.
          example: 05438a37-68f2-4641-a8dc-6c47e63278ca
        modelName:
          type: string
          minLength: 1
          description: Provider model name (e.g. the underlying LLM identifier).
          example: gpt-5.4-mini
        modelFriendlyName:
          type: string
          minLength: 1
          description: Friendly display name of the selected model.
          example: mini
        chatMode:
          type: string
          minLength: 1
          description: |
            Chat mode used for regeneration (for example `internal_search`,
            `web_search`, or an agent mode such as `agent:auto`).
          example: internal_search
        timezone:
          type: string
          minLength: 1
          description: |
            IANA timezone identifier from the client. Used to provide
            time-aware context to the AI during regeneration.
          example: Asia/Calcutta
        currentTime:
          type: string
          format: date-time
          description: |
            ISO 8601 / RFC 3339 datetime from the client (UTC `Z` or numeric
            offset). Used to anchor any relative time references in the query.
          example: '2026-05-11T15:43:21+05:30'
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Optional list of tool identifiers (fully-qualified action names
            such as `jira.create_issue`) the agent may invoke when
            regenerating. Applicable only in agent chat modes.
          example:
          - jira.create_issue
          - confluence.search_content
    AddMessageRequest:
      type: object
      description: Request body for adding a message to an existing conversation
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          description: The follow-up question or message content
          example: Can you elaborate on the revenue trends?
        filters:
          $ref: '#/components/schemas/Filters'
        appliedFilters:
          $ref: '#/components/schemas/AppliedFilters'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ChatAttachmentRef'
          description: |
            Uploaded chat attachments for this follow-up turn (see
            `POST /conversations/attachments/upload`).
        modelKey:
          type: string
          description: Override the model for this specific message
        modelName:
          type: string
          description: Display name of the model
        modelFriendlyName:
          type: string
          description: Friendly display name of the model
        chatMode:
          type: string
          enum:
          - web_search
          - internal_search
          description: Chat mode for this message
        timezone:
          type: string
          minLength: 1
          description: |
            IANA timezone identifier from the client (top-level field).
            Used to provide time-aware context to the AI.
          example: America/New_York
        currentTime:
          type: string
          format: date-time
          description: |
            ISO 8601 / RFC 3339 datetime from the client (top-level field; UTC `Z` or numeric offset).
          example: '2026-04-12T16:00:00+05:30'
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Optional list of tool identifiers the agent may invoke for this
            follow-up message. Semantics are identical to the create-conversation
            tools field.
          example:
          - jira.create_issue
          - confluence.search_content
    AgentAddMessageStreamRequest:
      type: object
      additionalProperties: false
      description: |
        Request body for `POST /agents/{agentKey}/conversations/{conversationId}/messages/stream`.
        Only `query` is required; all other fields are optional overrides or
        routing hints. Unknown fields are stripped during validation.
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          description: |
            User follow-up prompt to append to the existing agent conversation.
            Saved as a new `user_query` message before the upstream AI stream
            starts.
        filters:
          allOf:
          - $ref: '#/components/schemas/Filters'
          description: |
            Optional retrieval scope (`apps` / `kb`) for this turn. Each id must
            be a UUID or a `knowledgeBase_<orgId>` collection id. Omit to let
            the agent use its stored defaults; send `{ "apps": [], "kb": [] }`
            to force no knowledge sources for this turn.
        appliedFilters:
          allOf:
          - $ref: '#/components/schemas/AppliedFilters'
          description: |
            UI filter state persisted on the saved user message. Not used for
            retrieval and not forwarded to the upstream agent backend.
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ChatAttachmentRef'
          description: |
            Uploaded attachments to ground this turn. Each entry references a
            record id returned from the agent attachment upload endpoint.
        chatMode:
          type: string
          enum:
          - auto
          - quick
          - verification
          - deep
          description: |
            Chat mode hint forwarded to the agent backend. Defaults to `auto`
            in the upstream AI payload when omitted.
            - `auto` lets the agent pick its default strategy.
            - `quick` favors low-latency answers over depth.
            - `verification` runs additional grounding/verification passes.
            - `deep` performs deeper retrieval and reasoning.
        modelKey:
          type: string
          minLength: 1
          description: |
            AI model configuration id override for this turn. Omit to use the
            agent's default model.
        modelName:
          type: string
          minLength: 1
          description: Provider model name (the underlying LLM identifier).
        modelFriendlyName:
          type: string
          minLength: 1
          description: Friendly UI label for the selected model.
        timezone:
          type: string
          minLength: 1
          description: |
            Client IANA timezone, such as `America/New_York`. Helps the agent
            resolve relative date references in the prompt.
        currentTime:
          type: string
          format: date-time
          description: |
            Client time in ISO 8601 / RFC 3339 format (UTC `Z` or numeric
            offset). Sent alongside `timezone` for time-aware answers.
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Allowed tool ids for this turn, such as `jira.create_issue`. Omit
            to let the agent use its default toolset; send `[]` to disable
            tools for this turn.
      example:
        query: can you elaborate on the latest headlines?
        modelKey: 5c1832f4-fa19-4167-b913-307fad3a6551
        modelName: gpt-5.4-mini
        modelFriendlyName: GPT 5.4 mini
        chatMode: verification
        timezone: Asia/Kolkata
        currentTime: '2026-05-19T12:58:01+05:30'
        tools: []
        filters:
          apps:
          - 2605c882-61d4-4aa2-b480-a68c957c151d
          - ed6d6cc4-70bd-4838-9aeb-488e910c833a
          kb:
          - 8747da12-4724-4a95-ac92-827b88d79647
        appliedFilters:
          apps:
          - id: 2605c882-61d4-4aa2-b480-a68c957c151d
            name: US Headlines, abcnews
            nodeType: app
            connector: RSS
          - id: ed6d6cc4-70bd-4838-9aeb-488e910c833a
            name: ABC News RSS
            nodeType: app
            connector: RSS
          kb:
          - id: 8747da12-4724-4a95-ac92-827b88d79647
            name: Siddhant Ota's Private
            nodeType: recordGroup
            connector: KB
    Message:
      type: object
      additionalProperties: false
      description: |
        A single message within a conversation. Messages can be user queries,
        AI responses, system messages, or error notifications.
      properties:
        _id:
          type: string
          format: objectId
          description: Unique message identifier
        messageType:
          type: string
          enum:
          - user_query
          - bot_response
          - error
          - feedback
          - system
          description: |
            Type of message:
            <ul>
            <li><code>user_query</code> - User's question or input</li>
            <li><code>bot_response</code> - AI-generated response</li>
            <li><code>error</code> - Error message from the system</li>
            <li><code>feedback</code> - User feedback on a response</li>
            <li><code>system</code> - System notification or status</li>
            </ul>
        content:
          type: string
          description: The message text content
        contentFormat:
          type: string
          enum:
          - MARKDOWN
          - JSON
          - HTML
          description: Format of the content for rendering
          default: MARKDOWN
        citations:
          type: array
          items:
            $ref: '#/components/schemas/CitationReference'
          description: References to source documents used in the response
        confidence:
          type: string
          description: AI's confidence level in the response
        followUpQuestions:
          type: array
          items:
            $ref: '#/components/schemas/FollowUpQuestion'
          description: Suggested follow-up questions
        feedback:
          type: array
          items:
            $ref: '#/components/schemas/MessageFeedback'
          description: User feedback on this message
        metadata:
          type: object
          additionalProperties: false
          properties:
            processingTimeMs:
              type: number
              description: Time taken to generate response in milliseconds
            modelVersion:
              type: string
              description: Version of the AI model used
            aiTransactionId:
              type: string
              description: Transaction ID for tracking in AI backend
            reason:
              type: string
              description: Additional context or reasoning
        modelInfo:
          $ref: '#/components/schemas/ConversationModelInfo'
        appliedFilters:
          $ref: '#/components/schemas/AppliedFilters'
        referenceData:
          type: array
          description: |
            Reference identifiers extracted from tool responses, used to scope
            follow-up queries (for example Jira project keys or record IDs).
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                type: string
                description: Display name shown to the user.
              id:
                type: string
                description: Technical identifier (numeric ID, UUID, etc.).
              type:
                type: string
                description: Item type (e.g. `project`, `issue`, `file`, `notebook`, `page`).
              app:
                type: string
                description: |
                  Source application (e.g. `jira`, `confluence`, `sharepoint`,
                  `slack`, `drive`, `gmail`).
              webUrl:
                type: string
                description: URL to open the item in a browser.
              metadata:
                type: object
                additionalProperties:
                  type: string
                description: |
                  App-specific fields keyed by name (e.g. `key` for a Jira project,
                  `siteId` for a SharePoint document).
        attachments:
          type: array
          description: |
            Files uploaded for this message turn (see
            `POST /conversations/attachments/upload`).
          items:
            $ref: '#/components/schemas/ChatAttachmentRef'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CitationReference:
      type: object
      additionalProperties: false
      description: Reference to a source document cited in a response
      properties:
        citationId:
          type: string
          format: objectId
          description: ID of the citation record
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
          description: How relevant this citation is to the query (0-1)
        excerpt:
          type: string
          description: Relevant excerpt from the source document
        context:
          type: string
          description: Additional context around the citation
    Citation:
      type: object
      additionalProperties: false
      description: |
        A populated citation document. Represents a single chunk of source
        content (e.g. a passage from a document or record) referenced by an
        AI response, together with its provenance metadata.
      required:
      - _id
      - content
      - chunkIndex
      - citationType
      - metadata
      - createdAt
      - updatedAt
      properties:
        _id:
          type: string
          format: objectId
        content:
          type: string
          description: The cited text chunk
        chunkIndex:
          type: integer
          description: Index of this chunk within the source record
        citationType:
          type: string
          description: Source type identifier (e.g. `vectordb|document`)
        metadata:
          $ref: '#/components/schemas/PersistedSemanticSearchCitationMetadata'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ConversationModelInfo:
      type: object
      additionalProperties: false
      description: AI model configuration recorded against a conversation or message.
      properties:
        modelKey:
          type: string
          description: Stable identifier of the configured model record
        modelName:
          type: string
          description: Provider-facing model name (e.g. `gpt-4o-mini`)
        modelProvider:
          type: string
          description: Provider key (e.g. `openai`, `anthropic`)
        modelFriendlyName:
          type: string
          description: Human-readable display name
        chatMode:
          type: string
          description: Chat mode used for this turn (e.g. `quick`, `internal_search`)
    FollowUpQuestion:
      type: object
      additionalProperties: false
      description: AI-suggested follow-up question
      properties:
        question:
          type: string
          description: The suggested question text
        confidence:
          type: string
          description: Confidence level for this suggestion
        reasoning:
          type: string
          description: Why this question might be relevant
    MessageFeedbackSubmitRequest:
      type: object
      additionalProperties: false
      description: |
        Gateway request body for submitting message feedback (Zod
        `feedbackBodySchema`). All fields are optional; an empty object is
        accepted. Matches the first-party chat UI payload shape.
      properties:
        isHelpful:
          type: boolean
          description: Overall helpfulness signal (thumbs up/down).
        categories:
          type: array
          description: Issue or positive categories that apply to the response.
          items:
            type: string
            enum:
            - incorrect_information
            - missing_information
            - irrelevant_information
            - unclear_explanation
            - poor_citations
            - excellent_answer
            - helpful_citations
            - well_explained
            - other
        comments:
          type: object
          additionalProperties: false
          description: Free-text comments grouped by sentiment.
          properties:
            positive:
              type: string
              description: What was good about the response.
            negative:
              type: string
              description: What could be improved.
    MessageFeedback:
      type: object
      additionalProperties: false
      description: |
        Comprehensive feedback on an AI response. Feedback helps improve
        the AI's performance and response quality over time.
      properties:
        isHelpful:
          type: boolean
          description: Overall helpfulness rating
        ratings:
          type: object
          additionalProperties: false
          properties:
            accuracy:
              type: integer
              minimum: 1
              maximum: 5
              description: How accurate was the information (1-5)
            relevance:
              type: integer
              minimum: 1
              maximum: 5
              description: How relevant was the response (1-5)
            completeness:
              type: integer
              minimum: 1
              maximum: 5
              description: How complete was the answer (1-5)
            clarity:
              type: integer
              minimum: 1
              maximum: 5
              description: How clear was the explanation (1-5)
        categories:
          type: array
          items:
            type: string
            enum:
            - incorrect_information
            - missing_information
            - irrelevant_information
            - unclear_explanation
            - poor_citations
            - excellent_answer
            - helpful_citations
            - well_explained
            - other
          description: Categories of issues or positive attributes identified
        comments:
          type: object
          additionalProperties: false
          properties:
            positive:
              type: string
              description: What was good about the response
            negative:
              type: string
              description: What could be improved
            suggestions:
              type: string
              description: Specific suggestions for improvement
        citationFeedback:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              _id:
                type: string
                format: objectId
                description: Auto-generated sub-document identifier
              citationId:
                type: string
                format: objectId
              isRelevant:
                type: boolean
              relevanceScore:
                type: integer
                minimum: 1
                maximum: 5
              comment:
                type: string
          description: Feedback on individual citations
        followUpQuestionsHelpful:
          type: boolean
          description: Were the suggested follow-up questions helpful
        unusedFollowUpQuestions:
          type: array
          items:
            type: string
          description: Follow-up questions that were suggested but not used by the user
        source:
          type: string
          enum:
          - user
          - system
          - admin
          - auto
          default: user
          description: Origin of the feedback. Always present in responses (server applies the default `user`).
        feedbackProvider:
          type: string
          format: objectId
          description: User who submitted the feedback
        timestamp:
          type: integer
          format: int64
          description: |
            Time the feedback was created, stored as a Number (epoch milliseconds)
            with a server-side default of `Date.now`, so always present in responses.
            Not an ISO 8601 datetime.
        revisions:
          type: array
          description: Audit trail of edits to this feedback entry
          items:
            type: object
            additionalProperties: false
            properties:
              _id:
                type: string
                format: objectId
                description: Auto-generated sub-document identifier
              updatedFields:
                type: array
                items:
                  type: string
                description: Names of feedback fields modified in this revision
              previousValues:
                type: object
                additionalProperties: true
                description: |
                  Map of previously-set values for the fields named in `updatedFields`,
                  keyed by field name. Stored as a Mongoose Map of Mixed values.
              updatedBy:
                type: string
                format: objectId
              updatedAt:
                type: integer
                format: int64
                description: Time the revision was recorded, as epoch milliseconds.
        metrics:
          type: object
          additionalProperties: false
          description: Optional telemetry captured alongside the feedback
          properties:
            timeToFeedback:
              type: number
              description: Time from response delivery to feedback submission
            userInteractionTime:
              type: number
              description: Total time the user spent reviewing the response
            feedbackSessionId:
              type: string
            userAgent:
              type: string
            platform:
              type: string
    MessageFeedbackAppendMetrics:
      type: object
      additionalProperties: false
      required:
      - timeToFeedback
      description: |
        Telemetry recorded server-side alongside the feedback. Always present
        on append responses.
      properties:
        timeToFeedback:
          type: number
          description: |
            Milliseconds between message creation and feedback submission.
            Always present.
        userAgent:
          type: string
          description: Value of the `User-Agent` request header captured server-side.
    MessageFeedbackAppendEntry:
      type: object
      additionalProperties: false
      required:
      - feedbackProvider
      - timestamp
      - metrics
      description: |
        The feedback entry just appended to the message. Echoes the fields
        supplied in the request plus server-stamped `feedbackProvider`,
        `timestamp`, and `metrics`.
      properties:
        isHelpful:
          type: boolean
          description: Echoed from the request when supplied.
        categories:
          type: array
          description: Echoed categories from the request.
          items:
            type: string
            enum:
            - incorrect_information
            - missing_information
            - irrelevant_information
            - unclear_explanation
            - poor_citations
            - excellent_answer
            - helpful_citations
            - well_explained
            - other
        comments:
          type: object
          additionalProperties: false
          description: Echoed free-text comments from the request.
          properties:
            positive:
              type: string
            negative:
              type: string
        feedbackProvider:
          type: string
          format: objectId
          description: User who submitted the feedback. Always present.
        timestamp:
          type: integer
          format: int64
          description: |
            Submission time as epoch milliseconds (not an ISO 8601 datetime).
            Always present.
        metrics:
          $ref: '#/components/schemas/MessageFeedbackAppendMetrics'
    MessageFeedbackUpdateResponse:
      type: object
      additionalProperties: false
      required:
      - conversationId
      - messageId
      - feedback
      - meta
      description: |
        Gateway response after appending feedback to a bot-response message.
      properties:
        conversationId:
          type: string
          format: objectId
          description: Conversation the feedback was attached to.
        messageId:
          type: string
          format: objectId
          description: Message the feedback was attached to.
        feedback:
          $ref: '#/components/schemas/MessageFeedbackAppendEntry'
        meta:
          type: object
          additionalProperties: false
          required:
          - requestId
          - timestamp
          - duration
          properties:
            requestId:
              type: string
              description: |
                Server-side request identifier. Read from the `X-Request-ID`
                header when supplied, otherwise auto-generated, so this field
                is always present.
            timestamp:
              type: string
              format: date-time
            duration:
              type: integer
              description: Server-side processing time in milliseconds.
    Conversation:
      type: object
      description: |
        A conversation represents a chat session between a user and the AI.
        Conversations maintain context across multiple messages and can be
        shared, archived, and organized.
      properties:
        _id:
          type: string
          format: objectId
          description: Unique conversation identifier
        userId:
          type: string
          format: objectId
          description: ID of the user who owns this conversation
        orgId:
          type: string
          format: objectId
          description: Organization this conversation belongs to
        title:
          type: string
          description: |
            Conversation title, auto-generated from first query
            or manually updated
          example: Q4 Financial Report Discussion
        initiator:
          type: string
          format: objectId
          description: User who started the conversation
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          description: All messages in this conversation
        status:
          type: string
          enum:
          - None
          - Inprogress
          - Complete
          - Failed
          description: |
            Current status of the conversation:
            - `None` — no activity yet
            - `Inprogress` — AI is processing
            - `Complete` — response ready
            - `Failed` — error occurred
        failReason:
          type: string
          description: Error description, populated only when `status` is `Failed`.
        modelInfo:
          type: object
          properties:
            modelKey:
              type: string
            modelName:
              type: string
            modelFriendlyName:
              type: string
              description: Friendly display name of the selected model
            modelProvider:
              type: string
            chatMode:
              type: string
          description: AI model configuration used
        isShared:
          type: boolean
          default: false
          description: Whether this conversation is shared with others
        shareLink:
          type: string
          description: Shareable link if conversation is shared
        sharedWith:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                format: objectId
              accessLevel:
                type: string
                enum:
                - read
                - write
          description: Users this conversation is shared with
        isArchived:
          type: boolean
          default: false
          description: Whether this conversation is archived
        archivedBy:
          type: string
          format: objectId
          nullable: true
          description: |
            User ID of the last user who archived this row, or `null` after
            unarchive cleared the archive state. Absent on rows that have
            never been archived.
        isDeleted:
          type: boolean
          default: false
          description: Whether this conversation has been soft-deleted.
        deletedBy:
          type: string
          format: objectId
          description: User who soft-deleted this conversation.
        conversationErrors:
          type: array
          description: Errors recorded against this conversation (e.g. failed message generations).
          items:
            type: object
            required:
            - message
            properties:
              message:
                type: string
              errorType:
                type: string
              timestamp:
                type: string
                format: date-time
              messageId:
                type: string
                format: objectId
              stack:
                type: string
              metadata:
                type: object
                additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
          description: Free-form metadata attached to the conversation.
        lastActivityAt:
          type: integer
          description: Unix timestamp of last activity
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isOwner:
          type: boolean
          description: |
            Computed per request. `true` when the requesting user is the
            conversation's `initiator`.
          readOnly: true
        accessLevel:
          type: string
          enum:
          - read
          - write
          description: |
            Computed per request. The requester's effective access level:
            their entry in `sharedWith`, or `read` by default.
          readOnly: true
    ConversationListItem:
      type: object
      description: |
        Conversation summary returned by list endpoints. Identical to
        `Conversation` but omits `messages` to keep list payloads small.
        Fetch a single conversation to retrieve its messages.
      properties:
        _id:
          type: string
          format: objectId
        userId:
          type: string
          format: objectId
        orgId:
          type: string
          format: objectId
        title:
          type: string
        initiator:
          type: string
          format: objectId
        status:
          type: string
          enum:
          - None
          - Inprogress
          - Complete
          - Failed
        failReason:
          type: string
        modelInfo:
          type: object
          properties:
            modelKey:
              type: string
            modelName:
              type: string
            modelFriendlyName:
              type: string
            modelProvider:
              type: string
            chatMode:
              type: string
        isShared:
          type: boolean
        shareLink:
          type: string
        sharedWith:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                format: objectId
              accessLevel:
                type: string
                enum:
                - read
                - write
        isArchived:
          type: boolean
        archivedBy:
          type: string
          format: objectId
          nullable: true
          description: |
            User ID of the last user who archived this row, or `null` after
            unarchive cleared the archive state. Absent on rows that have
            never been archived.
        isDeleted:
          type: boolean
        deletedBy:
          type: string
          format: objectId
        conversationErrors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              errorType:
                type: string
              timestamp:
                type: string
                format: date-time
              messageId:
                type: string
                format: objectId
              stack:
                type: string
              metadata:
                type: object
                additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        lastActivityAt:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isOwner:
          type: boolean
          readOnly: true
        accessLevel:
          type: string
          enum:
          - read
          - write
          readOnly: true
    SemanticSearchRequest:
      type: object
      description: |
        Request body for performing semantic search across the enterprise knowledge base.

        **How Semantic Search Works:**

        1. Query is converted to vector embeddings
        2. Similar content is found using vector similarity
        3. Results are ranked by relevance score
        4. Matching chunks with metadata are returned

        **Filtering:**

        Use filters to narrow search scope to specific apps or knowledge bases.
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          description: |
            Natural language search query. The system understands
            semantic meaning, not just keywords.
          example: employee onboarding procedures
        filters:
          $ref: '#/components/schemas/Filters'
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Maximum number of results to return
    SemanticSearchBoundingBox:
      type: object
      additionalProperties: false
      description: Normalized bounding region for a chunk (when available).
      properties:
        x:
          type: number
        y:
          type: number
    SemanticSearchHitMetadata:
      type: object
