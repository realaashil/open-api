        - allowedMethods
        - authProviders
    AuthenticateFinalResponse:
      type: object
      additionalProperties: false
      description: All authentication steps complete; JWT tokens returned
      properties:
        message:
          type: string
          description: Success message
          example: Fully authenticated
        accessToken:
          type: string
          description: JWT access token (1 hour expiry)
        refreshToken:
          type: string
          description: JWT refresh token (7 days expiry)
      required:
        - message
        - accessToken
        - refreshToken
    AuthMethod:
      type: object
      additionalProperties: false
      description: Authentication method configuration
      properties:
        type:
          type: string
          enum:
            - samlSso
            - otp
            - password
            - google
            - microsoft
            - azureAd
            - oauth
          description: |
            Type of authentication method:
            - `password`: Email/password authentication
            - `otp`: One-time password via email (6-digit, expires in 10 minutes)
            - `google`: Google OAuth 2.0
            - `microsoft`: Microsoft OAuth 2.0
            - `azureAd`: Azure Active Directory
            - `samlSso`: SAML 2.0 Single Sign-On
            - `oauth`: Generic OAuth 2.0 provider
      required:
