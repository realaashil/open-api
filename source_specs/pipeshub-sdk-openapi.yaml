          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PersistedSemanticSearchSharedWithEntry:
      type: object
      additionalProperties: false
      description: |
        Entry inside `sharedWith[]`. The schema sets `_id: false` on these
        sub-docs, so no auto-injected `_id` is present.
      required:
      - userId
      - accessLevel
      properties:
        userId:
          type: string
          format: objectId
        accessLevel:
          type: string
          enum:
          - read
          - write
    PersistedSemanticSearch:
      type: object
      additionalProperties: false
      description: |
        Persisted search document as returned to clients.
        `records` is a string-valued map: each value is `JSON.stringify(<record>)`,
        keyed by the source record's `_id` or `_key`. Clients must `JSON.parse`
        each value to recover the underlying record object (whose shape resembles
        `SemanticSearchGraphRecord`). This intentionally differs from the
        `searchResponse.records` array on the POST `/search` response, which is
        passed through from the retrieval service untouched.
      required:
      - _id
      - __v
      - query
      - limit
      - orgId
      - userId
      - citationIds
      - records
      - isShared
      - sharedWith
      - isArchived
      - createdAt
      - updatedAt
      properties:
        _id:
          type: string
          format: objectId
        __v:
          type: integer
        query:
          type: string
        limit:
          type: integer
        orgId:
          type: string
          format: objectId
        userId:
          type: string
          format: objectId
        citationIds:
          type: array
          items:
            $ref: '#/components/schemas/PersistedSemanticSearchCitation'
        records:
          type: object
          description: |
            Map of source-record id (or `_key`) to a JSON-stringified record object.
            Clients must `JSON.parse` each value before reading fields.
          additionalProperties:
            type: string
        isShared:
          type: boolean
        shareLink:
          type: string
          description: Set once the search has been shared via `/search/{searchId}/share`.
        sharedWith:
          type: array
          items:
            $ref: '#/components/schemas/PersistedSemanticSearchSharedWithEntry'
        isArchived:
          type: boolean
        archivedBy:
          type: string
          format: objectId
          nullable: true
          description: |
            User ID of the last user who archived this row, or `null` after
            an unarchive cleared the archive state. Absent on rows that have
            never been archived. Currently-archived rows cannot reach this
            endpoint because `buildFilter` enforces `isArchived: false`.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PersistedSemanticSearchEnvelope:
      type: array
      description: |
        GET `/search/{searchId}` calls `Model.find()` (not `findOne()`) and sends
        the result as-is, so the wire format is an array of zero or one
        persisted search docs. A non-existent id returns `200 []`, **not** `404`.
      items:
        $ref: '#/components/schemas/PersistedSemanticSearch'
    SemanticSearchHistoryItem:
      type: object
      additionalProperties: false
      description: |
        One persisted search row as returned by `GET /search`. Mirrors the
        persisted search document except `citationIds` is an array of
        ObjectId strings (citations are not populated on the list endpoint,
        unlike `GET /search/{searchId}`).

        `shareLink` is absent from the JSON when the search has not been
        shared. `archivedBy` is `null` on rows that were previously archived
        and then unarchived, and absent on rows that have never been
        archived. The list endpoint already filters out currently-archived
        rows, so a string user-id value never appears here in practice.
      required:
      - _id
      - __v
      - query
      - limit
      - orgId
      - userId
      - citationIds
      - records
      - isShared
      - sharedWith
      - isArchived
      - createdAt
      - updatedAt
      properties:
        _id:
          type: string
          format: objectId
        __v:
          type: integer
        query:
          type: string
        limit:
          type: integer
        orgId:
          type: string
          format: objectId
        userId:
          type: string
          format: objectId
        citationIds:
          type: array
          items:
            type: string
            format: objectId
        records:
          type: object
          description: |
            Map of source-record id (or `_key`) to `JSON.stringify(<record>)`.
            Clients must `JSON.parse` each value to recover the underlying
            record object. Populated at write-time in the POST `/search` handler.
          additionalProperties:
            type: string
        isShared:
          type: boolean
        shareLink:
          type: string
          description: Set once the search has been shared via `/search/{searchId}/share`.
        sharedWith:
          type: array
          items:
            $ref: '#/components/schemas/PersistedSemanticSearchSharedWithEntry'
        isArchived:
          type: boolean
        archivedBy:
          type: string
          format: objectId
          nullable: true
          description: |
            User ID of the last user who archived this row, or `null` after
            an unarchive cleared the archive state. Absent on rows that have
            never been archived.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SemanticSearchHistoryPagination:
      type: object
      additionalProperties: false
      description: |
        Pagination block emitted by `buildPaginationMetadata` (utils.ts:417).
        `totalPages` is `Math.ceil(totalCount / limit)`, so an empty result
        has `totalPages: 0`, not `1`.
      required:
      - page
      - limit
      - totalCount
      - totalPages
      - hasNextPage
      - hasPrevPage
