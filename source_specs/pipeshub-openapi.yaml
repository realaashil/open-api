        idToken:
          type: string
          description: OAuth ID token (JWT)
      required:
        - accessToken
    AuthenticateMultiStepResponse:
      type: object
      additionalProperties: false
      description: Current authentication step succeeded; additional MFA steps remain
      properties:
        status:
          type: string
          enum:
            - success
          description: Step completion status
        nextStep:
          type: integer
          description: Next authentication step index
        allowedMethods:
          type: array
          items:
            type: string
          description: Allowed method types for the next step
        authProviders:
