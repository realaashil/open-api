  /conversations/stream:
    post:
      tags:
      - Conversations
      summary: Create conversation with streaming response
      description: |
        Start a new conversation and stream the AI response over Server-Sent
        Events (SSE). Behaves like `POST /conversations` but emits tokens,
        tool activity, and status updates incrementally instead of returning
        a single JSON response at the end.

        **Lifecycle**

        1. The server validates `query`, persists an in-progress
           conversation, then opens the SSE stream with HTTP `200`.
        2. A `connected` event is emitted immediately with the new
           `conversationId` so the client can link the stream (sidebar,
           parallel tabs, deep links) without an extra request.
        3. AI-backend events stream through (token chunks, tool calls,
           status, etc.).
        4. On success a single `complete` event is emitted carrying the
           full persisted conversation.
        5. On failure an `error` event is emitted and the conversation is
           marked FAILED before the stream closes.

        **Event vocabulary**

        Three events have stable, server-defined `data` shapes:

        - `connected` — `{ "message": string, "conversationId": string,
          "title": string }`
        - `complete` — `{ "conversation": Conversation,
          "meta": { "requestId": string, "timestamp": string,
          "duration": number } }`
        - `error` — `{ "error": string, "details"?: string }`

        The forwarded events are `status`, `answer_chunk`, `tool_calls`,
        `restreaming`, `metadata`, and `tool_execution_complete`. Their
        payloads come from the Python query service and may evolve. Note
        that raw `tool_call` / `tool_success` / `tool_error` / `tool_result`
        events emitted by the LLM tool runtime are rewrapped as `status` by
        the upstream wrapper before they reach this route, so clients on
        `/conversations/stream` never see those names directly. Clients
        should ignore unknown event names rather than treating them as
        errors.

        **Agent mode**

        When `chatMode` selects an agent mode (for example `agent:auto`),
        the optional `tools` list restricts which tools the agent may
        invoke for this turn. Outside agent modes the `tools` field is
        ignored.
      operationId: streamChat
      security:
      - bearerAuth: []
      - oauth2:
        - conversation:chat
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: |
            SSE stream established. The body is a sequence of
            `text/event-stream` frames using the event vocabulary described
            above.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AssistantStreamSSEEvent'
        '400':
          description: |
            Invalid request — `query` is missing, empty, or exceeds the
            100000-character limit, or another field fails validation
            (for example a malformed `recordIds` or `currentTime`).
        '401':
          description: Unauthorized — valid bearer token required.
        '403':
          description: |
            Forbidden — the caller's token does not include the
            `conversation:chat` OAuth scope.
        '500':
          description: |
            Internal error before the SSE stream is established (for
            example, the initial conversation row could not be persisted).
            Once the stream is open, terminal failures are surfaced as an
            `error` SSE event instead of an HTTP status change.
  /conversations:
    get:
      tags:
      - Conversations
      summary: List all conversations
      description: |
        Retrieve paginated conversations for the authenticated user.

        **Overview:**

        Use the optional `source` query parameter to choose which list to return:
        `owned` — only conversations you own (`userId` matches the current user).
        `shared` — conversations where you have recipient access
        (`isShared` and your user appears in `sharedWith`), without the owner-only branch.
        Defaults to `owned` when omitted. Each call returns one list; call twice if you need both.

        **Filtering:**

        - Only non-archived conversations are returned by default
        - Use `/conversations/show/archives` for archived conversations

        **Sorting:**

        Conversations are sorted by last activity timestamp (most recent first) by default.
      operationId: getAllConversations
      security:
      - bearerAuth: []
      - oauth2:
        - conversation:read
      parameters:
      - name: source
        in: query
        required: false
        description: |
          `owned` — owner list (`userId` filter only).
          `shared` — explicit share grant list (`isShared` + `sharedWith`).
          Defaults to `owned` when omitted.
        schema:
          type: string
          enum:
          - owned
          - shared
          default: owned
      - name: page
        in: query
        required: false
        description: Page number (1-based). Defaults to 1.
        schema:
          type: integer
          minimum: 1
      - name: limit
        in: query
        required: false
        description: Page size. Defaults to 20; capped by the server (max 100).
        schema:
          type: integer
          minimum: 1
      - name: sortBy
        in: query
        required: false
        description: Sort field. Invalid values fall back to `lastActivityAt`.
        schema:
          type: string
          enum:
          - createdAt
          - lastActivityAt
          - title
      - name: sortOrder
        in: query
        required: false
        description: Sort direction. Defaults to `desc` unless set to `asc`.
        schema:
          type: string
          enum:
          - asc
          - desc
      - name: conversationId
        in: query
        required: false
        description: When set, restricts results to that conversation ID (if visible under the chosen `source`).
        schema:
          type: string
      - name: search
        in: query
        required: false
        description: Case-insensitive match on title and message content (max 1000 characters).
        schema:
          type: string
      - name: startDate
        in: query
        required: false
        description: Filter by `createdAt` ≥ this ISO date.
        schema:
          type: string
          format: date-time
      - name: endDate
        in: query
        required: false
        description: Filter by `createdAt` ≤ this ISO date.
        schema:
          type: string
          format: date-time
      - name: shared
        in: query
        required: false
        description: |
          When set, filters by `isShared`. Accepts case-insensitive
          `true`/`false`, or `1`/`0`.
        schema:
          type: string
      responses:
        '200':
          description: List of conversations for the requested source
          content:
            application/json:
              schema:
                type: object
                required:
                - conversations
                - source
                - pagination
                - filters
                - meta
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationListItem'
                  source:
                    type: string
                    enum:
                    - owned
                    - shared
                    description: Echoes the requested `source` query value.
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
                  filters:
                    type: object
                    additionalProperties: false
                    description: |
                      Filter introspection block. `applied` summarises the
                      filters active on this request; `available` catalogues
                      every supported filter with its current value and whether
                      it is applied.
                    required:
                    - applied
                    - available
                    properties:
                      applied:
                        type: object
                        additionalProperties: false
                        required:
                        - filters
                        - values
                        properties:
                          filters:
                            type: array
                            description: Names of filters currently applied.
                            items:
                              type: string
                          values:
                            type: object
                            additionalProperties: false
                            description: |
                              Current value for each applied filter. Only keys
                              present in `filters` are populated; others are
                              omitted.
                            properties:
                              search:
                                type: string
                              shared:
                                type: string
                              tags:
                                type: string
                              minMessages:
                                type: string
                              sortBy:
                                type: string
                              sortOrder:
                                type: string
                              startDate:
                                type: string
                              endDate:
                                type: string
                              messageType:
                                type: string
                              page:
                                type: integer
                              limit:
                                type: integer
                              dateRange:
                                type: object
                                additionalProperties: false
                                properties:
                                  start:
                                    type: string
                                    nullable: true
                                  end:
                                    type: string
                                    nullable: true
                      available:
                        type: object
                        additionalProperties: false
                        required:
                        - shared
                        - tags
                        - minMessages
                        - search
                        - pagination
                        - sorting
                        - dateFilters
                        - messageFilters
                        - sortingMessages
                        properties:
                          shared:
                            type: object
                            additionalProperties: false
                            properties:
                              values:
                                type: array
                                items:
                                  type: string
                                description: Accepted values for the `shared` query param.
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          tags:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          minMessages:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: number
                                nullable: true
                              applied:
                                type: boolean
                          search:
                            type: object
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                              description:
                                type: string
                              current:
                                type: string
                                nullable: true
                              applied:
                                type: boolean
                          pagination:
                            type: object
                            additionalProperties: false
                            properties:
                              page:
                                type: object
                                additionalProperties: false
                                properties:
                                  type:
