        '500':
          description: Persistence layer failed to append the feedback entry.
  /agents/{agentKey}/conversations/{conversationId}/archive:
    post:
      tags:
      - Agents
      summary: Archive an agent conversation
      description: Marks the conversation as archived for the authenticated owner.
      operationId: archiveAgentConversation
      security:
      - bearerAuth: []
      - oauth2:
        - agent:write
      parameters:
      - name: agentKey
        in: path
        required: true
        schema:
          type: string
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: objectId
      responses:
