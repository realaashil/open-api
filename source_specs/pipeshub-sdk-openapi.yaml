                  meta:
                    type: object
                    additionalProperties: false
                    required:
                    - timestamp
                    - duration
                    properties:
                      requestId:
                        type: string
                        description: Server-assigned request identifier for tracing. Omitted when not available.
                        example: req_8f3a1b2c
                      timestamp:
                        type: string
                        format: date-time
                        description: Server timestamp when the response was produced.
                        example: '2026-05-10T12:34:56.789Z'
                      duration:
                        type: integer
                        description: Time taken to process the request, in milliseconds.
                        example: 42
        '400':
          description: |
            Invalid request. Possible causes:

            - `searchId` failed Zod validation
              (not a valid ObjectId).
            - The target search is not currently
              archived and therefore cannot be unarchived.
        '401':
          description: |
            Missing or invalid bearer token.
        '403':
          description: |
            Bearer token lacks the `semantic:write` scope.
        '404':
          description: |
            No archived search matches `searchId` within the caller's
            org, or the row is already active / deleted.
        '500':
          description: |
            Unexpected server error while unarchiving the search.
  /agents:
    get:
      tags:
      - Agents
      summary: List agents
      description: |
        Retrieve a paginated list of agents available to the authenticated user.

        **Overview**

        Returns agents accessible through direct, team, or org-level permissions.
        Search is performed across agent name, description, and tags. Sorting and
        pagination are applied by the AI backend and the resulting envelope is
        forwarded unchanged by the Node gateway.

        **Gateway contract**

        The Node route supports only these query params: `page`, `limit`, `search`,
        `sort_by`, and `sort_order`.

        The Python backend also understands `isDeleted`, but this gateway route
        does not forward it, so it is not part of the public API contract here.
      operationId: listAgents
      security:
      - bearerAuth: []
      - oauth2:
        - agent:read
      parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: 1-based page number.
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
        description: Maximum number of agents to return in the current page.
      - in: query
        name: search
        required: false
        schema:
          type: string
          minLength: 1
          maxLength: 1000
        description: Case-insensitive search across agent name, description, and tags. Leading/trailing whitespace is trimmed; blank-after-trim values are rejected.
      - in: query
        name: sort_by
        required: false
        schema:
          type: string
          minLength: 1
          maxLength: 100
          default: updatedAtTimestamp
        description: Backend sort field. Leading/trailing whitespace is trimmed. Common value is `updatedAtTimestamp`.
      - in: query
        name: sort_order
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
        description: Sort direction.
      responses:
        '200':
          description: Paginated list of accessible agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
              examples:
                success:
                  summary: Example paginated response
                  value:
                    success: true
                    agents:
                    - _id: agentInstances/11111111-2222-3333-4444-555555555555
                      _key: 11111111-2222-3333-4444-555555555555
                      _rev: _exampleRev---
                      createdAtTimestamp: 1779792574728
                      createdBy: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
                      description: AI agent for customer support workflows
                      isActive: true
                      isDeleted: false
                      isServiceAccount: false
                      models:
                      - 99999999-8888-7777-6666-555555555555_gpt-5.4-mini
                      name: Customer Support Agent
                      startMessage: Hello! How can I help you today?
                      systemPrompt: You are a helpful assistant.
                      tags: []
                      updatedAtTimestamp: 1779792574728
                      shareWithOrg: false
                      toolsets: []
                      knowledge: []
                      can_view: true
                      can_share: true
                      can_edit: true
                      can_delete: true
                      user_role: OWNER
                      access_type: INDIVIDUAL
                    pagination:
                      currentPage: 1
                      limit: 20
                      totalItems: 2
                      totalPages: 1
                      hasNext: false
                      hasPrev: false
        '400':
          description: Validation failed for one or more query params.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agents/create:
    post:
      tags:
      - Agents
      summary: Create agent
      description: |
        Create a new custom AI agent.

        **Overview:**
        Agents are specialized AI assistants configured for specific tasks.
        They can have custom system prompts, access to specific tools, and
        be limited to certain knowledge bases.

        **Agent Configuration:**
        - **System prompt:** Instructions that define agent behavior
        - **Tools:** Capabilities like web search, code execution, etc.
        - **Knowledge bases:** Data sources the agent can access
        - **Model config:** AI model settings (temperature, max tokens)

        **Use Cases:**
        - Customer support bot with product knowledge
        - Code review assistant with repository access
        - HR assistant with policy documents
      operationId: createAgent
      security:
      - bearerAuth: []
      - oauth2:
        - agent:write
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCreateResponse'
        '400':
          description: Invalid agent configuration
        '401':
          description: Unauthorized
  /agents/{agentKey}:
    get:
      tags:
      - Agents
      summary: Get agent
      description: |
        Retrieve agent details by its unique key.

        **Observed gateway behavior (localhost integration tests):**
        Unknown `agentKey`, lookup after soft-delete, and other AI-backend failures
        currently return **HTTP 500** with an `ErrorResponse` body (message often
        mentions the agent or "not found"), not 404. The Python query service may
        return 404 when called directly; the Node proxy surfaces 500 instead.
      operationId: getAgent
      security:
      - bearerAuth: []
      - oauth2:
        - agent:read
      parameters:
      - name: agentKey
        in: path
        required: true
        description: Unique agent identifier
        schema:
          type: string
          minLength: 1
        example: customer-support-agent
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAgentResponse'
        '401':
          description: Missing or invalid bearer token (e.g. `No token provided`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient OAuth scope (`agent:read` required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: |
            Gateway validation failure (non-empty `agentKey` path param) or missing
            organization/user context on the authenticated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            Agent not found, post-delete lookup, permission or lookup failure, or other
            AI-backend error forwarded by the gateway (observed for unknown key and GET
            after delete on localhost).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: AI query service unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Agents
      summary: Update agent
      description: |
        Apply a partial update to an existing agent configuration.

        **Gateway contract**

        The Node gateway validates the request body via Zod middleware before
        forwarding to the Python agent service. The `agentKey` path param and
        the request body are both validated. Query parameters are ignored by
        the controller.

        **Update semantics**

        Only fields present in the request body are updated. When `models` is
        included, the gateway Zod middleware requires at least one model entry
        and at least one object entry with `isReasoning: true`.

        **Permissions**

        The authenticated user must have `can_edit` on the agent (typically the
        owner). Service-account and `shareWithOrg` transitions follow additional
        Python business rules.

        **Success response**

        Returns a lightweight success envelope only. Use
        `GET /agents/{agentKey}` to read the persisted agent after an update.
      operationId: updateAgent
      security:
      - bearerAuth: []
      - oauth2:
        - agent:write
      parameters:
      - name: agentKey
        in: path
        required: true
        description: Unique agent identifier
        schema:
          type: string
          minLength: 1
        example: customer-support-agent
      requestBody:
        required: true
        description: Partial agent configuration fields to update
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
      responses:
        '200':
          description: Agent updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentUpdateResponse'
        '401':
          description: Missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient OAuth scope (`agent:write` required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: |
            Gateway validation failure. Returned for missing/invalid `agentKey`,
            empty `models` array, `models` without a reasoning entry, malformed
            JSON, and other Zod schema violations. Syntactically invalid JSON may
            also surface as `500` depending on the Express parser.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            AI-backend or gateway failure. Returned for unknown `agentKey`,
            permission errors, and other non-200 responses from the Python agent
            service via the Node proxy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Agents
      summary: Delete agent
      description: |
        Soft-delete an agent (tombstone) in the graph database.

        **Overview:**
        The Python query service marks the agent instance deleted inside a transaction.
        List and search endpoints exclude tombstoned agents. Toolsets, tools, and
        knowledge linked to the agent are not removed by this call.

        **Permissions:**
        Only the agent owner may delete (`can_delete` on the permission check).

        **Warning:**
        All conversations with this agent will become inaccessible.

        **Observed gateway behavior (localhost integration tests):**
        Unknown `agentKey`, deleting an already-deleted agent, and `GET /agents/{agentKey}`
        after delete currently return **HTTP 500** with an `ErrorResponse` body (message
        often mentions the agent or "not found"), not 404. The Python backend raises 404
        for not-found when called directly; the Node proxy may surface 500 instead.
      operationId: deleteAgent
      security:
      - bearerAuth: []
      - oauth2:
        - agent:write
      parameters:
      - name: agentKey
        in: path
        required: true
        description: Unique agent identifier (gateway Zod requires non-empty string).
        schema:
          type: string
          minLength: 1
        example: customer-support-agent
      responses:
        '200':
          description: Agent soft-deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeleteResponse'
        '401':
          description: Missing or invalid bearer token (e.g. `No token provided`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            Agent not found, already deleted, permission or lookup failure, or other
            backend error forwarded by the gateway (observed for unknown key, second
            delete, and GET after delete on localhost).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
