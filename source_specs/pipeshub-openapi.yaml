          description: Case-insensitive substring match against title and message content (max 1000 chars)
          schema:
            type: string
            maxLength: 1000
        - name: shared
          in: query
          required: false
          description: Filter by shared status
          schema:
            type: boolean
        - name: startDate
          in: query
          required: false
          description: Include conversations created on or after this timestamp
