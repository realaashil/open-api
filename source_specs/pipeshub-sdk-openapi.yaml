          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — OAuth token missing `config:read` scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
