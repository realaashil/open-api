    delete:
      tags:
        - Conversations
      summary: Delete conversation
      description: |
        Delete a conversation by its ID.

        **Overview:**

        Performs a soft delete by setting `isDeleted: true`. The conversation is
        removed from listings but preserved in the database. All citations
        referenced by messages in the conversation are also soft-deleted.

        **Permissions:**

        The conversation initiator can always delete. Users the conversation has
        been shared with may delete it only when their `sharedWith.accessLevel`
        is `write`.
      operationId: deleteConversationById
      security:
        - bearerAuth: []
        - oauth2:
            - conversation:write
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        "200":
          description: Conversation deleted successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Identifier of the conversation that was deleted
                  status:
                    type: string
                    enum:
                      - deleted
                    description: Outcome of the operation
                  deletedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the conversation was marked deleted
                  deletedBy:
                    type: string
                    format: objectId
                    description: Identifier of the user who performed the delete
                  citationsDeleted:
                    type: integer
                    description: Number of citations soft-deleted alongside the conversation
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                        description: Server-assigned identifier for the request
                      timestamp:
                        type: string
                        format: date-time
                        description: Server time the response was produced
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
        "400":
          description: Invalid `conversationId` path parameter
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - token is missing the `conversation:write` scope
        "404":
          description: Conversation not found, already deleted, or caller has no delete access
        "500":
          description: Internal server error while deleting the conversation
  "/conversations/{conversationId}/messages/stream":
    post:
      tags:
        - Conversations
      summary: Add message to a conversation with streaming response
      description: |
        Add a follow-up message to an existing conversation and stream the
        assistant's response over Server-Sent Events.

        Functionally equivalent to `POST /conversations/{conversationId}/messages`
        but the response is delivered as an SSE stream so clients can render
        the answer incrementally.

        The wire vocabulary is described by `AssistantMessageStreamSSEEvent`.
        It is the same event set as `/conversations/stream`; only the
        `connected` and `complete` payloads differ because the conversation
        already exists when this route is called.
      operationId: addMessageStream
      security:
        - bearerAuth: []
        - oauth2:
            - conversation:chat
      parameters:
        - name: conversationId
          in: path
          required: true
          description: |
            Identifier of the conversation to append the message to. The
            conversation must belong to the caller and must not be deleted.
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessageRequest"
      responses:
        "200":
          description: |
            SSE stream established. The body is a sequence of
            `text/event-stream` frames using the event vocabulary described
            on the schema below.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/AssistantMessageStreamSSEEvent"
        "400":
          description: |
            Invalid request — `query` is missing or empty, or another field
            fails validation (for example a malformed `currentTime`).
        "401":
          description: Unauthorized — valid bearer token required.
        "403":
          description: |
            Forbidden — the caller's token does not include the
            `conversation:chat` OAuth scope.
        "404":
          description: |
            The conversation does not exist, is deleted, or does not belong
            to the caller.
        "500":
          description: |
            Internal error before the SSE stream is established (for
            example, the user message could not be persisted to the
            conversation). Once the stream is open, terminal failures are
            surfaced as an `error` SSE event instead of an HTTP status
            change.
  "/conversations/{conversationId}/title":
    patch:
      tags:
        - Conversations
      summary: Update conversation title
      description: |
        Update the title of a conversation.

        **Overview:**

        Conversation titles are auto-generated from the first query by default.
        Use this endpoint to set a custom, more descriptive title.

        **Title limits:**

        - Minimum: 1 character
        - Maximum: 200 characters

        **Permissions:**

        The conversation must exist, belong to the calling user's organization,
        be owned by the caller (matched on `userId`), and not be soft-deleted.
      operationId: updateConversationTitle
      security:
        - bearerAuth: []
        - oauth2:
            - conversation:write
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - title
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: New conversation title
                  example: Q4 Sales Analysis Discussion
      responses:
        "200":
          description: Title updated successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - conversation
                  - meta
                properties:
                  conversation:
                    type: object
                    additionalProperties: false
                    description: |
                      The full conversation document after the title update,
                      returned as stored in MongoDB.
                    required:
                      - _id
                      - userId
                      - orgId
                      - initiator
                      - messages
                      - isShared
                      - isDeleted
                      - isArchived
                      - sharedWith
                      - conversationErrors
                      - lastActivityAt
                      - createdAt
                      - updatedAt
                      - __v
                    properties:
                      _id:
                        type: string
                        format: objectId
                        description: Unique conversation identifier
                      userId:
                        type: string
                        format: objectId
                        description: ID of the user who owns this conversation
                      orgId:
                        type: string
                        format: objectId
                        description: Organization this conversation belongs to
                      title:
                        type: string
                        description: |
                          Conversation title. Present and equal to the value
                          submitted in the request body after a successful
                          update.
                      initiator:
                        type: string
                        format: objectId
                        description: User who started the conversation
                      messages:
                        type: array
                        description: All messages stored on this conversation.
                        items:
                          type: object
                          additionalProperties: false
                          required:
                            - _id
                            - messageType
                            - content
                            - contentFormat
                            - citations
                            - followUpQuestions
                            - feedback
                            - referenceData
                            - createdAt
                            - updatedAt
                          properties:
                            _id:
                              type: string
                              format: objectId
                            messageType:
                              type: string
                              enum:
                                - user_query
                                - bot_response
                                - error
                                - feedback
                                - system
                            content:
                              type: string
                            contentFormat:
                              type: string
                              enum:
                                - MARKDOWN
                                - JSON
                                - HTML
                              default: MARKDOWN
                            confidence:
                              type: string
                              description: |
                                AI confidence in the answer. Present only on
                                `bot_response` messages, and only when the
                                model emitted a trailing confidence block.
                            citations:
                              type: array
                              description: |
                                References to source documents used in the
                                response, stored as raw citation pointers
                                (not populated on this endpoint).
                              items:
                                $ref: "#/components/schemas/CitationReference"
                            followUpQuestions:
                              type: array
                              items:
                                $ref: "#/components/schemas/FollowUpQuestion"
                            feedback:
                              type: array
                              items:
                                $ref: "#/components/schemas/MessageFeedback"
                            referenceData:
                              type: array
                              description: |
                                Reference IDs surfaced from tool responses,
                                used for follow-up queries.
                              items:
                                type: object
                                additionalProperties: false
                                properties:
                                  name:
                                    type: string
                                    description: Display name shown to the user.
                                  id:
                                    type: string
                                    description: Technical identifier (numeric ID, UUID, etc.).
                                  type:
                                    type: string
                                    description: Item type (e.g. `project`, `issue`, `file`, `notebook`, `page`).
                                  app:
                                    type: string
                                    description: |
                                      Source application (e.g. `jira`, `confluence`,
                                      `sharepoint`, `slack`, `drive`, `gmail`).
                                  webUrl:
                                    type: string
                                    description: URL to open the item in a browser.
                                  metadata:
                                    type: object
                                    additionalProperties:
                                      type: string
                                    description: |
                                      App-specific fields keyed by name (e.g. `key` for a Jira
                                      project, `siteId` for a SharePoint document).
                            modelInfo:
                              $ref: "#/components/schemas/ConversationModelInfo"
                            appliedFilters:
                              type: object
                              additionalProperties: false
                              properties:
                                apps:
                                  type: array
                                  items:
                                    $ref: "#/components/schemas/AppliedFilterNode"
                                kb:
                                  type: array
                                  items:
                                    $ref: "#/components/schemas/AppliedFilterNode"
                            metadata:
                              type: object
                              additionalProperties: false
                              properties:
                                processingTimeMs:
                                  type: number
                                modelVersion:
                                  type: string
                                aiTransactionId:
                                  type: string
                                reason:
                                  type: string
                            createdAt:
                              type: string
                              format: date-time
                            updatedAt:
                              type: string
                              format: date-time
                      status:
                        type: string
                        enum:
                          - None
                          - Inprogress
                          - Complete
                          - Failed
                        description: |
                          Current status of the conversation:
                          - `None` — no activity yet
                          - `Inprogress` — AI is processing
                          - `Complete` — response ready
                          - `Failed` — error occurred
                      failReason:
                        type: string
                        description: |
                          Error description, populated only when `status`
                          is `Failed`.
                      modelInfo:
                        $ref: "#/components/schemas/ConversationModelInfo"
                      isShared:
                        type: boolean
                        default: false
                        description: Whether this conversation is shared with others
                      shareLink:
                        type: string
                        description: Shareable link if the conversation is shared
                      sharedWith:
                        type: array
                        description: Users this conversation is shared with
                        items:
                          type: object
                          additionalProperties: false
                          required:
                            - userId
                            - accessLevel
                          properties:
                            userId:
                              type: string
                              format: objectId
                            accessLevel:
                              type: string
                              enum:
                                - read
                                - write
                              default: read
                      isArchived:
                        type: boolean
                        default: false
                        description: Whether this conversation is archived
                      archivedBy:
                        type: string
                        format: objectId
                        nullable: true
                        description: |
                          User ID of the last user who archived this row, or `null` after
                          unarchive cleared the archive state. Absent on rows that have
                          never been archived.
                      isDeleted:
                        type: boolean
                        default: false
                        description: Whether this conversation has been soft-deleted.
                      deletedBy:
                        type: string
                        format: objectId
                        description: User who soft-deleted this conversation.
                      conversationErrors:
                        type: array
                        description: |
                          Errors recorded against this conversation
                          (e.g. failed message generations).
                        items:
                          type: object
                          additionalProperties: false
                          required:
                            - _id
                            - message
                            - timestamp
                          properties:
                            _id:
                              type: string
                              format: objectId
                              description: Sub-document identifier auto-assigned by MongoDB.
                            message:
                              type: string
                            errorType:
                              type: string
                            timestamp:
                              type: string
                              format: date-time
                              description: |
                                Time the error was recorded. Server-defaulted
                                to `Date.now` when the entry is pushed, so
                                always present.
                            messageId:
                              type: string
                              format: objectId
                            stack:
                              type: string
                            metadata:
                              type: object
                              additionalProperties: true
                              description: |
                                Free-form metadata attached to this error
                                entry (Map of Mixed in the schema).
                      metadata:
                        type: object
                        additionalProperties: true
                        description: Free-form metadata attached to the conversation.
                      lastActivityAt:
                        type: integer
                        format: int64
                        description: |
                          Unix timestamp of the last activity, stored as
                          epoch milliseconds (server-side default `Date.now`).
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                      __v:
                        type: integer
                        description: Mongoose document version key.
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - requestId
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: |
                          Server-side request identifier. Read from the
                          `X-Request-ID` header when supplied, otherwise
                          auto-generated, so this field is always present.
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
                        description: Server-side processing time in milliseconds.
        "400":
          description: |
            Invalid request. Possible causes:

            - `title` missing, empty, or longer than 200 characters.
            - `conversationId` path parameter is not a valid ObjectId.
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - token is missing the `conversation:write` scope
        "404":
          description: Conversation not found, soft-deleted, or not owned by the caller.
        "500":
          description: Persistence layer failed to update the conversation document.
  "/conversations/{conversationId}/archive":
    patch:
      tags:
        - Conversations
      summary: Archive conversation
      description: |
        Archive a conversation to hide it from the main list.

        **Overview:**

        Archived conversations are preserved but hidden from the default conversation list.
        Use archiving to clean up your workspace without permanently deleting conversations.

        **Access:**

        The caller must be the conversation's initiator, or be listed in `sharedWith`
        with `accessLevel: write`. Already-archived conversations return `400`.

        **Retrieval:**

        View archived conversations using `GET /conversations/show/archives`.
        Restore one with `PATCH /conversations/{conversationId}/unarchive`.
      operationId: archiveConversation
      security:
        - bearerAuth: []
        - oauth2:
            - conversation:write
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        "200":
          description: Conversation archived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Conversation identifier
                  status:
                    type: string
                    enum:
                      - archived
                    description: New archive status of the conversation
                  archivedBy:
                    type: string
                    format: objectId
                    description: User who archived the conversation
                  archivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the conversation was archived
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                        description: Request correlation identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: Response generation timestamp
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
        "400":
          description: Conversation is already archived
        "401":
          description: Unauthorized
        "404":
          description: Conversation not found or caller lacks archive permission
  "/conversations/{conversationId}/unarchive":
    patch:
      tags:
        - Conversations
      summary: Unarchive conversation
      description: |
        Restore an archived conversation.

        - Path params: `conversationId`
        - Query params: none
        - Body: none
      operationId: unarchiveConversation
      security:
        - bearerAuth: []
        - oauth2:
            - conversation:write
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Conversation identifier
          schema:
            type: string
            format: objectId
      responses:
        "200":
          description: Conversation unarchived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Conversation identifier
                  status:
                    type: string
                    enum:
                      - unarchived
                    description: New archive status of the conversation
                  unarchivedBy:
                    type: string
                    format: objectId
                    description: User who unarchived the conversation
                  unarchivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the conversation was unarchived
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      requestId:
                        type: string
                        description: Request correlation identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: Response generation timestamp
                      duration:
                        type: integer
                        description: Server processing time in milliseconds
        "400":
          description: Conversation is not currently archived
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - token is missing the `conversation:write` scope
        "404":
          description: Conversation not found or caller lacks unarchive permission
        "500":
          description: Persistence layer failed to update the conversation document.
  "/conversations/{conversationId}/message/{messageId}/regenerate":
    post:
      tags:
        - Conversations
      summary: Regenerate AI response
      description: |
        Regenerate the AI response for a specific message and stream the new
        answer over Server-Sent Events.

        **Overview:**

        If you're not satisfied with an AI response, use this endpoint to generate
        a new answer. The original user query is re-processed and a new bot
        response replaces the previous one in place.

        **Constraints:**

        - Only the *last* message of the conversation can be regenerated.
        - The target message must be of type `bot_response`.

        **Use Cases:**

        - Response was incomplete or unclear
        - Want to try a different AI model
        - New documents have been indexed since original response

        **Model Override:**

        Specify `modelKey` to use a different model for regeneration.

        **Streaming:**

        The response is delivered as an SSE (`text/event-stream`) stream. The
        exact event vocabulary depends on `chatMode`:

        - For non-agent modes (e.g. `internal_search`, `web_search`) the
          request is dispatched to the assistant chat backend.
        - For agent modes (e.g. `agent:auto`) the request is dispatched to
          the agent backend with a placeholder agent built from the caller's
          workspace, which can additionally emit `tool_result` and
          `tool_execution_complete` events.

        See `SSEEvent` for the full union of event names this endpoint can
        emit across both backends.
      operationId: regenerateAnswer
      security:
        - bearerAuth: []
        - oauth2:
            - conversation:chat
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          description: ID of the message to regenerate response for
          schema:
            type: string
            format: objectId
      requestBody:
        description: Request payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateRequest"
      responses:
        "200":
          description: |
            SSE stream established. The body is a sequence of
            `text/event-stream` frames using the event vocabulary described
            on `SSEEvent`. The exact subset of events emitted depends on
            `chatMode` (see the route description for routing rules).

            Lifecycle (all event names are sent verbatim on the wire):
            - `connected` — `{ "message": "SSE connection established" }`.
              Fired once on connection by the API layer.
            - `status` — progress messages from the AI backend. Possible
              `status` sub-values include `started`, `transforming`,
              `searching`, `processing`, `checking_tools`,
              `generating_answer`, `generating`, `analyzing`, `evaluating`,
              `planning`, `executing`, `retrying`, `continuing`, `success`,
              `skipped`, `pending`, `keepalive`, `cascade_error`, and
              backend-defined values that may be added over time.
            - `answer_chunk` — incremental token batches with running
              `accumulated` text, accumulated `citations`, and the
              backend-supplied `confidence` (typically null until the final
              chunk).
            - `tool_calls` / `tool_call` / `tool_success` / `tool_error` —
              emitted when the model invokes tools (agent chat modes, or the
              non-agent path when SQL / record-fetch tools are configured).
            - `tool_result` / `tool_execution_complete` — additional tool
              lifecycle events emitted only on the agent-mode path.
            - `restreaming` — emitted when the LLM is restarted with new
              context (e.g. before a citation-verification pass or
              reflection-driven retry).
            - `metadata` — `{}` keep-alive emitted by the JSON-streaming
              branch while waiting for the next safe-to-flush chunk.
            - `complete` — `{ "conversation": Conversation, "recordsUsed":
              number, "meta": { "requestId": string, "timestamp": string,
              "duration": number, "recordsUsed": number } }`. Fired once
              after the regeneration is persisted; the new bot response
              replaces the previous one in `conversation.messages` at the
              same index. The AI backend's own `complete` frame is consumed
              server-side and is **not** forwarded — clients see only this
              server-defined frame.
            - `error` — `{ "error": string, "details"?: string }`. Fired if
              the stream fails; the previous bot response is replaced with an
              error message and the conversation row is marked FAILED before
              close.

            Clients should ignore unknown event names rather than treating
            them as errors.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"
        "400":
          description: |
            Cannot regenerate. Common causes: target message is not the last
            message in the conversation, target message is not of type
            `bot_response`, or no preceding `user_query` exists.
        "401":
          description: Unauthorized
        "404":
          description: Conversation or message not found
  "/conversations/{conversationId}/message/{messageId}/feedback":
    post:
      tags:
        - Conversations
      summary: Submit feedback on AI response
      description: |
        Append a feedback entry to a bot-response message.

        **Overview**

        Feedback helps improve AI response quality over time. You can record an
        overall helpfulness signal, per-aspect ratings, issue categories, and
        free-text comments. Each call appends a new entry to the message;
        previous entries are preserved.

        **Feedback options**

        - `isHelpful` — overall thumbs up/down.
        - `ratings` — 1–5 scores keyed by an aspect name you choose
          (e.g. `accuracy`, `relevance`, `completeness`, `clarity`).
        - `categories` — issue or positive categories from a fixed list.
        - `comments` — free-text `positive`, `negative`, and `suggestions`.
        - `metrics` — optional client-side telemetry
          (`userInteractionTime`, `feedbackSessionId`).

        **Restrictions**

        Feedback can only be submitted on `bot_response` messages — user
        queries and system messages are rejected with `400`.
      operationId: updateMessageFeedback
      security:
        - bearerAuth: []
        - oauth2:
            - conversation:write
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier.
          schema:
            type: string
            format: objectId
        - name: messageId
          in: path
          required: true
          description: Identifier of the bot-response message being rated.
          schema:
            type: string
            format: objectId
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              description: |
                All fields are optional. An empty object is accepted and still
                records an entry stamped with the server-side `feedbackProvider`,
                `timestamp`, and `metrics`.
              properties:
                isHelpful:
                  type: boolean
                  description: Overall helpfulness signal (thumbs up/down).
                ratings:
                  type: object
                  description: |
                    Per-aspect ratings. Keys are arbitrary aspect names chosen
                    by the client (typically `accuracy`, `relevance`,
                    `completeness`, `clarity`); values are scores in the range
                    1–5.
                  additionalProperties:
                    type: number
                    minimum: 1
                    maximum: 5
                categories:
                  type: array
                  description: Issue or positive categories that apply to the response.
                  items:
                    type: string
                    enum:
                      - incorrect_information
                      - missing_information
                      - irrelevant_information
                      - unclear_explanation
                      - poor_citations
                      - excellent_answer
                      - helpful_citations
                      - well_explained
                      - other
                comments:
                  type: object
                  additionalProperties: false
                  description: Free-text comments grouped by sentiment.
                  properties:
                    positive:
                      type: string
                      description: What was good about the response.
                    negative:
                      type: string
                      description: What could be improved.
                    suggestions:
                      type: string
                      description: Specific suggestions for improvement.
                metrics:
                  type: object
                  additionalProperties: false
                  description: Optional client-supplied telemetry.
                  properties:
                    userInteractionTime:
                      type: number
                      description: Total time the user spent reviewing the response, in milliseconds.
                    feedbackSessionId:
                      type: string
                      description: Opaque session identifier used by the client to group related feedback events.
      responses:
        "200":
          description: Feedback submitted successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - conversationId
                  - messageId
                  - feedback
                  - meta
                properties:
                  conversationId:
                    type: string
                    format: objectId
                    description: Conversation the feedback was attached to.
                  messageId:
                    type: string
                    format: objectId
                    description: Message the feedback was attached to.
                  feedback:
                    type: object
                    additionalProperties: false
                    required:
                      - feedbackProvider
                      - timestamp
                      - metrics
                    description: |
                      The feedback entry just appended to the message. Echoes
                      the fields supplied in the request plus server-stamped
                      `feedbackProvider`, `timestamp`, and `metrics`.
                    properties:
                      isHelpful:
                        type: boolean
                        description: Echoed from the request when supplied.
                      ratings:
                        type: object
                        description: Echoed per-aspect ratings (values 1–5).
                        additionalProperties:
                          type: number
                          minimum: 1
                          maximum: 5
                      categories:
                        type: array
                        description: Echoed categories from the request.
                        items:
                          type: string
                          enum:
                            - incorrect_information
                            - missing_information
                            - irrelevant_information
                            - unclear_explanation
                            - poor_citations
                            - excellent_answer
                            - helpful_citations
                            - well_explained
                            - other
                      comments:
                        type: object
                        additionalProperties: false
                        description: Echoed free-text comments from the request.
                        properties:
                          positive:
                            type: string
                          negative:
                            type: string
                          suggestions:
                            type: string
                      feedbackProvider:
                        type: string
                        format: objectId
                        description: User who submitted the feedback. Always present.
                      timestamp:
                        type: integer
                        format: int64
                        description: |
                          Submission time as epoch milliseconds (not an ISO 8601
                          datetime). Always present.
                      metrics:
                        type: object
                        additionalProperties: false
                        required:
                          - timeToFeedback
                        description: |
                          Telemetry recorded server-side alongside the feedback.
                          Always present.
                        properties:
                          timeToFeedback:
                            type: number
                            description: |
                              Milliseconds between message creation and feedback
                              submission. Always present.
                          userInteractionTime:
                            type: number
                            description: Echoed from `metrics.userInteractionTime` in the request when supplied.
                          feedbackSessionId:
                            type: string
                            description: Echoed from `metrics.feedbackSessionId` in the request when supplied.
                          userAgent:
                            type: string
                            description: Value of the `User-Agent` request header captured server-side.
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - requestId
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: |
                          Server-side request identifier. Read from the
                          `X-Request-ID` header when supplied, otherwise
                          auto-generated, so this field is always present.
                      timestamp:
                        type: string
                        format: date-time
                      duration:
                        type: integer
                        description: Server-side processing time in milliseconds.
        "400":
          description: |
            Invalid request. Possible causes:

            - Feedback target is not a `bot_response` message.
            - A value in `ratings` is outside the 1–5 range.
            - A `categories` value is not in the allowed list.
            - `conversationId` or `messageId` is not a valid ObjectId.
        "401":
          description: Unauthorized.
        "404":
          description: |
            Conversation or message not found, or the caller does not have
            access to this conversation.
        "500":
          description: Persistence layer failed to append the feedback entry.
  /search:
    post:
      tags:
        - Semantic Search
      summary: Perform semantic search
      description: |
        Run a semantic search across your organization's knowledge base.
        Matching is meaning-based, so relevant results surface even when
        the wording differs from the query.

        Use optional `filters` to narrow the scope:

        - `filters.apps` — restrict to specific connector apps (for
          example Google Drive or Confluence).
        - `filters.kb` — restrict to specific knowledge bases.

        The response returns a `searchId` for the persisted search along
        with ranked matches, each carrying a relevance score and the
        source document's metadata. Past searches can be retrieved via
        `GET /search`.
      operationId: search
      security:
        - bearerAuth: []
        - oauth2:
            - semantic:write
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemanticSearchRequest"
            examples:
              simple:
                summary: Basic search
                value:
                  query: company vacation policy
                  limit: 10
      responses:
        "200":
          description: Search ID plus retrieval payload (`searchResponse`) from the AI search service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemanticSearchExecuteResponse"
        "400":
          description: |
            Invalid request — `query` is missing, empty, or the request
            body fails validation.
        "401":
          description: |
            Missing or invalid bearer token.
        "403":
          description: |
            Bearer token lacks the `semantic:write` scope.
        "404":
          description: |
            A referenced knowledge base or app filter could not be
            resolved.
        "500":
          description: |
            Unexpected server error while executing the search, or the
            upstream AI search service was unreachable.
        "502":
          description: |
            The upstream AI search service returned an invalid response.
        "503":
          description: |
            The upstream AI search service is temporarily unavailable.
        "504":
          description: |
            The upstream AI search service timed out before returning a
            response.
    get:
      tags:
        - Semantic Search
      summary: Get search history
      description: |
        Retrieve the authenticated user's persisted search history.

        Returns searches the user owns along with searches shared with them,
        scoped to the caller's organization. Archived and deleted entries are
        excluded. Citation references on this endpoint are returned as raw
        identifier strings; use `GET /search/{searchId}` to fetch a single
        search with its citations fully expanded.

        Pagination defaults to `page=1, limit=20` (maximum `limit` is 100).
        Results are sorted by most recent activity by default.
      operationId: searchHistory
      security:
        - bearerAuth: []
        - oauth2:
            - semantic:read
      parameters:
        - name: page
          in: query
          description: Page number to return. Must be within `[1, 1000]`.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1
        - name: limit
          in: query
          description: Number of items per page. Values are clamped to the range `[1, 100]`.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: |
            Field used to sort results. Any value other than `createdAt`,
            `lastActivityAt`, or `title` is treated as `lastActivityAt`.
          schema:
            type: string
            enum:
              - createdAt
              - lastActivityAt
              - title
            default: lastActivityAt
        - name: sortOrder
          in: query
          description: Sort direction applied to `sortBy`.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: search
          in: query
          description: |
            Case-insensitive substring to match against a search's title and
            message content. Regex metacharacters are escaped automatically.
            Values longer than 1000 characters are rejected with `400`.
          schema:
            type: string
        - name: shared
          in: query
          description: |
            Filter results by their shared status. Accepted values are
            `'true'` / `'1'` (return only shared searches) and
            `'false'` / `'0'` (exclude shared searches). Matching is
            case-insensitive and surrounding whitespace is trimmed.
          schema:
            type: string
            enum:
              - "true"
              - "false"
              - "1"
              - "0"
        - name: startDate
          in: query
          description: ISO 8601 timestamp used as the lower bound for a search's creation date.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: ISO 8601 timestamp used as the upper bound for a search's creation date.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: |
            Persisted search history plus pagination, applied/available filter
            metadata, and a request-scoped `meta` block.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemanticSearchHistoryResponse"
        "400":
          description: |
            Invalid request, raised when
            a query parameter fails validation — for example a malformed
            `startDate` / `endDate`, a `search` value over 1000 characters,
            or a query value that trips the XSS guard.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is either `VALIDATION_ERROR` (request failed
                          schema validation) or `HTTP_BAD_REQUEST` (semantic
                          validation failed — malformed date, value over the
                          allowed length, or XSS-guard trip).
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error
        "401":
          description: |
            Missing or invalid bearer token.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is `HTTP_UNAUTHORIZED` (missing, invalid, or
                          expired bearer token, user no longer exists, or the
                          session has been invalidated).
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: |
            Bearer token lacks the `semantic:read` scope.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is `HTTP_FORBIDDEN` (the token is valid but
                          does not carry the `semantic:read` scope).
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error
        "500":
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: Error envelope for a failed request.
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    description: Error payload.
                    properties:
                      code:
                        type: string
                        description: |
                          Machine-readable error code. For this status the
                          value is `HTTP_INTERNAL_SERVER_ERROR` for an
                          explicit server-side failure, or `INTERNAL_ERROR`
                          for an unhandled exception coerced by the global
                          error middleware.
                      message:
                        type: string
                        description: Human-readable description of the failure.
                    required:
                      - code
                      - message
                required:
                  - error
    delete:
      tags:
        - Semantic Search
      summary: Clear all search history
      description: |
        Permanently delete every persisted search row owned by, or shared
        with, the authenticated user, along with the citation rows those
        searches reference. The action cannot be undone.

        Scoped to the caller's org and limited to rows where
        `isDeleted: false` and `isArchived: false`. If nothing matches
        (including the case where every row is already archived), the
        endpoint returns `404` rather than a successful no-op.
      operationId: deleteSearchHistory
      security:
        - bearerAuth: []
        - oauth2:
            - semantic:delete
      parameters:
        - name: search
          in: query
          description: |
            Restrict the deletion to rows whose `title` or `messages.content`
            matches this case-insensitive substring. Special regex characters
            are escaped before the lookup; values over 1000 chars are
            rejected with `400`.
          schema:
            type: string
        - name: shared
          in: query
          description: |
            Restrict the deletion to rows with this `isShared` value
            (`'true'` / `'false'`).
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - name: startDate
          in: query
          description: |
            ISO 8601 lower bound for `createdAt`. Combined with `endDate`
            to scope which rows are deleted.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: ISO 8601 upper bound for `createdAt`.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Search history deleted successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
        "400":
          description: |
            Invalid request, raised
            from the shared filter helper when a query parameter fails
            validation — for example a malformed `startDate` / `endDate`,
            a `search` value over 1000 characters, or a `search` value
            that trips the XSS guard.
        "401":
          description: |
            Missing or invalid bearer token.
        "403":
          description: |
            Bearer token lacks the `semantic:delete` scope.
        "404":
          description: |
            No matching rows. Returned when the caller has no owned or
            shared searches that satisfy the filter.
        "500":
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.
  "/search/{searchId}":
    get:
      tags:
        - Semantic Search
      summary: Get search by ID
      description: |
        Retrieve a previously persisted search by its id, scoped to the
        caller's org.

        The response body is always an **array** containing zero or one
        persisted search document. An unknown id returns an empty array
        with a `200` status — callers should check array length rather
        than relying on a `404`.
      operationId: getSearchById
      security:
        - bearerAuth: []
        - oauth2:
            - semantic:read
      parameters:
        - name: searchId
          in: path
          required: true
          description: Unique search identifier
          schema:
            type: string
            format: objectId
      responses:
        "200":
          description: Array containing zero or one persisted search document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistedSemanticSearchEnvelope"
        "400":
          description: |
            Invalid request — `searchId`
            failed Zod validation (not a valid ObjectId).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - VALIDATION_ERROR
                        description: |
                          Machine-readable error code. `VALIDATION_ERROR`
                          is emitted when the request fails Zod
                          validation.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        "401":
          description: |
            Missing or invalid bearer token.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_UNAUTHORIZED
                        description: |
                          Machine-readable error code. `HTTP_UNAUTHORIZED`
                          is emitted when the bearer token is missing,
                          invalid, or expired.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        "403":
          description: |
            Bearer token lacks the `semantic:read` scope.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_FORBIDDEN
                        description: |
                          Machine-readable error code. `HTTP_FORBIDDEN`
                          is emitted when the bearer token is valid but
                          lacks the required scope.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        "404":
          description: |
            Reserved for parity with sibling routes; this endpoint
            currently returns `200` with an empty array for an unknown
            id rather than emitting `404`.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_NOT_FOUND
                        description: |
                          Machine-readable error code. `HTTP_NOT_FOUND`
                          is emitted when the addressed resource does
                          not exist.
                      message:
                        type: string
                        description: Human-readable description of the failure.
        "500":
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - error
                properties:
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_INTERNAL_SERVER_ERROR
                          - INTERNAL_ERROR
                          - MIDDLEWARE_ERROR
                        description: |
                          Machine-readable error code.

                          - `HTTP_INTERNAL_SERVER_ERROR` — explicit
                            `InternalServerError` raised by the handler.
                          - `INTERNAL_ERROR` — unhandled exception
                            caught by the global error middleware.
                          - `MIDDLEWARE_ERROR` — the error middleware
                            itself failed while serializing the
                            response.
                      message:
                        type: string
                        description: Human-readable description of the failure.
    delete:
      tags:
        - Semantic Search
      summary: Delete search by ID
      description: |
        Permanently delete a single persisted search row, plus every
        citation row referenced by its `citationIds`. The caller must
        either own the row or have it shared with them.

        Scoped to the caller's org and limited to rows where
        `isDeleted: false` and `isArchived: false`; archived or
        already-deleted rows surface as `404`.
      operationId: deleteSearchById
      security:
        - bearerAuth: []
        - oauth2:
            - semantic:delete
      parameters:
        - name: searchId
          in: path
          required: true
          description: ObjectId of the persisted search row to delete.
          schema:
            type: string
            format: objectId
        - name: search
          in: query
          description: |
            Additional substring filter against `title` / `messages.content`.
            The row is only deleted if the `searchId` row also matches this
            filter; otherwise `404`. Special regex characters are escaped;
            values over 1000 chars or tripping the XSS guard yield `400`.
          schema:
            type: string
        - name: shared
          in: query
          description: |
            Additional `isShared` filter (`'true'` / `'false'`). The row is
            only deleted if it also matches this value.
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - name: startDate
          in: query
          description: |
            ISO 8601 lower bound for `createdAt`. The row is only deleted
            if its `createdAt` is on or after this value.
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: |
            ISO 8601 upper bound for `createdAt`. The row is only deleted
            if its `createdAt` is on or before this value.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Search deleted successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - message
                properties:
                  message:
                    type: string
        "400":
          description: |
            Invalid request. Possible causes:

            - `searchId` failed Zod validation
              (not a valid ObjectId).
            - A query parameter passed through to
              the shared filter helper failed validation, e.g. a
              malformed `startDate` / `endDate`, or a `search` value
              over 1000 characters or tripping the XSS guard.
        "401":
          description: |
            Missing or invalid bearer token.
        "403":
          description: |
            Bearer token lacks the `semantic:delete` scope.
        "404":
          description: |
            No search matched. Returned when the id does not exist for
            this caller, or when the row is archived or already deleted.
        "500":
          description: |
            Server error. Possible causes:

            - Explicit `InternalServerError`
              or any other 500 `BaseError` thrown by the handler.
            - Non-`BaseError` exception caught by the
              global error middleware.
            - Response serializer fallback.
  "/search/{searchId}/archive":
    patch:
      tags:
        - Semantic Search
      summary: Archive a search
      description: |
        Archive a specific search result. Archived searches are hidden
        from the default search history view but remain retrievable via
        the archive-aware listing endpoints.
      operationId: archiveSearch
      security:
        - bearerAuth: []
        - oauth2:
            - semantic:write
      parameters:
        - name: searchId
          in: path
          required: true
          description: Unique search identifier
          schema:
            type: string
            format: objectId
      responses:
        "200":
          description: Search archived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - id
                  - status
                  - archivedBy
                  - archivedAt
                  - meta
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Unique identifier of the archived search.
                    example: 65f1c0a4e2b9c4d8f3a1b2c3
                  status:
                    type: string
                    enum:
                      - archived
                    description: Resulting status of the search after the operation.
                    example: archived
                  archivedBy:
                    type: string
                    format: objectId
                    description: User ID of the user who archived the search.
                    example: 65f1c0a4e2b9c4d8f3a1b2c4
                  archivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the search was archived.
                    example: 2026-05-10T12:34:56.789Z
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: Server-assigned request identifier for tracing. Omitted when not available.
                        example: req_8f3a1b2c
                      timestamp:
                        type: string
                        format: date-time
                        description: Server timestamp when the response was produced.
                        example: 2026-05-10T12:34:56.789Z
                      duration:
                        type: integer
                        description: Time taken to process the request, in milliseconds.
                        example: 42
        "400":
          description: |
            Invalid request. Possible causes:

            - `searchId` failed Zod validation
              (not a valid ObjectId).
            - The target search is already archived.
        "401":
          description: |
            Missing or invalid bearer token.
        "403":
          description: |
            Bearer token lacks the `semantic:write` scope.
        "404":
          description: |
            Search not found, or not owned by the caller's org.
        "500":
          description: |
            Persistence layer failed to update the search document.
  "/search/{searchId}/unarchive":
    patch:
      tags:
        - Semantic Search
      summary: Unarchive a search
      description: |
        Restore a previously archived search result back to the active search history.
      operationId: unarchiveSearch
      security:
        - bearerAuth: []
        - oauth2:
            - semantic:write
      parameters:
        - name: searchId
          in: path
          required: true
          description: Unique search identifier
          schema:
            type: string
            format: objectId
      responses:
        "200":
          description: Search unarchived successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - id
                  - status
                  - unarchivedBy
                  - unarchivedAt
                  - meta
                properties:
                  id:
                    type: string
                    format: objectId
                    description: Unique identifier of the unarchived search.
                    example: 65f1c0a4e2b9c4d8f3a1b2c3
                  status:
                    type: string
                    enum:
                      - unarchived
                    description: Resulting status of the search after the operation.
                    example: unarchived
                  unarchivedBy:
                    type: string
                    format: objectId
                    description: User ID of the user who unarchived the search.
                    example: 65f1c0a4e2b9c4d8f3a1b2c4
                  unarchivedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the search was unarchived.
                    example: 2026-05-10T12:34:56.789Z
                  meta:
                    type: object
                    additionalProperties: false
                    required:
                      - timestamp
                      - duration
                    properties:
                      requestId:
                        type: string
                        description: Server-assigned request identifier for tracing. Omitted when not available.
                        example: req_8f3a1b2c
                      timestamp:
                        type: string
                        format: date-time
                        description: Server timestamp when the response was produced.
                        example: 2026-05-10T12:34:56.789Z
                      duration:
                        type: integer
                        description: Time taken to process the request, in milliseconds.
                        example: 42
        "400":
          description: |
            Invalid request. Possible causes:

            - `searchId` failed Zod validation
              (not a valid ObjectId).
            - The target search is not currently
              archived and therefore cannot be unarchived.
        "401":
          description: |
            Missing or invalid bearer token.
        "403":
          description: |
            Bearer token lacks the `semantic:write` scope.
        "404":
          description: |
            No archived search matches `searchId` within the caller's
            org, or the row is already active / deleted.
        "500":
          description: |
            Unexpected server error while unarchiving the search.
  "/configurationManager/ai-models/available/{modelType}":
    get:
      tags:
        - AI Models Providers
      summary: Get available models by type
      description: |
        Returns a **flattened list** of individual AI models of the requested type,
        suitable for use in selection dropdowns and model-picker UIs.

        Each provider configuration entry may specify multiple comma-separated model
        names; this endpoint expands those into one object per model name so callers
        receive a flat, enumerable collection.

        **Flattening rules:**
        - Only the **first** model in a multi-model provider entry is marked
          `isDefault: true`; all subsequent models from the same entry get `false`.
        - `modelFriendlyName` is included **only** when the provider entry contains
          exactly one model name (not a comma-separated list).
        - When no providers of the requested type are configured the endpoint still
          returns HTTP **200** with an empty `models` array — this is **not** an error.

        **Access control:** requires a valid bearer token. For OAuth tokens the
        `config:read` scope must be present; regular JWT bearer tokens pass through
        without scope enforcement.
      operationId: getAvailableModelsByType
      security:
        - bearerAuth: []
        - oauth2:
            - config:read
      parameters:
        - name: modelType
          in: path
          required: true
          description: |
            Category of AI model to retrieve.

            Must be one of: `llm`, `embedding`, `ocr`, `slm`, `reasoning`, `multiModal`, `imageGeneration`, `tts`, `stt`.
          schema:
            $ref: "#/components/schemas/ModelType"
      responses:
        "200":
          description: |
            Available models retrieved successfully.

            An empty `models` array (with HTTP 200) is returned when no providers of
            the requested type have been configured — treat this as a valid, empty
            state, not an error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - models
                  - message
                properties:
                  status:
                    type: string
                    enum:
                      - success
                    example: success
                  message:
                    type: string
                    description: |-
                      Human-readable summary. Two formats are possible:
                      - `"Found {n} {modelType} models"` — the `modelType` key
                        exists in the stored config (returned even when `n` is 0,
                        e.g. `"Found 0 ocr models"`).

                      - `"No {modelType} models found"` — no AI config has been
                        stored yet, or the `modelType` key is absent from the
                        stored config entirely.
                    example: Found 2 llm models
                  models:
                    type: array
                    description: Flat list of individual model entries. Each entry represents one model name from one provider configuration.
                    items:
                      type: object
                      required:
                        - modelType
                        - provider
                        - modelName
                        - modelKey
                        - isMultimodal
                        - isReasoning
                        - isDefault
                      properties:
                        modelType:
                          allOf:
                            - $ref: "#/components/schemas/ModelType"
                          description: Model category — always matches the `{modelType}` path parameter.
                        provider:
                          type: string
                          description: Provider identifier as stored in configuration (e.g. `openAI`, `azureOpenAI`, `anthropic`, `gemini`, `ollama`).
                          example: azureOpenAI
                        modelName:
                          type: string
                          description: Specific model name/identifier forwarded to the provider API when making inference calls.
                          example: gpt-5.4-mini
                        modelKey:
                          type: string
                          format: uuid
                          description: UUID that uniquely identifies the provider configuration entry this model was expanded from. Use this key when calling update/delete endpoints.
                          example: f3a4b5b6-5b6c-4e85-9097-3202cfe696fc
                        isMultimodal:
                          type: boolean
                          description: "`true` when this model accepts multi-modal inputs (text + images). Always present; defaults to `false` when not explicitly set."
                          example: true
                        isReasoning:
                          type: boolean
                          description: "`true` when this is a reasoning / chain-of-thought model. Always present; defaults to `false` when not explicitly set."
                          example: true
                        isDefault:
                          type: boolean
                          description: "`true` for the first model in the provider entry that was marked as default. At most one entry per `modelType` will have this set to `true`."
                          example: true
                        modelFriendlyName:
                          type: string
                          description: Optional human-readable display name. Only present when the provider configuration entry contains exactly one model name (not a comma-separated list) **and** a friendly name was added during configuration.
                          example: Reasoning model
              examples:
                two_llm_models:
                  summary: Two LLM models from an Azure OpenAI provider
                  value:
                    status: success
                    message: Found 2 llm models
                    models:
                      - modelType: llm
                        provider: azureOpenAI
                        modelName: gpt-5.4-mini
                        modelKey: f3a4b5b6-5b6c-4e85-9097-3202cfe696fc
                        isMultimodal: true
                        isReasoning: true
                        isDefault: true
                      - modelType: llm
                        provider: azureOpenAI
                        modelName: gpt-5.4
                        modelKey: 7af8d3a7-ad2e-43a1-8716-ae95e4fbc888
                        isMultimodal: true
                        isReasoning: true
                        isDefault: false
                        modelFriendlyName: Reasoning model
                no_models_configured:
                  summary: modelType key present in config but zero models after expansion
                  value:
                    status: success
                    message: Found 0 ocr models
                    models: []
        "400":
          description: |
            Invalid `modelType` path parameter.

            The `modelType` value was not one of the supported enum categories.
            This response is produced by the Zod validation middleware **before**
            the handler runs. The `error.metadata.errors` array contains
            per-field detail about exactly which constraint failed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                      - metadata
                    properties:
                      code:
                        type: string
                        enum:
                          - VALIDATION_ERROR
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: Validation failed
                      metadata:
                        type: object
                        required:
                          - errors
                        description: Per-field validation detail from Zod.
                        properties:
                          errors:
                            type: array
                            items:
                              type: object
                              required:
                                - field
                                - message
                                - code
                                - value
                              properties:
                                field:
                                  type: string
                                  description: Dot-separated path to the failing field within the request (params, body, query).
                                  example: params.modelType
                                message:
                                  type: string
                                  description: Human-readable Zod validation message.
                                  example: Invalid enum value. Expected 'ocr' | 'embedding' | 'llm' | 'slm' | 'reasoning' | 'multiModal' | 'imageGeneration' | 'tts' | 'stt', received 'llmr'
                                code:
                                  type: string
                                  description: Machine-readable error code mapped from the Zod issue code.
                                  enum:
                                    - INVALID_TYPE
                                    - INVALID_LITERAL
                                    - INVALID_ENUM
                                    - INVALID_UNION
                                    - INVALID_DISCRIMINATOR
                                    - INVALID_ARGUMENTS
                                    - TOO_SMALL
                                    - TOO_BIG
                                  example: INVALID_ENUM
                                value:
                                  type: string
                                  description: The rejected value stringified. May be an empty string when the value is not easily serialisable.
                                  example: ""
              example:
                error:
                  code: VALIDATION_ERROR
                  message: Validation failed
                  metadata:
                    errors:
                      - field: params.modelType
                        message: Invalid enum value. Expected 'ocr' | 'embedding' | 'llm' | 'slm' | 'reasoning' | 'multiModal' | 'imageGeneration' | 'tts' | 'stt', received 'llmr'
                        code: INVALID_ENUM
                        value: ""
        "401":
          description: |
            Missing or invalid authentication token.

            The bearer token was absent, expired, malformed, or could not be
            verified by the auth middleware.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_UNAUTHORIZED
                        example: HTTP_UNAUTHORIZED
                      message:
                        type: string
                        example: Invalid token
              example:
                error:
                  code: HTTP_UNAUTHORIZED
                  message: Invalid token
        "403":
          description: |
            Insufficient OAuth scope.

            Only applies to OAuth tokens. The token did not carry the `config:read`
            scope required by this endpoint. Regular (non-OAuth) JWT bearer tokens
            are not subject to scope enforcement and will not receive this error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_FORBIDDEN
                        example: HTTP_FORBIDDEN
                      message:
                        type: string
                        example: "Insufficient scope. Required: config:read"
              example:
                error:
                  code: HTTP_FORBIDDEN
                  message: "Insufficient scope. Required: config:read"
        "500":
          description: An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        enum:
                          - HTTP_INTERNAL_SERVER_ERROR
                        example: HTTP_INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: An unexpected error occurred
              example:
                error:
                  code: HTTP_INTERNAL_SERVER_ERROR
                  message: An unexpected error occurred
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token for authenticated requests
    scopedToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Scoped JWT token for service-to-service authentication.
        Format: "Bearer {scoped_token}"
        Required scopes vary by endpoint.
    oauth2:
      type: oauth2
      description: |
        OAuth 2.0 authentication with fine-grained scopes.
        Supports authorization_code (with PKCE) and client_credentials flows.
        OAuth tokens are Bearer JWTs — use the same Authorization header as regular tokens.
        For **client_credentials**, machine JWTs may use `userId === client_id`; the Node gateway resolves the OAuth app creator and forwards **`x-oauth-user-id`** to Python where applicable — see **OAuth Provider** tag.
      flows:
        authorizationCode:
          authorizationUrl: /api/v1/oauth2/authorize
          tokenUrl: /api/v1/oauth2/token
          refreshUrl: /api/v1/oauth2/token
          scopes:
            openid: OpenID Connect authentication
            profile: User profile information
            email: User email address
            offline_access: Offline access (refresh tokens)
            org:read: Read organization information
            org:write: Update organization settings
            org:admin: Full organization administration
            user:read: Read user profiles
            user:write: Update user profiles
            user:invite: Invite new users
            user:delete: Delete users
            usergroup:read: Read user groups
            usergroup:write: Create and manage user groups
            team:read: Read team information
            team:write: Create and manage teams
            kb:read: Read knowledge bases and records
            kb:write: Create and update knowledge bases
            kb:delete: Delete knowledge bases and records
            kb:upload: Upload files to knowledge bases
            semantic:read: Read semantic search results and history
            semantic:write: Execute semantic search
            semantic:delete: Delete semantic search history
            conversation:read: Read conversations
            conversation:write: Create and manage conversations
            conversation:chat: Send messages in conversations
            agent:read: Read AI agents
            agent:write: Create and manage AI agents
            agent:execute: Execute AI agents
            connector:read: Read connector configurations
            connector:write: Create and update connectors
            connector:sync: Trigger connector synchronization
            connector:delete: Delete connectors
            config:read: Read system configuration
            config:write: Update system configuration
            crawl:read: Read crawling jobs
            crawl:write: Create and manage crawling jobs
            crawl:delete: Delete crawling jobs
        clientCredentials:
          tokenUrl: /api/v1/oauth2/token
          scopes:
            openid: OpenID Connect authentication
            profile: User profile information
            email: User email address
            offline_access: Offline access (refresh tokens)
            org:read: Read organization information
            org:write: Update organization settings
            org:admin: Full organization administration
            user:read: Read user profiles
            user:write: Update user profiles
            user:invite: Invite new users
            user:delete: Delete users
            usergroup:read: Read user groups
            usergroup:write: Create and manage user groups
            team:read: Read team information
            team:write: Create and manage teams
            kb:read: Read knowledge bases and records
            kb:write: Create and update knowledge bases
            kb:delete: Delete knowledge bases and records
            kb:upload: Upload files to knowledge bases
            semantic:write: Execute semantic search
            semantic:read: Read semantic search results and history
            semantic:delete: Delete semantic search history
            conversation:read: Read conversations
            conversation:write: Create and manage conversations
            conversation:chat: Send messages in conversations
            agent:read: Read AI agents
            agent:write: Create and manage AI agents
            agent:execute: Execute AI agents
            connector:read: Read connector configurations
            connector:write: Create and update connectors
            connector:sync: Trigger connector synchronization
            connector:delete: Delete connectors
            config:read: Read system configuration
            config:write: Update system configuration
            crawl:read: Read crawling jobs
            crawl:write: Create and manage crawling jobs

  schemas:
    InitAuthRequest:
      type: object
      additionalProperties: false
      description: |
        Optional JSON body for `/userAccount/initAuth`. Valid shapes include: omitting the body entirely, sending `{}` (empty object), or `{ "email": "<address>" }`. Neither the body nor `email` is required. When `email` is omitted or empty, the session is still created and `allowedMethods` / `authProviders` are returned as usual; clients typically supply `email` later on `/userAccount/authenticate`. The `email` property remains supported mainly for legacy clients and backward compatibility.
      properties:
        email:
          type: string
          format: email
          description: |
            Optional; retained for legacy reasons. When set, stored on the auth session for correlation with later `/authenticate` calls (RFC 5321 compliant address).
          example: user@example.com
    InitAuthResponse:
      type: object
      additionalProperties: false
      description: Response containing available authentication methods and session info
      properties:
        currentStep:
          type: integer
          description: Current authentication step (0-indexed). Always 0 for initial response.
          example: 0
        allowedMethods:
          type: array
          items:
            type: string
            enum:
              - samlSso
              - otp
              - password
              - google
              - microsoft
              - azureAd
              - oauth
          description: List of allowed authentication methods for the current step
          example:
            - password
            - google
            - otp
        message:
          type: string
          description: Response message
          example: Authentication initialized
        authProviders:
          $ref: "#/components/schemas/AuthProviders"
        jitEnabled:
          type: boolean
          description: True when at least one allowed external provider has JIT provisioning enabled
      required:
        - currentStep
        - allowedMethods
        - message
        - authProviders
        - jitEnabled
    ErrorResponse:
      type: object
      additionalProperties: false
      description: |
        Standard error envelope returned by all errors routed through `ErrorMiddleware`.
        Applies to all `BaseError` subclasses including `HttpError`, `ValidationError`, and others.
        The `code` field is a machine-readable string identifying the error type (e.g.
        `HTTP_UNAUTHORIZED`, `HTTP_NOT_FOUND`, `VALIDATION_ERROR`, `INTERNAL_ERROR`).
      properties:
        error:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: |
                Machine-readable error code. For application errors it takes the form `HTTP_<VARIANT>`
                For unhandled runtime errors (e.g. database unavailable) it is `INTERNAL_ERROR`.
              example: HTTP_BAD_REQUEST
            message:
              type: string
              description: Human-readable description of the error
              example: Admin access required
            metadata:
              type: object
              description: Additional context (only present in development environments)
              additionalProperties: true
      required:
        - error
    AuthenticateRequest:
      type: object
      additionalProperties: false
      description: |
        Request to authenticate using specified method.
        **Credential format varies by method:**
        - `password`: `{ password: "string" }`
        - `otp`: `{ otp: "123456" }` (6-digit code)
        - `google`: `"google-id-token-string"`
        - `microsoft`: `{ accessToken: "...", idToken: "..." }`
        - `azureAd`: `{ accessToken: "...", idToken: "..." }`
        - `oauth`: `{ accessToken: "...", idToken: "..." }`
        - `samlSso`: handled via redirect flow
      properties:
        method:
          type: string
          enum:
            - samlSso
            - otp
            - password
            - google
            - microsoft
            - azureAd
            - oauth
          description: Authentication method to use
        credentials:
          oneOf:
            - $ref: "#/components/schemas/PasswordCredentials"
            - $ref: "#/components/schemas/OtpCredentials"
            - $ref: "#/components/schemas/OAuthCredentials"
            - type: string
              description: Google ID token (for google method)
          description: Credentials based on the authentication method
        email:
          type: string
          format: email
          description: Optional email for verification (used with some OAuth methods)
        cf-turnstile-response:
          type: string
          description: Cloudflare Turnstile CAPTCHA token (optional, if CAPTCHA is enabled)
      required:
        - method
        - credentials
    AuthenticateResponse:
      oneOf:
        - $ref: "#/components/schemas/AuthenticateMultiStepResponse"
        - $ref: "#/components/schemas/AuthenticateFinalResponse"
      description: |
        Either the next step in a multi-factor flow (`status`, `nextStep`, `allowedMethods`, `authProviders`)
        or final tokens (`message`, `accessToken`, `refreshToken`).
    TokenPasswordResetRequest:
      type: object
      additionalProperties: false
      description: Request to reset password using email token
      properties:
        password:
          type: string
          format: password
          description: |
            New password (must meet password requirements)
          minLength: 8
      required:
        - password
    DataStringResponse:
      type: object
      additionalProperties: false
      description: Generic success payload with a single string field (e.g. password reset email, token reset)
      properties:
        data:
          type: string
      required:
        - data
    AuthenticatedPasswordResetResponse:
      type: object
      additionalProperties: false
      description: Response after authenticated user changes password (new access token issued)
      properties:
        data:
          type: string
          example: password reset
        accessToken:
          type: string
          description: New JWT access token after password change
      required:
        - data
        - accessToken
    AuthConfig:
      type: object
      additionalProperties: false
      description: |
        Organization authentication configuration. Supports 1-3 authentication steps for multi-factor authentication.
        **Validation Rules:**
        - Minimum 1 step, maximum 3 steps
        - Each step must have unique order
        - No duplicate methods within the same step
        - No method can appear in multiple steps
      properties:
        authMethods:
          type: array
          items:
            $ref: "#/components/schemas/AuthStep"
          description: List of authentication steps in order
          minItems: 1
          maxItems: 3
      required:
        - authMethods
    AuthStep:
      type: object
      additionalProperties: false
      description: A single step in multi-factor authentication flow
      properties:
        order:
          type: integer
          description: Order of the authentication step (1-3, must be unique across steps)
          minimum: 1
          maximum: 3
        allowedMethods:
          type: array
          items:
            $ref: "#/components/schemas/AuthMethod"
          description: List of allowed authentication methods for this step. User can choose any one method from this list.
          minItems: 1
      required:
        - order
        - allowedMethods
    UpdateAuthMethodResponse:
      type: object
      additionalProperties: false
      description: Response after updating organization authentication methods
      properties:
        message:
          type: string
          example: Auth method updated
        authMethod:
          type: array
          description: Updated authentication steps (same shape as request body)
          items:
            $ref: "#/components/schemas/AuthStep"
      required:
        - message
        - authMethod
    OrgAuthConfigCreateRequest:
      type: object
      additionalProperties: false
      description: Request to create initial organization auth configuration
      properties:
        contactEmail:
          type: string
          format: email
          description: Organization contact email
        registeredName:
          type: string
          description: Organization registered name
        adminFullName:
          type: string
          description: Admin user full name
        sendEmail:
          type: boolean
          description: Whether to send welcome email
          default: false
      required:
        - contactEmail
        - registeredName
        - adminFullName
    OrgAuthConfigSetupResponse:
      type: object
      additionalProperties: false
      description: Response from setting up organization auth configuration
      properties:
        message:
          type: string
      required:
        - message
    Organization:
      type: object
      properties:
        _id:
          type: string
          format: ObjectId
          description: Unique organization identifier
        slug:
          type: string
          description: Unique slug for the organization
        registeredName:
          type: string
          description: Registered name
        shortName:
          type: string
          description: Short name or display name
        domain:
          type: string
          description: Organization domain
        contactEmail:
          type: string
          format: email
          description: Contact email address
        accountType:
          type: string
          enum:
            - individual
            - business
          description: Type of account
        permanentAddress:
          $ref: "#/components/schemas/Address"
        onBoardingStatus:
          type: string
          enum:
            - configured
            - notConfigured
            - skipped
          description: Onboarding status
        isDeleted:
          type: boolean
          description: Soft delete flag
          default: false
        __v:
          type: integer
          description: Document version (MongoDB)
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp (ISO 8601)
      required:
        - domain
        - contactEmail
        - accountType
    KnowledgeHubNodesResponse:
      type: object
      description: |
        Response body for the Knowledge Hub nodes API. The deployed service
        serialises optional values as JSON `null` and always includes the keys
        listed in `required` (Swagger / clients will see stable shapes, not
        omitted properties).
      required:
        - success
        - error
        - id
        - currentNode
        - parentNode
        - items
        - pagination
        - filters
        - breadcrumbs
        - counts
        - permissions
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Always `true` on HTTP 200. Failures use 4xx/5xx error envelopes, not this body shape.
        error:
          type: string
          nullable: true
          description: Always `null` on HTTP 200.
        id:
          type: string
          nullable: true
          description: Current parent node ID when browsing children; `null` at root.
        currentNode:
          type: object
          nullable: true
          description: Node being browsed when `parentId` is in the path; `null` at root.
          required:
            - id
            - name
            - nodeType
          properties:
            id:
              type: string
            name:
              type: string
            nodeType:
              type: string
              description: One of `app`, `recordGroup`, `folder`, `record`.
            subType:
              type: string
              nullable: true
              description: Connector name or record type when applicable; otherwise `null`.
        parentNode:
          type: object
          nullable: true
          description: Parent of `currentNode` when present; `null` when not applicable.
          required:
            - id
            - name
            - nodeType
          properties:
            id:
              type: string
            name:
              type: string
            nodeType:
              type: string
              description: One of `app`, `recordGroup`, `folder`, `record`.
            subType:
              type: string
              nullable: true
        items:
          type: array
          description: Page of nodes for the current browse or search.
          items:
            $ref: "#/components/schemas/KnowledgeHubNode"
        pagination:
          type: object
          required:
            - page
            - limit
            - totalItems
            - totalPages
            - hasNext
            - hasPrev
          properties:
            page:
              type: integer
              description: Current page (1-indexed).
            limit:
              type: integer
              description: Page size.
            totalItems:
              type: integer
            totalPages:
              type: integer
            hasNext:
              type: boolean
            hasPrev:
              type: boolean
        filters:
          type: object
          required:
            - applied
            - available
          properties:
            applied:
              type: object
              description: Echo of applied filters; unused slots are JSON `null`.
              required:
                - q
                - nodeTypes
                - recordTypes
                - origins
                - connectorIds
                - indexingStatus
                - createdAt
                - updatedAt
                - size
                - sortBy
                - sortOrder
              properties:
                q:
                  type: string
                  nullable: true
                nodeTypes:
                  type: array
                  nullable: true
                  items:
                    type: string
                recordTypes:
                  type: array
                  nullable: true
                  items:
                    type: string
                origins:
                  type: array
                  nullable: true
                  items:
                    type: string
                connectorIds:
                  type: array
                  nullable: true
                  items:
                    type: string
                indexingStatus:
                  type: array
                  nullable: true
                  items:
                    type: string
                createdAt:
                  nullable: true
                  allOf:
                    - $ref: "#/components/schemas/DateRangeFilter"
                updatedAt:
                  nullable: true
                  allOf:
                    - $ref: "#/components/schemas/DateRangeFilter"
                size:
                  nullable: true
                  allOf:
                    - $ref: "#/components/schemas/SizeRangeFilter"
                sortBy:
                  type: string
                  description: Effective sort field after server normalisation.
                sortOrder:
                  type: string
                  description: Effective sort order after server normalisation.
            available:
              type: object
              nullable: true
              description: Populated when `include=availableFilters`; otherwise `null`.
              required:
                - nodeTypes
                - recordTypes
                - origins
                - connectors
                - indexingStatus
                - sortBy
                - sortOrder
              properties:
                nodeTypes:
                  type: array
                  items:
                    $ref: "#/components/schemas/FilterOption"
                recordTypes:
                  type: array
                  items:
                    $ref: "#/components/schemas/FilterOption"
                origins:
                  type: array
                  items:
                    $ref: "#/components/schemas/FilterOption"
                connectors:
                  type: array
                  items:
                    $ref: "#/components/schemas/FilterOption"
                indexingStatus:
                  type: array
                  items:
                    $ref: "#/components/schemas/FilterOption"
                sortBy:
                  type: array
                  items:
                    $ref: "#/components/schemas/FilterOption"
                sortOrder:
                  type: array
                  items:
                    $ref: "#/components/schemas/FilterOption"
        breadcrumbs:
          type: array
          nullable: true
          description: Present when `include=breadcrumbs`; otherwise `null`.
          items:
            type: object
            required:
              - id
              - name
              - nodeType
            properties:
              id:
                type: string
              name:
                type: string
              nodeType:
                type: string
                description: One of `app`, `recordGroup`, `folder`, `record`.
              subType:
                type: string
                nullable: true
        counts:
          type: object
          nullable: true
          description: Present when `include=counts`; otherwise `null`.
          required:
            - items
            - total
          properties:
            items:
              type: array
              items:
                type: object
                required:
                  - label
                  - count
                properties:
                  label:
                    type: string
                  count:
                    type: integer
            total:
              type: integer
        permissions:
          type: object
          nullable: true
          description: Present when `include=permissions`; otherwise `null`.
          required:
            - role
            - canUpload
            - canCreateFolders
            - canEdit
            - canDelete
            - canManagePermissions
          properties:
            role:
              type: string
            canUpload:
              type: boolean
            canCreateFolders:
              type: boolean
            canEdit:
              type: boolean
            canDelete:
              type: boolean
            canManagePermissions:
              type: boolean
    CreateConversationRequest:
      type: object
      description: |
        Request body for creating a new AI conversation.

        **Query Processing:**

        The query is processed through PipesHub's AI pipeline which:

        - Performs semantic search across indexed knowledge bases
        - Retrieves relevant context from matching documents
        - Generates a response with citations to source materials
        - Suggests follow-up questions based on the conversation
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 100000
          description: |
            The user's question or prompt to start the conversation.
            Supports natural language queries of any complexity.
          example: What are the key findings from our Q4 financial report?
        recordIds:
          type: array
          items:
            type: string
            format: objectId
          description: |
            Limit the AI's knowledge scope to specific records/documents.
            When provided, only these records will be searched for context.
          example:
            - 507f1f77bcf86cd799439011
            - 507f1f77bcf86cd799439012
        departments:
          type: array
          items:
            type: string
            format: objectId
          description: Filter by department IDs to scope the search
        filters:
          $ref: "#/components/schemas/Filters"
        appliedFilters:
          $ref: "#/components/schemas/AppliedFilters"
        modelKey:
          type: string
          description: |
            Identifier for the AI model configuration to use.
            Available models depend on organization settings.
          example: gpt-4-turbo
        modelName:
          type: string
          description: Display name of the AI model
          example: GPT-4 Turbo
        modelFriendlyName:
          type: string
          description: Friendly display name of the selected model
          example: GPT-4 Turbo
        chatMode:
          type: string
          description: |
            Chat mode affecting response behavior.
            Different modes optimize for different use cases.
          example: balanced
        timezone:
          type: string
          minLength: 1
          description: |
            IANA timezone identifier from the client (top-level field).
            Used to provide time-aware context to the AI.
          example: America/New_York
        currentTime:
          type: string
          format: date-time
          description: |
            ISO 8601 / RFC 3339 datetime from the client (top-level field; UTC `Z` or numeric offset).
          example: 2026-04-12T16:00:00+05:30
        tools:
          type: array
          items:
            type: string
            minLength: 1
          description: |
            Optional list of tool identifiers (fully-qualified action names such as
            "jira.create_issue") that the AI agent is permitted to invoke for this
            request. When omitted the agent may use any configured tool. Applicable
            only when chatMode is an agent mode (e.g. "agent:auto").
          example:
            - jira.create_issue
            - confluence.search_content
    AssistantStreamSSEEvent:
      type: object
      description: |
        Server-Sent Event envelope for non-agent assistant chat streams
        (`internal_search` / `web_search` chat modes). `data` is a
        JSON-encoded string whose shape depends on `event`.

        Three events are emitted by the API layer with stable, server-defined
        shapes:

        - `connected` — `{ "message": string, "conversationId": string,
          "title": string }`. Fired once on connection so the client can link
          the stream to the new row before any tokens arrive.
        - `complete` — `{ "conversation": Conversation,
          "meta": { "requestId": string, "timestamp": string,
          "duration": number } }`. Fired once after the AI backend finishes.
        - `error` — `{ "error": string, "details"?: string }`. Fired when the
          stream fails; the conversation row is marked FAILED before close.

        The remaining events are forwarded from the Python query service.
        Their payloads are AI-backend defined and may evolve:

        - `status` — progress message describing the current pipeline stage
          (for example `started`, `searching`, `processing`, `checking_tools`,
          `generating_answer`, `transforming`).
        - `answer_chunk` — incremental token batch with running `accumulated`
          text and any new `citations`.
        - `tool_calls` — the assistant requested one or more tool calls.
          Carries the assistant message that triggered the tool round.
        - `tool_call` — emitted once per individual tool invocation as it
          starts. Payload includes `tool_name`, `tool_args`, and `call_id`.
        - `tool_success` — a tool finished successfully. Payload includes
          `tool_name`, `summary`, `call_id`, and any `record_info`.
        - `tool_error` — a tool invocation failed. Payload includes
          `tool_name`, `error`, and `call_id`.
        - `restreaming` — the LLM is being restarted with new context, for
          example before a citation-verification pass.

        Clients should ignore unknown event names rather than treating them
        as errors.
      properties:
        event:
          type: string
          enum:
            - connected
            - status
            - answer_chunk
            - tool_calls
            - tool_call
            - tool_success
            - tool_error
            - restreaming
            - complete
            - error
        data:
          type: string
          description: JSON-encoded event payload. Shape depends on `event`.
    ConversationListItem:
      type: object
      description: |
        Conversation summary returned by list endpoints. Identical to
        `Conversation` but omits `messages` to keep list payloads small.
        Fetch a single conversation to retrieve its messages.
      properties:
        _id:
          type: string
          format: objectId
        userId:
          type: string
          format: objectId
        orgId:
          type: string
          format: objectId
        title:
          type: string
        initiator:
          type: string
          format: objectId
        status:
          type: string
          enum:
            - None
            - Inprogress
            - Complete
            - Failed
        failReason:
          type: string
        modelInfo:
          type: object
          properties:
            modelKey:
              type: string
            modelName:
              type: string
            modelFriendlyName:
              type: string
            modelProvider:
              type: string
            chatMode:
              type: string
        isShared:
          type: boolean
        shareLink:
          type: string
        sharedWith:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                format: objectId
              accessLevel:
                type: string
                enum:
                  - read
                  - write
        isArchived:
          type: boolean
        archivedBy:
          type: string
          format: objectId
          nullable: true
          description: |
            User ID of the last user who archived this row, or `null` after
            unarchive cleared the archive state. Absent on rows that have
            never been archived.
        isDeleted:
          type: boolean
        deletedBy:
          type: string
          format: objectId
        conversationErrors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              errorType:
                type: string
              timestamp:
                type: string
                format: date-time
              messageId:
                type: string
                format: objectId
              stack:
                type: string
              metadata:
                type: object
                additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        lastActivityAt:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isOwner:
          type: boolean
          readOnly: true
        accessLevel:
          type: string
          enum:
            - read
            - write
          readOnly: true
    Conversation:
      type: object
      description: |
        A conversation represents a chat session between a user and the AI.
        Conversations maintain context across multiple messages and can be
        shared, archived, and organized.
      properties:
        _id:
          type: string
          format: objectId
          description: Unique conversation identifier
        userId:
          type: string
          format: objectId
          description: ID of the user who owns this conversation
        orgId:
          type: string
          format: objectId
          description: Organization this conversation belongs to
        title:
          type: string
          description: |
            Conversation title, auto-generated from first query
            or manually updated
          example: Q4 Financial Report Discussion
        initiator:
          type: string
          format: objectId
          description: User who started the conversation
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
          description: All messages in this conversation
        status:
          type: string
          enum:
            - None
            - Inprogress
            - Complete
            - Failed
          description: |
            Current status of the conversation:
            - `None` — no activity yet
            - `Inprogress` — AI is processing
            - `Complete` — response ready
            - `Failed` — error occurred
        failReason:
          type: string
          description: Error description, populated only when `status` is `Failed`.
        modelInfo:
          type: object
          properties:
            modelKey:
              type: string
            modelName:
              type: string
            modelFriendlyName:
              type: string
              description: Friendly display name of the selected model
            modelProvider:
              type: string
            chatMode:
              type: string
          description: AI model configuration used
        isShared:
          type: boolean
          default: false
          description: Whether this conversation is shared with others
        shareLink:
          type: string
          description: Shareable link if conversation is shared
        sharedWith:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                format: objectId
              accessLevel:
                type: string
                enum:
                  - read
                  - write
          description: Users this conversation is shared with
        isArchived:
          type: boolean
          default: false
          description: Whether this conversation is archived
        archivedBy:
          type: string
          format: objectId
          nullable: true
          description: |
            User ID of the last user who archived this row, or `null` after
            unarchive cleared the archive state. Absent on rows that have
            never been archived.
        isDeleted:
          type: boolean
          default: false
          description: Whether this conversation has been soft-deleted.
        deletedBy:
          type: string
          format: objectId
          description: User who soft-deleted this conversation.
        conversationErrors:
          type: array
          description: Errors recorded against this conversation (e.g. failed message generations).
          items:
            type: object
            required:
              - message
            properties:
              message:
                type: string
              errorType:
                type: string
              timestamp:
                type: string
                format: date-time
              messageId:
                type: string
                format: objectId
              stack:
                type: string
              metadata:
                type: object
                additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
          description: Free-form metadata attached to the conversation.
        lastActivityAt:
          type: integer
          description: Unix timestamp of last activity
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isOwner:
          type: boolean
          description: |
            Computed per request. `true` when the requesting user is the
            conversation's `initiator`.
          readOnly: true
        accessLevel:
          type: string
          enum:
            - read
            - write
          description: |
            Computed per request. The requester's effective access level:
            their entry in `sharedWith`, or `read` by default.
          readOnly: true
    Citation:
      type: object
      additionalProperties: false
      description: |
        A populated citation document. Represents a single chunk of source
        content (e.g. a passage from a document or record) referenced by an
        AI response, together with its provenance metadata.
      required:
        - _id
        - content
        - chunkIndex
        - citationType
        - metadata
        - createdAt
        - updatedAt
      properties:
        _id:
          type: string
          format: objectId
        content:
          type: string
          description: The cited text chunk
        chunkIndex:
          type: integer
          description: Index of this chunk within the source record
        citationType:
          type: string
          description: Source type identifier (e.g. `vectordb|document`)
        metadata:
          $ref: "#/components/schemas/PersistedSemanticSearchCitationMetadata"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FollowUpQuestion:
      type: object
      description: AI-suggested follow-up question
      properties:
        question:
          type: string
          description: The suggested question text
        confidence:
          type: string
          description: Confidence level for this suggestion
        reasoning:
          type: string
          description: Why this question might be relevant
    MessageFeedback:
      type: object
      additionalProperties: false
      description: |
        Comprehensive feedback on an AI response. Feedback helps improve
        the AI's performance and response quality over time.
      properties:
        isHelpful:
          type: boolean
          description: Overall helpfulness rating
        ratings:
          type: object
          additionalProperties: false
          properties:
            accuracy:
              type: integer
              minimum: 1
              maximum: 5
              description: How accurate was the information (1-5)
            relevance:
              type: integer
              minimum: 1
              maximum: 5
              description: How relevant was the response (1-5)
            completeness:
              type: integer
              minimum: 1
              maximum: 5
              description: How complete was the answer (1-5)
            clarity:
              type: integer
              minimum: 1
              maximum: 5
              description: How clear was the explanation (1-5)
        categories:
          type: array
          items:
            type: string
            enum:
              - incorrect_information
              - missing_information
              - irrelevant_information
              - unclear_explanation
              - poor_citations
              - excellent_answer
              - helpful_citations
              - well_explained
              - other
          description: Categories of issues or positive attributes identified
        comments:
          type: object
          additionalProperties: false
          properties:
            positive:
              type: string
              description: What was good about the response
            negative:
              type: string
              description: What could be improved
            suggestions:
              type: string
              description: Specific suggestions for improvement
        citationFeedback:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              _id:
                type: string
                format: objectId
                description: Auto-generated sub-document identifier
              citationId:
                type: string
                format: objectId
              isRelevant:
                type: boolean
              relevanceScore:
                type: integer
                minimum: 1
                maximum: 5
              comment:
                type: string
          description: Feedback on individual citations
        followUpQuestionsHelpful:
          type: boolean
          description: Were the suggested follow-up questions helpful
        unusedFollowUpQuestions:
          type: array
          items:
            type: string
          description: Follow-up questions that were suggested but not used by the user
        source:
          type: string
          enum:
            - user
            - system
            - admin
            - auto
          default: user
          description: Origin of the feedback. Always present in responses (server applies the default `user`).
        feedbackProvider:
          type: string
          format: objectId
          description: User who submitted the feedback
        timestamp:
          type: integer
          format: int64
          description: |
            Time the feedback was created, stored as a Number (epoch milliseconds)
            with a server-side default of `Date.now`, so always present in responses.
            Not an ISO 8601 datetime.
        revisions:
          type: array
          description: Audit trail of edits to this feedback entry
          items:
            type: object
            additionalProperties: false
            properties:
              _id:
                type: string
                format: objectId
                description: Auto-generated sub-document identifier
              updatedFields:
                type: array
                items:
                  type: string
                description: Names of feedback fields modified in this revision
              previousValues:
                type: object
                additionalProperties: true
                description: |
                  Map of previously-set values for the fields named in `updatedFields`,
                  keyed by field name. Stored as a Mongoose Map of Mixed values.
              updatedBy:
                type: string
                format: objectId
              updatedAt:
                type: integer
                format: int64
                description: Time the revision was recorded, as epoch milliseconds.
        metrics:
          type: object
          additionalProperties: false
          description: Optional telemetry captured alongside the feedback
          properties:
            timeToFeedback:
              type: number
              description: Time from response delivery to feedback submission
            userInteractionTime:
              type: number
              description: Total time the user spent reviewing the response
            feedbackSessionId:
              type: string
            userAgent:
              type: string
            platform:
              type: string
    ConversationModelInfo:
      type: object
      additionalProperties: false
      description: AI model configuration recorded against a conversation or message.
      properties:
        modelKey:
