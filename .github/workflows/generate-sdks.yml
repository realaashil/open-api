name: Generate SDKs

on:
  push:
    branches: [main]
    paths:
      - "source_specs/**"
      - ".speakeasy/**"

  workflow_dispatch:
    inputs:
      speakeasy_version:
        description: "Speakeasy CLI version"
        required: false
        default: "v1.739.0"

# Only one SDK generation at a time; cancel older runs
concurrency:
  group: sdk-generation
  cancel-in-progress: true

permissions:
  contents: read

# Use dispatch input if provided, otherwise fallback to default
env:
  SPEAKEASY_VERSION: ${{ github.event.inputs.speakeasy_version || 'v1.739.0' }}

jobs:
  generate-sdk:
    name: Generate ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - lang: typescript
            name: TypeScript SDK
            repo: pipeshub-ai/pipeshub-sdk-typescript
            branch_prefix: auto/sdk-update
          - lang: python
            name: Python SDK
            repo: pipeshub-ai/pipeshub-sdk-python
            branch_prefix: auto/sdk-update
          - lang: mcp-typescript
            name: MCP Server
            repo: pipeshub-ai/mcp-server
            branch_prefix: auto/mcp-update
          - lang: go
            name: Go SDK
            repo: pipeshub-ai/pipeshub-sdk-go
            branch_prefix: auto/sdk-update

    steps:
      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          path: spec-repo

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target.repo }}
          token: ${{ secrets.GH_TOKEN }}
          path: target-repo
          ref: main

      - name: Install Speakeasy CLI
        run: |
          curl -fsSL -o /tmp/speakeasy.zip https://github.com/speakeasy-api/speakeasy/releases/download/${SPEAKEASY_VERSION}/speakeasy_linux_amd64.zip
          unzip -o /tmp/speakeasy.zip -d /usr/local/bin speakeasy
          chmod +x /usr/local/bin/speakeasy

      - name: Clean generated src before regeneration
        working-directory: target-repo
        run: |
          if [ -d "src" ]; then
            rm -rf src
          fi

      - name: Generate SDK
        working-directory: spec-repo
        run: |
          speakeasy generate sdk \
            -s source_specs/pipeshub-sdk-openapi.yaml \
            -l ${{ matrix.target.lang }} \
            -o "$GITHUB_WORKSPACE/target-repo" \
            -p
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}

      - name: Clean up generated README
        working-directory: target-repo
        run: |
          if [ -f "README.md" ]; then
            # Remove the MIT license badge line
            sed -i '/\[!\[License: MIT\]/d' README.md
            # Remove the "not ready for production" warning block
            sed -i '/\[!IMPORTANT\]/,/publishing to a package manager/d' README.md
          fi

      - name: Check for changes
        id: changes
        working-directory: target-repo
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get spec commit info
        if: steps.changes.outputs.has_changes == 'true'
        id: spec_info
        working-directory: spec-repo
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha_full=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$(git log -1 --pretty=format:'%s')" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Use a fixed branch name so every run overwrites the same branch/PR
          BRANCH="${{ matrix.target.branch_prefix }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create/switch to the fixed branch
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "$(cat <<'EOF'
          chore: regenerate ${{ matrix.target.name }} from OpenAPI spec update

          Spec commit: ${{ steps.spec_info.outputs.sha_short }}
          Spec change: ${{ steps.spec_info.outputs.commit_msg }}
          EOF
          )"

          # Force push to overwrite the stale remote branch
          git push origin "$BRANCH" --force

          # Create PR only if one doesn't already exist for this branch
          gh pr create \
            --repo "${{ matrix.target.repo }}" \
            --base main \
            --head "$BRANCH" \
            --title "chore: update ${{ matrix.target.name }} from OpenAPI spec (${{ steps.spec_info.outputs.sha_short }})" \
            --body "$(cat <<'PREOF'
          ## Auto-generated ${{ matrix.target.name }} Update

          This PR was automatically created by the [OpenAPI spec repo](https://github.com/pipeshub-ai/open-api) when the spec was updated.

          **Spec commit:** [`${{ steps.spec_info.outputs.sha_short }}`](https://github.com/pipeshub-ai/open-api/commit/${{ steps.spec_info.outputs.sha_full }})
          **Spec change:** ${{ steps.spec_info.outputs.commit_msg }}
          **Workflow run:** [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          > Please review the generated changes before merging.
          PREOF
            )" \
            || echo "PR already exists for branch $BRANCH — updated via force push."

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "### ${{ matrix.target.name }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Changes detected — PR created/updated in \`${{ matrix.target.repo }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ${{ matrix.target.name }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No changes detected — nothing to do." >> "$GITHUB_STEP_SUMMARY"
          fi
