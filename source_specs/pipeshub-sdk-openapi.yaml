openapi: 3.0.0
info:
  title: PipesHub API
  description: |
    Unified API documentation for PipesHub services.

    PipesHub is an enterprise-grade platform providing:
    - User authentication and management
    - Document storage and version control
    - Knowledge base management
    - Enterprise search and conversational AI
    - Third-party integrations via connectors
    - System configuration management
    - Crawling job scheduling
    - Email services

    ## Authentication
    Most endpoints require JWT Bearer token authentication. Some internal endpoints use scoped tokens for service-to-service communication.

    **OAuth 2.0 Bearer tokens** from `POST /oauth2/token` use the same `Authorization: Bearer` header. For **`client_credentials`**, machine tokens may encode `userId === client_id` in the JWT; the **Node API gateway** resolves the OAuth **app creator**, sets the authenticated user accordingly, and forwards **`x-oauth-user-id`** to Python services on proxied calls. Do not send **`x-oauth-user-id`** yourself—the gateway removes untrusted values on ingress. See the **OAuth Provider** tag for full behavior.

    ## Base URLs
    All endpoints use the `/api/v1` prefix unless otherwise noted.
  version: 1.0.0
  contact:
    name: API Support
    email: support@pipeshub.com
servers:
- url: '{instance_url}/api/v1'
  description: Base API URL
  variables:
    instance_url:
      default: https://app.pipeshub.com
      description: Base server URL (without /api/v1)
- url: '{instance_url}'
  description: Root URL (used for MCP endpoints mounted at /mcp)
  variables:
    instance_url:
      default: https://app.pipeshub.com
      description: Base server URL
tags:
- name: User Account
  description: User authentication including multi-step MFA, password reset, OTP login, and token management
- name: Organization Auth Config
  description: Admin configuration of authentication methods including MFA steps and allowed providers
- name: OAuth Provider
  description: |
    PipesHub OAuth 2.0 Authorization Server implementing RFC 6749, RFC 7636 (PKCE), and OpenID Connect.

    **Supported Grant Types:**
    - `authorization_code` - Standard OAuth flow with PKCE support
    - `client_credentials` - Machine-to-machine authentication
    - `refresh_token` - Token refresh for long-lived access

    **Security Features:**
    - PKCE (Proof Key for Code Exchange) for public clients
    - State parameter for CSRF protection
    - Configurable token lifetimes
    - Token revocation and introspection

    **OpenID Connect:**
    - ID tokens with standard claims
    - UserInfo endpoint for profile data
    - Discovery endpoint for automatic configuration

    **Machine tokens (`client_credentials`) — gateway and downstream identity:**
    Access tokens may encode **`userId === client_id`**. The **Node.js API gateway** resolves the effective user to the OAuth **app creator**: first using the JWT **`createdBy`** claim when present, otherwise by loading the OAuth app by **`client_id`** from the registry. After verification it sets the authenticated session to that creator and may attach **`x-oauth-user-id`** (resolved user id) on **outbound** HTTP calls to Python microservices so authorization and retrieval match the same principal. **Inbound** `x-oauth-user-id` from external clients is **removed** at the gateway to prevent spoofing.

    **Python services:** Validate `Authorization: Bearer` as today. When **`x-oauth-user-id`** is present (normally only when the Node gateway added it), use it as the effective **`userId`** for scopes and user-scoped logic; otherwise use the JWT payload’s **`userId`** as-is (which may still equal **`client_id`** if the caller bypassed the gateway).

    **Operational note:** Prefer tokens whose JWT already carries the creator as **`userId`**; use **`POST /oauth-clients/{appId}/revoke-all-tokens`** and obtain new tokens from **`POST /oauth2/token`** when rotating integrations.
- name: OAuth Apps
  description: |
    Manage OAuth 2.0 client applications registered with PipesHub.

    OAuth apps allow third-party applications to access PipesHub APIs on behalf of users
    or organizations. Each app receives a client ID and secret for authentication.

    **Who can see which apps**
    - **Everyone (including org admins)** sees and manages only OAuth apps **they created** (`createdBy`). Other members' apps are hidden (not listed; individual operations return not found).

    **Who authorizes vs. client credentials**
    - **Authorization code:** Any authenticated user in the workspace may complete consent for a valid `client_id`; issued tokens represent **that user**.
    - **Client credentials:** Access tokens represent the **OAuth app creator** (who registered the client), not the caller.

    **Scopes**
    - `GET /oauth-clients/scopes` returns scopes grouped by category for the **signed-in user's role**.
    - **Org admins** may register apps that request additional **admin-only** scopes; non-admins cannot select those scopes when creating or updating an app.

    **App Types:**
    - **Confidential clients**: Server-side apps that can securely store secrets
    - **Public clients**: Browser/mobile apps that cannot securely store secrets (use PKCE)

    **App Lifecycle:**
    - Create apps with name, redirect URIs, allowed scopes, and optional URLs (homepage, privacy, terms)
    - Regenerate secrets if compromised
    - Suspend/activate apps to control access
    - Revoke all tokens for emergency access removal
- name: OpenID Connect
  description: |
    OpenID Connect 1.0 endpoints for identity federation and discovery.

    **Discovery:**
    - `/.well-known/openid-configuration` - Authorization server metadata
    - `/.well-known/oauth-authorization-server` - Authorization server metadata (RFC 8414)
    - `/.well-known/oauth-protected-resource/mcp` - Protected resource metadata (RFC 9728)
    - `/.well-known/jwks.json` - Public keys for token verification

    **UserInfo:**
    - `/oauth2/userinfo` - Get authenticated user's profile information

    **Supported Claims:**
    - `user_id` - User identifier
    - `email`, `email_verified` - Email information
    - `name`, `given_name`, `family_name` - Name information
- name: Teams
  description: Team management operations
- name: Organizations
  description: Organization management operations
- name: Knowledge Hub
  description: Unified browse API for root and child nodes (apps, record groups, folders, records) with filtering and search
- name: Conversations
  description: AI-powered conversational chat management with citations and follow-up questions
- name: Semantic Search
  description: Enterprise semantic search across all indexed knowledge with relevance scoring
- name: Agents
  description: Custom AI agents with specialized capabilities and tool integrations
- name: AI Models Providers
  description: Manage individual AI model providers - add, update, delete, and set defaults.
- name: Web Search
  description: Manage web search providers (DuckDuckGo, Serper, Tavily, Exa) and settings for internet search.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token for authenticated requests
    scopedToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Scoped JWT token for service-to-service authentication.
        Format: "Bearer {scoped_token}"
        Required scopes vary by endpoint.
    oauth2:
      type: oauth2
      description: |
        OAuth 2.0 authentication with fine-grained scopes.
        Supports authorization_code (with PKCE) and client_credentials flows.
        OAuth tokens are Bearer JWTs — use the same Authorization header as regular tokens.
        For **client_credentials**, machine JWTs may use `userId === client_id`; the Node gateway resolves the OAuth app creator and forwards **`x-oauth-user-id`** to Python where applicable — see **OAuth Provider** tag.
      flows:
        authorizationCode:
          authorizationUrl: /api/v1/oauth2/authorize
          tokenUrl: /api/v1/oauth2/token
          refreshUrl: /api/v1/oauth2/token
          scopes:
            openid: OpenID Connect authentication
            profile: User profile information
            email: User email address
            offline_access: Offline access (refresh tokens)
            org:read: Read organization information
            org:write: Update organization settings
            org:admin: Full organization administration
            user:read: Read user profiles
            user:write: Update user profiles
            user:invite: Invite new users
            user:delete: Delete users
            usergroup:read: Read user groups
            usergroup:write: Create and manage user groups
            team:read: Read team information
            team:write: Create and manage teams
            kb:read: Read knowledge bases and records
            kb:write: Create and update knowledge bases
            kb:delete: Delete knowledge bases and records
            kb:upload: Upload files to knowledge bases
            semantic:read: Read semantic search results and history
            semantic:write: Execute semantic search
            semantic:delete: Delete semantic search history
            conversation:read: Read conversations
            conversation:write: Create and manage conversations
            conversation:chat: Send messages in conversations
            agent:read: Read AI agents
            agent:write: Create and manage AI agents
            agent:execute: Execute AI agents
            connector:read: Read connector configurations
            connector:write: Create and update connectors
            connector:sync: Trigger connector synchronization
            connector:delete: Delete connectors
            config:read: Read system configuration
            config:write: Update system configuration
            crawl:read: Read crawling jobs
            crawl:write: Create and manage crawling jobs
            crawl:delete: Delete crawling jobs
        clientCredentials:
          tokenUrl: /api/v1/oauth2/token
          scopes:
            openid: OpenID Connect authentication
            profile: User profile information
            email: User email address
            offline_access: Offline access (refresh tokens)
            org:read: Read organization information
            org:write: Update organization settings
            org:admin: Full organization administration
            user:read: Read user profiles
            user:write: Update user profiles
            user:invite: Invite new users
            user:delete: Delete users
            usergroup:read: Read user groups
            usergroup:write: Create and manage user groups
            team:read: Read team information
            team:write: Create and manage teams
            kb:read: Read knowledge bases and records
            kb:write: Create and update knowledge bases
            kb:delete: Delete knowledge bases and records
            kb:upload: Upload files to knowledge bases
            semantic:write: Execute semantic search
            semantic:read: Read semantic search results and history
            semantic:delete: Delete semantic search history
            conversation:read: Read conversations
            conversation:write: Create and manage conversations
            conversation:chat: Send messages in conversations
            agent:read: Read AI agents
            agent:write: Create and manage AI agents
            agent:execute: Execute AI agents
            connector:read: Read connector configurations
            connector:write: Create and update connectors
            connector:sync: Trigger connector synchronization
            connector:delete: Delete connectors
            config:read: Read system configuration
            config:write: Update system configuration
            crawl:read: Read crawling jobs
            crawl:write: Create and manage crawling jobs
  schemas:
    AuthMethod:
      type: object
      additionalProperties: false
      description: Authentication method configuration
      properties:
        type:
          type: string
          enum:
          - samlSso
          - otp
          - password
          - google
          - microsoft
          - azureAd
          - oauth
          description: |
            Type of authentication method:
            - `password`: Email/password authentication
            - `otp`: One-time password via email (6-digit, expires in 10 minutes)
            - `google`: Google OAuth 2.0
            - `microsoft`: Microsoft OAuth 2.0
            - `azureAd`: Azure Active Directory
            - `samlSso`: SAML 2.0 Single Sign-On
            - `oauth`: Generic OAuth 2.0 provider
      required:
      - type
    AuthStep:
      type: object
      additionalProperties: false
      description: A single step in multi-factor authentication flow
      properties:
        order:
          type: integer
          description: Order of the authentication step (1-3, must be unique across steps)
          minimum: 1
          maximum: 3
        allowedMethods:
          type: array
          items:
            $ref: '#/components/schemas/AuthMethod'
          description: List of allowed authentication methods for this step. User can choose any one method from this list.
          minItems: 1
      required:
      - order
      - allowedMethods
    AuthConfig:
      type: object
      additionalProperties: false
      description: |
        Organization authentication configuration. Supports 1-3 authentication steps for multi-factor authentication.
        **Validation Rules:**
        - Minimum 1 step, maximum 3 steps
        - Each step must have unique order
        - No duplicate methods within the same step
        - No method can appear in multiple steps
      properties:
        authMethods:
          type: array
          items:
            $ref: '#/components/schemas/AuthStep'
          description: List of authentication steps in order
          minItems: 1
          maxItems: 3
      required:
      - authMethods
    UpdateAuthMethodResponse:
      type: object
      additionalProperties: false
      description: Response after updating organization authentication methods
      properties:
        message:
          type: string
          example: Auth method updated
        authMethod:
          type: array
          description: Updated authentication steps (same shape as request body)
          items:
            $ref: '#/components/schemas/AuthStep'
      required:
      - message
      - authMethod
    OrgAuthConfigSetupResponse:
      type: object
      additionalProperties: false
      description: Response from setting up organization auth configuration
      properties:
        message:
          type: string
      required:
      - message
    InitAuthRequest:
      type: object
      additionalProperties: false
      description: |
        Optional JSON body for `/userAccount/initAuth`. Valid shapes include: omitting the body entirely, sending `{}` (empty object), or `{ "email": "<address>" }`. Neither the body nor `email` is required. When `email` is omitted or empty, the session is still created and `allowedMethods` / `authProviders` are returned as usual; clients typically supply `email` later on `/userAccount/authenticate`. The `email` property remains supported mainly for legacy clients and backward compatibility.
      properties:
        email:
          type: string
          format: email
          description: |
            Optional; retained for legacy reasons. When set, stored on the auth session for correlation with later `/authenticate` calls (RFC 5321 compliant address).
          example: user@example.com
    InitAuthResponse:
      type: object
      additionalProperties: false
      description: Response containing available authentication methods and session info
      properties:
        currentStep:
          type: integer
          description: Current authentication step (0-indexed). Always 0 for initial response.
          example: 0
        allowedMethods:
          type: array
          items:
            type: string
            enum:
            - samlSso
            - otp
            - password
            - google
            - microsoft
            - azureAd
            - oauth
          description: List of allowed authentication methods for the current step
          example:
          - password
          - google
          - otp
        message:
          type: string
          description: Response message
          example: Authentication initialized
        authProviders:
          $ref: '#/components/schemas/AuthProviders'
        jitEnabled:
          type: boolean
          description: True when at least one allowed external provider has JIT provisioning enabled
      required:
      - currentStep
      - allowedMethods
      - message
      - authProviders
      - jitEnabled
    AuthProviderGooglePublicConfig:
      type: object
      additionalProperties: false
      description: Public Google OAuth settings returned to clients
      properties:
        clientId:
          type: string
          description: Google OAuth client ID
        enableJit:
          type: boolean
          description: Whether just-in-time user provisioning is enabled for Google
    AuthProviderMicrosoftPublicConfig:
      type: object
      additionalProperties: false
      description: Public Microsoft OAuth settings returned to clients
      properties:
        tenantId:
          type: string
          description: Microsoft tenant ID
        clientId:
          type: string
          description: Microsoft OAuth client ID
        enableJit:
          type: boolean
          description: Whether just-in-time user provisioning is enabled for Microsoft
    AuthProviderAzureAdPublicConfig:
      type: object
      additionalProperties: false
      description: Public Azure AD OAuth settings returned to clients
      properties:
        tenantId:
          type: string
          description: Azure AD tenant ID
        clientId:
          type: string
          description: Azure AD client ID
        enableJit:
          type: boolean
          description: Whether just-in-time user provisioning is enabled for Azure AD
    AuthProviderOAuthPublicConfig:
      type: object
      additionalProperties: false
      description: Public generic OAuth provider settings returned to clients
      properties:
        providerName:
          type: string
          description: Custom OAuth provider display name
        clientId:
          type: string
          description: OAuth client ID
        tokenEndpoint:
          type: string
          description: OAuth token endpoint URL
        authorizationUrl:
          type: string
          description: OAuth authorization URL
        clientSecret:
          type: string
          description: Client secret (omitted when stripped for public responses)
        userInfoEndpoint:
          type: string
          description: UserInfo endpoint URL
        scope:
          type: string
          description: Default OAuth scopes
        enableJit:
          type: boolean
          description: Whether just-in-time user provisioning is enabled for this provider
      required:
      - providerName
      - clientId
      - tokenEndpoint
      - authorizationUrl
    AuthProviders:
      type: object
      additionalProperties: false
      description: Configuration for external authentication providers (returned when those methods are allowed)
      properties:
        google:
          $ref: '#/components/schemas/AuthProviderGooglePublicConfig'
        microsoft:
          $ref: '#/components/schemas/AuthProviderMicrosoftPublicConfig'
        azuread:
          $ref: '#/components/schemas/AuthProviderAzureAdPublicConfig'
        oauth:
          $ref: '#/components/schemas/AuthProviderOAuthPublicConfig'
        saml:
          type: object
          description: Present when SAML SSO is an allowed method; may be an empty object
          additionalProperties: true
    AuthenticateRequest:
      type: object
      additionalProperties: false
      description: |
        Request to authenticate using specified method.
        **Credential format varies by method:**
        - `password`: `{ password: "string" }`
        - `otp`: `{ otp: "123456" }` (6-digit code)
        - `google`: `"google-id-token-string"`
        - `microsoft`: `{ accessToken: "...", idToken: "..." }`
        - `azureAd`: `{ accessToken: "...", idToken: "..." }`
        - `oauth`: `{ accessToken: "...", idToken: "..." }`
        - `samlSso`: handled via redirect flow
      properties:
        method:
          type: string
          enum:
          - samlSso
          - otp
          - password
          - google
          - microsoft
          - azureAd
          - oauth
          description: Authentication method to use
        credentials:
          oneOf:
          - $ref: '#/components/schemas/PasswordCredentials'
          - $ref: '#/components/schemas/OtpCredentials'
          - $ref: '#/components/schemas/OAuthCredentials'
          - type: string
            description: Google ID token (for google method)
          description: Credentials based on the authentication method
        email:
          type: string
          format: email
          description: Optional email for verification (used with some OAuth methods)
        cf-turnstile-response:
          type: string
          description: Cloudflare Turnstile CAPTCHA token (optional, if CAPTCHA is enabled)
      required:
      - method
      - credentials
    PasswordCredentials:
      type: object
      additionalProperties: false
      description: Credentials for password authentication
      properties:
        password:
          type: string
          description: User password
          format: password
      required:
      - password
    OtpCredentials:
      type: object
      additionalProperties: false
      description: Credentials for OTP authentication
      properties:
        otp:
          type: string
          description: 6-digit one-time password
          pattern: ^\d{6}$
          example: '123456'
      required:
      - otp
    OAuthCredentials:
      type: object
      additionalProperties: false
      description: Credentials for OAuth authentication (Microsoft, Azure AD, generic OAuth)
      properties:
        accessToken:
          type: string
          description: OAuth access token
        idToken:
          type: string
          description: OAuth ID token (JWT)
      required:
      - accessToken
    AuthenticateMultiStepResponse:
      type: object
      additionalProperties: false
      description: Current authentication step succeeded; additional MFA steps remain
      properties:
        status:
          type: string
          enum:
          - success
          description: Step completion status
        nextStep:
          type: integer
          description: Next authentication step index
        allowedMethods:
          type: array
          items:
            type: string
          description: Allowed method types for the next step
        authProviders:
          $ref: '#/components/schemas/AuthProviders'
      required:
      - status
      - nextStep
      - allowedMethods
      - authProviders
    AuthenticateFinalResponse:
      type: object
      additionalProperties: false
      description: All authentication steps complete; JWT tokens returned
      properties:
        message:
          type: string
          description: Success message
          example: Fully authenticated
        accessToken:
          type: string
          description: JWT access token (1 hour expiry)
        refreshToken:
          type: string
          description: JWT refresh token (7 days expiry)
      required:
      - message
      - accessToken
      - refreshToken
    AuthenticateResponse:
      oneOf:
      - $ref: '#/components/schemas/AuthenticateMultiStepResponse'
      - $ref: '#/components/schemas/AuthenticateFinalResponse'
      description: |
        Either the next step in a multi-factor flow (`status`, `nextStep`, `allowedMethods`, `authProviders`)
        or final tokens (`message`, `accessToken`, `refreshToken`).
    AuthenticatedPasswordResetResponse:
      type: object
      additionalProperties: false
      description: Response after authenticated user changes password (new access token issued)
      properties:
        data:
          type: string
          example: password reset
        accessToken:
          type: string
          description: New JWT access token after password change
      required:
      - data
      - accessToken
    RefreshTokenResponse:
      type: object
      additionalProperties: false
      description: Response with new access token
      properties:
        user:
          $ref: '#/components/schemas/RefreshTokenUser'
        accessToken:
          type: string
          description: New JWT access token (24 hour default expiry, configurable via ACCESS_TOKEN_EXPIRY)
      required:
      - user
      - accessToken
    RefreshTokenUser:
      type: object
      additionalProperties: false
      description: User record returned with a refreshed access token
      properties:
        _id:
          type: string
          description: User ID
        orgId:
          type: string
          description: Organization ID
        email:
          type: string
          format: email
        fullName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        designation:
          type: string
        hasLoggedIn:
          type: boolean
        isDeleted:
          type: boolean
        slug:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        __v:
          type: integer
      required:
      - _id
      - orgId
      - email
      - fullName
      - hasLoggedIn
      - isDeleted
      - slug
      - createdAt
      - updatedAt
      - __v
    OrgAuthConfigCreateRequest:
      type: object
      additionalProperties: false
      description: Request to create initial organization auth configuration
      properties:
        contactEmail:
          type: string
          format: email
          description: Organization contact email
        registeredName:
          type: string
          description: Organization registered name
        adminFullName:
          type: string
          description: Admin user full name
        sendEmail:
          type: boolean
          description: Whether to send welcome email
          default: false
      required:
      - contactEmail
      - registeredName
      - adminFullName
    ErrorResponse:
      type: object
      additionalProperties: false
      description: |
        Standard error envelope returned by all errors routed through `ErrorMiddleware`.
        Applies to all `BaseError` subclasses including `HttpError`, `ValidationError`, and others.
        The `code` field is a machine-readable string identifying the error type (e.g.
        `HTTP_UNAUTHORIZED`, `HTTP_NOT_FOUND`, `VALIDATION_ERROR`, `INTERNAL_ERROR`).
      properties:
        error:
          type: object
          additionalProperties: false
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: |
                Machine-readable error code. For application errors it takes the form `HTTP_<VARIANT>`
                For unhandled runtime errors (e.g. database unavailable) it is `INTERNAL_ERROR`.
              example: HTTP_BAD_REQUEST
            message:
              type: string
              description: Human-readable description of the error
              example: Admin access required
            metadata:
              type: object
              description: Additional context (only present in development environments)
              additionalProperties: true
      required:
      - error
    OAuthTokenRequest:
      type: object
      description: |
        OAuth 2.0 Token Request (RFC 6749 Section 4.1.3).
        Request body for exchanging authorization code or credentials for tokens.
      properties:
        grant_type:
          type: string
          enum:
          - authorization_code
          - client_credentials
          - refresh_token
          description: |
            OAuth grant type:
            - `authorization_code`: Exchange auth code for tokens
            - `client_credentials`: Machine-to-machine auth
            - `refresh_token`: Get new access token using refresh token
        code:
          type: string
          description: Authorization code (required for authorization_code grant)
        redirect_uri:
          type: string
          format: uri
          description: Redirect URI (required for authorization_code grant)
        client_id:
          type: string
          description: Client ID (can also be sent via Basic auth header)
        client_secret:
          type: string
          description: Client secret (can also be sent via Basic auth header)
        refresh_token:
          type: string
          description: Refresh token (required for refresh_token grant)
        scope:
          type: string
          description: Requested scopes (optional, defaults to original grant scopes)
        code_verifier:
          type: string
          description: |
            PKCE code verifier (RFC 7636). Required if code_challenge was used.
            Must be 43-128 characters from [A-Za-z0-9-._~]
          pattern: ^[A-Za-z0-9\-._~]{43,128}$
      required:
      - grant_type
    OAuthTokenResponse:
      type: object
      description: |
        OAuth 2.0 Token Response (RFC 6749 Section 5.1).
        Contains the access token and optional refresh/ID tokens.
      properties:
        access_token:
          type: string
          description: The access token for API requests
        token_type:
          type: string
          example: Bearer
          description: Token type (always "Bearer")
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 3600
        refresh_token:
          type: string
          description: Refresh token for obtaining new access tokens
        scope:
          type: string
          description: Granted scopes (may differ from requested)
        id_token:
          type: string
          description: OpenID Connect ID token (JWT) if openid scope was requested
    OAuthRevokeRequest:
      type: object
      description: |
        OAuth 2.0 Token Revocation Request (RFC 7009).
        Revokes an access or refresh token.
      properties:
        token:
          type: string
          description: The token to revoke
        token_type_hint:
          type: string
          enum:
          - access_token
          - refresh_token
          description: Hint about token type (optional, improves performance)
        client_id:
          type: string
          description: Client ID
        client_secret:
          type: string
          description: Client secret
      required:
      - token
      - client_id
    OAuthIntrospectRequest:
      type: object
      description: |
        OAuth 2.0 Token Introspection Request (RFC 7662).
        Check if a token is active and get its metadata.
      properties:
        token:
          type: string
          description: The token to introspect
        token_type_hint:
          type: string
          enum:
          - access_token
          - refresh_token
          description: Hint about token type
        client_id:
          type: string
          description: Client ID
        client_secret:
          type: string
          description: Client secret
      required:
      - token
      - client_id
    OAuthIntrospectResponse:
      type: object
      description: |
        OAuth 2.0 Token Introspection Response (RFC 7662).
        Contains token metadata if active, or just `active: false` if not.
      properties:
        active:
          type: boolean
          description: Whether the token is currently active
        scope:
          type: string
          description: Scopes granted to the token
        client_id:
          type: string
          description: Client ID the token was issued to
        username:
          type: string
          description: User identifier (if user-based token)
        token_type:
          type: string
          description: Token type
        exp:
          type: integer
          description: Token expiration timestamp (Unix epoch)
        iat:
          type: integer
          description: Token issuance timestamp (Unix epoch)
        nbf:
          type: integer
          description: Token not-before timestamp (Unix epoch)
        user_id:
          type: string
          description: User ID
        aud:
          type: string
          description: Audience (client ID)
        iss:
          type: string
          description: Issuer URL
        jti:
          type: string
          description: Unique token identifier
      required:
      - active
    OAuthErrorResponse:
      type: object
      description: |
        OAuth 2.0 Error Response (RFC 6749 Section 5.2).
        Standard error format for OAuth endpoints.
      properties:
        error:
          type: string
          description: |
            Error code. Common values:
            - `invalid_request` - Missing or invalid parameter
            - `invalid_client` - Client authentication failed
            - `invalid_grant` - Invalid authorization code or refresh token
            - `unauthorized_client` - Client not authorized for this grant type
            - `unsupported_grant_type` - Grant type not supported
            - `invalid_scope` - Requested scope is invalid or exceeds allowed
            - `access_denied` - User denied authorization
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          - access_denied
          - server_error
        error_description:
          type: string
          description: Human-readable error description
        error_uri:
          type: string
          format: uri
          description: URI with more information about the error
        state:
          type: string
          description: State parameter from the authorization request
      required:
      - error
    OAuthUserInfoResponse:
      type: object
      description: |
        OpenID Connect UserInfo Response.
        Contains claims about the authenticated user.
      properties:
        user_id:
          type: string
          description: User ID
        name:
          type: string
          description: Full name
        given_name:
          type: string
          description: First name
        family_name:
          type: string
          description: Last name
        email:
          type: string
          format: email
          description: Email address
        email_verified:
          type: boolean
          description: Whether email has been verified
        picture:
          type: string
          format: uri
          description: Profile picture URL
        updated_at:
          type: integer
          description: Last profile update timestamp (Unix epoch)
      required:
      - user_id
    CreateOAuthAppRequest:
      type: object
      description: |
        Request to create a new OAuth app (`createAppSchema` in `oauth.validators.ts`).

        **Required:** `name`, `allowedScopes`. **Optional:** `description`, `redirectUris`, `allowedGrantTypes`,
        `homepageUrl`, `privacyPolicyUrl`, `termsOfServiceUrl`, `isConfidential`, `accessTokenLifetime`, `refreshTokenLifetime`.

        **Redirect rule (Zod refine):** If the effective grant list includes `authorization_code`
        (including when `allowedGrantTypes` is omitted — defaults to `authorization_code` + `refresh_token`),
        at least one redirect URI is required. If grants exclude `authorization_code`, `redirectUris` may be omitted.
      properties:
        name:
          type: string
          description: App name (displayed to users during authorization)
          minLength: 1
          maxLength: 100
          example: My Integration App
        description:
          type: string
          description: App description
          maxLength: 500
          example: Integrates PipesHub with our internal tools
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: |
            Allowed redirect URIs (max 10). Required when an effective grant list includes `authorization_code`
            (including the default when `allowedGrantTypes` is omitted).
          maxItems: 10
          example:
          - https://myapp.com/callback
          - http://localhost:3000/callback
        allowedGrantTypes:
          type: array
          items:
            type: string
            enum:
            - authorization_code
            - client_credentials
            - refresh_token
          description: |
            Allowed grant types. Defaults to `["authorization_code", "refresh_token"]` if omitted (applied by the service, not Zod).
          example:
          - authorization_code
          - refresh_token
        allowedScopes:
          type: array
          items:
            type: string
          description: Scopes the app can request (non-empty)
          minItems: 1
          example:
          - openid
          - profile
          - read:records
        homepageUrl:
          type: string
          format: uri
          description: App homepage URL (shown during authorization)
        privacyPolicyUrl:
          type: string
          format: uri
          description: Privacy policy URL
        termsOfServiceUrl:
          type: string
          format: uri
          description: Terms of service URL
        isConfidential:
          type: boolean
          description: |
            Whether the app can securely store secrets.
            - `true`: Server-side app (secret required for token requests)
            - `false`: Browser/mobile app (must use PKCE)
          default: true
        accessTokenLifetime:
          type: integer
          description: Access token lifetime in seconds (300–86400)
          minimum: 300
          maximum: 86400
          default: 3600
          example: 3600
        refreshTokenLifetime:
          type: integer
          description: Refresh token lifetime in seconds (3600–31536000)
          minimum: 3600
          maximum: 31536000
          default: 2592000
          example: 2592000
      required:
      - name
      - allowedScopes
    UpdateOAuthAppRequest:
      type: object
      description: |
        Request to update an OAuth app (`updateAppSchema` in `oauth.validators.ts`).

        All fields are optional — include only fields that should change. URL fields (`homepageUrl`, `privacyPolicyUrl`, `termsOfServiceUrl`) accept `null` to clear them (nullable in Zod).

        **Redirect rule (Zod refine):** If `allowedGrantTypes` includes `authorization_code` and `redirectUris` is present in the body, `redirectUris` must contain at least one URI.
      properties:
        name:
          type: string
          description: App name
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: App description
          maxLength: 500
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: |
            Allowed redirect URIs (up to 10). Required when `authorization_code` grant type is enabled.
            Preserved in the database even if `authorization_code` is removed from grant types.
          maxItems: 10
        allowedGrantTypes:
          type: array
          items:
            type: string
            enum:
            - authorization_code
            - client_credentials
            - refresh_token
        allowedScopes:
          type: array
          items:
            type: string
          minItems: 1
        homepageUrl:
          type: string
          format: uri
          nullable: true
        privacyPolicyUrl:
          type: string
          format: uri
          nullable: true
        termsOfServiceUrl:
          type: string
          format: uri
          nullable: true
        accessTokenLifetime:
          type: integer
          minimum: 300
          maximum: 86400
        refreshTokenLifetime:
          type: integer
          minimum: 3600
          maximum: 31536000
    OAuthAppResponse:
      type: object
      description: |
        OAuth app details (without secret). Fields under `required:` always appear
        in `toAppResponse` (`oauth.app.service.ts`); optional URL/description fields
        are only present when set by the caller.
      required:
      - id
      - slug
      - clientId
      - name
      - redirectUris
      - allowedGrantTypes
      - allowedScopes
      - status
      - isConfidential
      - accessTokenLifetime
      - refreshTokenLifetime
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          description: App ID
        slug:
          type: string
          description: URL-friendly app slug
        clientId:
          type: string
          description: OAuth client ID
        name:
          type: string
          description: App name
        description:
          type: string
          description: App description
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: Allowed redirect URIs (always returned; may be empty)
        allowedGrantTypes:
          type: array
          items:
            type: string
          description: Allowed grant types
        allowedScopes:
          type: array
          items:
            type: string
          description: Allowed scopes
        status:
          type: string
          enum:
          - active
          - suspended
          - revoked
          description: App status
        homepageUrl:
          type: string
          format: uri
          description: App homepage
        privacyPolicyUrl:
          type: string
          format: uri
          description: Privacy policy URL
        termsOfServiceUrl:
          type: string
          format: uri
          description: Terms of service URL
        isConfidential:
          type: boolean
          description: Whether app is a confidential client
        accessTokenLifetime:
          type: integer
          description: Access token lifetime in seconds
        refreshTokenLifetime:
          type: integer
          description: Refresh token lifetime in seconds
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    OAuthAppWithSecret:
      allOf:
      - $ref: '#/components/schemas/OAuthAppResponse'
      - type: object
        properties:
          clientSecret:
            type: string
