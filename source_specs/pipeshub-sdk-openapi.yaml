        schema:
          type: string
          minLength: 1
      - name: conversationId
        in: path
        required: true
        description: Unique conversation identifier.
        schema:
          type: string
          format: objectId
      - name: messageId
        in: path
        required: true
        description: Identifier of the bot-response message being rated.
        schema:
          type: string
          format: objectId
      requestBody:
        required: true
        description: Feedback payload for the agent message.
        content:
