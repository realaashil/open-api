    PersistedSemanticSearchCitation:
      type: object
      additionalProperties: false
      description: |
        Populated citation document referenced from a persisted search.
        The controller strips `__v` via `populate({ select: '-__v' })`.
      required:
      - _id
      - content
      - chunkIndex
      - citationType
      - metadata
      - createdAt
      - updatedAt
      properties:
