          type: integer
        limit:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean
    SemanticSearchHistoryAppliedDateRange:
      type: object
      additionalProperties: false
      description: |
        Echoed back only when the caller passed `startDate` and/or `endDate`.
        Each bound is an ISO 8601 string when set; the field is absent when
        the corresponding query param was omitted (utils.ts:480-486 reads
        `appliedFilters.createdAt.$gte?.toISOString()` directly, so missing
        bounds become `undefined` and drop out of the JSON).
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
    SemanticSearchHistoryFiltersApplied:
      type: object
      additionalProperties: false
      description: |
        Echo of which filters the caller actually supplied, built by
        `buildFiltersMetadata` (utils.ts:430-486). `page` and `limit` always
        appear because they are normalised to defaults before being recorded,
        so `filters` is never empty and `values` always contains at least
        `{ page, limit }`. Other keys appear only when the matching query
        param was non-empty (or, for `dateRange`, when `createdAt` was set
        on the Mongo filter).

        `values` keys are scalar strings rather than typed primitives
        (`'true'`/`'false'`, `'5'`, etc.) because they are passed through
        from `req.query` as Express parsed them — only `page` and `limit`
        are coerced to integers via `safeParsePagination`.
      required:
      - filters
      - values
      properties:
        filters:
          type: array
          items:
            type: string
            enum:
            - page
            - limit
            - search
            - shared
            - tags
            - minMessages
            - sortBy
            - sortOrder
            - startDate
            - endDate
            - messageType
            - dateRange
        values:
          type: object
          additionalProperties: false
          properties:
            page:
              type: integer
            limit:
              type: integer
            search:
              type: string
            shared:
              type: string
            tags:
              type: string
            minMessages:
              type: string
            sortBy:
              type: string
            sortOrder:
              type: string
            startDate:
              type: string
            endDate:
              type: string
            messageType:
              type: string
            dateRange:
              $ref: '#/components/schemas/SemanticSearchHistoryAppliedDateRange'
    SemanticSearchHistoryFilterToggle:
      type: object
      additionalProperties: false
      description: |
        Generic "filter X is available, current value is Y" block used for
        `shared`, `tags`, `minMessages`, `search`, and `messageType`. Either
        `type` (free-form value) or `values` (enum of allowed strings) is
        present, not both. `current` is the caller-supplied value passed
        through from `req.query`, hence string-or-null even when `type` is
        `'number'`.
      required:
      - description
      - current
      - applied
      properties:
        type:
          type: string
        values:
          type: array
          items:
            type: string
        description:
          type: string
        current:
          type: string
