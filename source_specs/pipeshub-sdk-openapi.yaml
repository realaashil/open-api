        status:
          type: string
        status_code:
          type: integer
        message:
          type: string
        appliedFilters:
          $ref: '#/components/schemas/SemanticSearchAppliedFilters'
        virtual_to_record_map:
          type: object
          description: Maps virtual record id (object property name) to the accessible graph record document for that id.
          additionalProperties:
            $ref: '#/components/schemas/SemanticSearchGraphRecord'
    SemanticSearchExecuteResponse:
      type: object
      additionalProperties: false
      description: |
        Immediate POST `/search` response: persisted search id plus the raw retrieval payload.
        SDK-oriented modeling: named fields only at this level; dynamic-key maps inside `searchResponse` use
        `additionalProperties` with a `$ref` (e.g. `virtual_to_record_map`) rather than boolean `additionalProperties: true`,
        so generated clients retain typed values where possible.
      required:
      - searchId
      - searchResponse
      properties:
        searchId:
          type: string
          format: objectId
        searchResponse:
          $ref: '#/components/schemas/SemanticSearchAiResponse'
    PersistedSemanticSearchBoundingBox:
