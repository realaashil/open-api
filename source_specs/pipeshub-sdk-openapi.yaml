  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/regenerate:
    post:
      tags:
      - Agents
      summary: Regenerate agent conversation message
      description: |
        Regenerate the AI response for a specific message in an agent
        conversation and stream the new answer over Server-Sent Events.

        **Constraints:**

        - Only the last message in the conversation can be regenerated.
        - The target message must be of type `bot_response`.

        **Request body:**

        All request-body fields are optional. When omitted, the server reuses
        the original model/context. The body supports:
        - `filters`
        - `chatMode`
        - `modelKey`
        - `modelName`
        - `modelFriendlyName`
        - `timezone`
        - `currentTime`
        - `tools`

        **Streaming behavior:**

        The response is delivered as `text/event-stream`. Stable events are
        `connected`, `complete`, and `error`. Additional agent/tool lifecycle
        events may be forwarded by the backend and should be treated as
        informational updates.

        Validation failures on params/body are returned as normal HTTP `400`
        responses before the stream starts. Valid-shape requests that fail
        conversation lookup or regenerate rules are reported as SSE `error`
        events after stream initialization.
      operationId: regenerateAgentConversationMessage
      security:
      - bearerAuth: []
      - oauth2:
        - agent:execute
      parameters:
      - name: agentKey
        in: path
        required: true
        description: Stable key identifying the agent that owns this conversation.
        schema:
          type: string
          minLength: 1
      - name: conversationId
        in: path
        required: true
        description: ID of the agent conversation containing the target message.
        schema:
          type: string
          format: objectId
      - name: messageId
        in: path
        required: true
        description: ID of the bot-response message to regenerate.
        schema:
          type: string
          format: objectId
      requestBody:
        required: false
        description: |
          Optional regeneration payload. All fields are optional and are
          validated against `RegenerateRequest`.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateRequest'
      responses:
        '200':
          description: |
            SSE stream established.

            Stable event names:
            - `connected` — confirms the stream is open
            - `complete` — returns the updated conversation plus metadata
            - `error` — reports lookup failures, authorization failures on
              the conversation, or regenerate-rule failures after the stream
              has started

            Additional backend-defined agent/tool events may be emitted.
            Clients should ignore unknown event names.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentRegenerateSSEEvent'
        '400':
          description: |
            Validation failed for path parameters or request body. Common
            causes include invalid ObjectId formats, empty strings for fields
            that require content, malformed `filters`, invalid `tools`
            entries, or `currentTime` values that are not ISO 8601 datetimes
            with offset information.
        '401':
          description: Unauthorized
  /agents/{agentKey}/conversations/{conversationId}/message/{messageId}/feedback:
    post:
      tags:
      - Agents
      summary: Submit feedback for an agent message
      description: |
        Append structured feedback to a bot-response message in an agent
